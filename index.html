<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael Stinnett</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #1a1a1a;
            --gray: #3a3a3a;
            --rule: #b0aaa0;
        }

        html, body {
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #f5f5f5;
            animation: colorChange 100s infinite;
            color: var(--ink);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        @keyframes colorChange {
            0%   { background-color: #f5f5f5; }
            18%  { background-color: #c0cce8; }
            36%  { background-color: #d6d6d6; }
            54%  { background-color: #c0dac0; }
            72%  { background-color: #d6d6d6; }
            90%  { background-color: #e7e0cb; }
            100% { background-color: #f5f5f5; }
        }

        .card {
            max-width: 440px;
            width: 100%;
        }

        .name {
            font-size: 1.85rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            margin-bottom: 0.4rem;
        }

        .title {
            font-style: italic;
            font-size: 1rem;
            color: var(--gray);
            letter-spacing: 0;
        }

        .title + .title {
            margin-top: 0.05rem;
        }

        hr {
            border: none;
            border-top: 1px solid var(--rule);
            margin: 1.5rem 0;
        }

        .feature {
            margin-bottom: 1.25rem;
        }

        .feature-label {
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--gray);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 0.35rem;
        }

        .feature-title {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--ink);
            letter-spacing: -0.01em;
        }

        .feature-title a {
            color: var(--ink);
            text-decoration: none;
            border-bottom: 1px solid var(--rule);
            transition: border-color 0.2s ease;
        }

        .feature-title a:hover {
            border-color: var(--ink);
        }

        .feature-desc {
            font-size: 0.95rem;
            color: var(--gray);
            margin-top: 0.2rem;
        }

        .links {
            font-size: 0.95rem;
            color: var(--gray);
        }

        .links a {
            color: var(--gray);
            text-decoration: none;
            border-bottom: 1px solid var(--rule);
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .links a:hover {
            color: var(--ink);
            border-color: var(--ink);
        }

        .links .pending {
            color: var(--gray);
            border-bottom: 1px dotted var(--rule);
        }

        .links .separator {
            color: var(--gray);
            margin: 0 0.4rem;
        }

        .contact {
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }

        .contact a {
            color: var(--ink);
            text-decoration: none;
            border-bottom: 1px solid var(--rule);
            transition: border-color 0.2s ease;
        }

        .contact a:hover {
            border-color: var(--ink);
        }

        .location {
            font-size: 0.9rem;
            color: var(--gray);
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="name">Michael Stinnett</h1>
        <p class="title">professional amateur</p>
        <p class="title">architect</p>

        <hr>

        <div class="feature">
            <p class="feature-label">currently developing</p>
            <p class="feature-title"><a href="/security-review/">Security Review</a></p>
            <p class="feature-desc">a methodology for taking stock of your personal digital security</p>
        </div>

        <p class="links">
            <a href="https://architecture.tools">architecture.tools</a>
            <span class="separator">·</span>
            <a href="https://adequate.design/reviews">adequate.design / reviews</a>
            <span class="separator">·</span>
            <span class="pending">DocCheck (forthcoming)</span>
        </p>

        <p class="contact">
            <a href="#" id="email-link">mail@michaelstinnett.com</a>
        </p>

        <p class="location">Boston</p>
    </div>

    <script>
        document.getElementById('email-link').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'mailto:' + 'mail' + '@' + 'michaelstinnett.com';
        });
    </script>
</body>
</html>
