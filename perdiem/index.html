  <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:11,height:11,borderRadius:3,backgroundImage:`repeating-linear-gradient(135deg,${C.pressHot} 0 1.5px,transparent 1.5px 5px)`,border:`1px solid ${C.line}`}}/>family-time cost</span>
  <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:8,height:8,borderRadius:"50%",border:`2px solid ${C.ink}`}}/>lock</span>
  <span style={{display:"inline-flex",alignItems:"center",gap:3}}><span style={{width:3,height:3,borderRadius:"50%",background:C.juniper}}/><span style={{width:3,height:3,borderRadius:"50%",background:C.ocean}}/>family off · bottom bars (~ inferred)</span>
  <span style={{marginLeft:"auto",display:"inline-flex",alignItems:"center",gap:4}}>focused-month pressure
    <span style={{display:"inline-flex",width:34,height:6,borderRadius:3,overflow:"hidden",border:`1px solid ${C.line}`}}><span style={{width:14,background:C.ink}}/><span style={{width:9,background:C.bar}}/></span>
    <span style={{color:C.pressHot}}>over ceiling</span></span>
</div>;
const LegDot=({bg,ring,dotted,children})=> <span style={{display:"inline-flex",alignItems:"center",gap:4}}>
  <span style={{width:12,height:12,borderRadius:3,background:bg||C.panel,
    border:ring?`1.5px solid ${ring}`:(dotted?`1px dotted ${C.est}`:(bg?"none":`1px solid ${C.line}`))}}/>{children}</span>;

/* a small collapsible section wrapper for the side drawers */
function Drawer({title,sub,n,children,open,setOpen}){
  return <div style={{border:`1px solid ${C.line}`,borderRadius:8,background:C.panel,overflow:"hidden"}}>
    <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"baseline",gap:8,padding:"8px 11px",cursor:"pointer"}}>
      <span style={{fontSize:11,fontWeight:800,letterSpacing:"0.05em",textTransform:"uppercase",color:C.gray}}>{title}</span>
      {n!=null&&<span style={{fontSize:11,fontWeight:700,color:C.mute}}>{n}</span>}
      <span style={{fontSize:10,color:C.mute}}>{sub}</span>
      <span style={{marginLeft:"auto",fontSize:11,color:C.mute}}>{open?"▾":"▸"}</span>
    </div>
    {open&&<div style={{padding:"0 11px 11px"}}>{children}</div>}
  </div>;
}
/* ════════ TRIPS DRAWER — the fun back door: family trips that gate windows ════════ */
function TripsDrawer({state,setState}){
  const [open,setOpen]=useState(false);
  const trips=state.trips;
  const setTrips=fn=>setState(s=>({...s,trips:fn(s.trips)}));
  const upd=(id,patch)=>setTrips(ts=>ts.map(t=>t.id===id?{...t,...patch}:t));
  const add=()=>setTrips(ts=>[...ts,{id:"t"+Date.now(),name:"New trip",from:`${YEAR}-07-06`,to:`${YEAR}-07-12`,loc:Object.keys(LOC_NAME)[0],workFactor:"closed"}]);
  const rm=id=>setTrips(ts=>ts.filter(t=>t.id!==id));
  const WF=[["colocate","co-locate"],["commute","commute"],["closed","closed"]];
  const WFNOTE={colocate:"work locally — nearby sites co-locate (cheap)",commute:"leave the trip to work — full travel",closed:"no work — options closed (e.g. international)"};
  return <Drawer title="Trips" sub="Family travel" n={trips.length} open={open} setOpen={setOpen}>
    <div style={{maxHeight:"44vh",overflowY:"auto",overflowX:"hidden",margin:"0 -1px 2px",padding:"0 1px",WebkitOverflowScrolling:"touch"}}>
    {trips.map(t=><div key={t.id} style={{border:`1px solid ${C.line2}`,borderRadius:6,padding:"7px 8px",marginBottom:6}}>
      <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap",marginBottom:5}}>
        <input style={{...inp,flex:"1 1 120px"}} value={t.name} onChange={e=>upd(t.id,{name:e.target.value})}/>
        <select style={{...inp,width:110}} value={t.loc} onChange={e=>upd(t.id,{loc:e.target.value})}>
          {Object.keys(LOC_NAME).map(l=><option key={l} value={l}>{LOC_NAME[l]}</option>)}</select>
        <Btn small kind="danger" onClick={()=>rm(t.id)}>×</Btn>
      </div>
      <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
        <input type="date" style={{...inp,width:128}} value={t.from} onChange={e=>upd(t.id,{from:e.target.value})}/>
        <input type="date" style={{...inp,width:128}} value={t.to} onChange={e=>upd(t.id,{to:e.target.value})}/>
        <div style={{display:"inline-flex",border:`1px solid ${C.line}`,borderRadius:4,overflow:"hidden"}}>
          {WF.map(([k,l])=><button key={k} onClick={()=>upd(t.id,{workFactor:k})} title={WFNOTE[k]} style={{fontFamily:MONO,fontSize:9.5,fontWeight:700,
            padding:"3px 7px",border:"none",cursor:"pointer",background:t.workFactor===k?C.ink:"transparent",color:t.workFactor===k?C.bg:C.gray}}>{l}</button>)}
        </div>
      </div>
      <div style={{fontSize:9,color:C.mute,marginTop:4}}>{WFNOTE[t.workFactor]}</div>
    </div>)}
    </div>
    <Btn small onClick={add}>+ add trip</Btn>
    <span style={{fontSize:9.5,color:C.mute,marginLeft:8}}>trips render on the calendar; closed trips strike out their days</span>
  </Drawer>;
}
function SitesWorksheet({state,setState}){
  const [open,setOpen]=useState(false);
  return <Drawer title="Sites" sub="Rates, reach, and timing" n={state.sites.length} open={open} setOpen={setOpen}>
    <SiteWizard state={state} setState={setState} embed/>
  </Drawer>;
}
/* ════════ TRIPS PALETTE — the third workspace pillar: hideable, horizontal, drag onto the calendar ════════ */
function TripsPalette({state,setState,sel,setSel,goto,onPreview}){
  const [ghost,setGhost]=useState(null);
  const [open,setOpen]=useState(true);
  const trips=state.trips;
  const setTrips=fn=>setState(s=>({...s,trips:fn(s.trips)}));
  const dur=t=>Math.max(1,(DATE_RE.test(t.from||"")&&DATE_RE.test(t.to||""))?days(pd(t.from),pd(t.to))+1:7);
  const place=(id,fromDate)=>setTrips(ts=>ts.map(t=>t.id===id?{...t,from:fromDate,to:ds(ad(pd(fromDate),dur(t)-1)),placed:true}:t));
  const addTrip=()=>{const id="t"+Date.now();setTrips(ts=>[...ts,{id,name:"New trip",from:`${YEAR}-07-06`,to:`${YEAR}-07-10`,loc:Object.keys(LOC_NAME)[0],workFactor:"closed",placed:false}]);setSel&&setSel({kind:"trip",id});};
  const start=(e,t)=>{
    e.preventDefault();e.stopPropagation();                 // grip is touch-action:none → drag in any direction
    let moved=false,lastD; const sx=e.clientX, sy=e.clientY;
    const previewAt=d=>onPreview&&onPreview(d?{set:new Set(Array.from({length:dur(t)},(_,i)=>ds(ad(pd(d),i)))),color:WFC[t.workFactor]}:null);
    const move=ev=>{const p=ev.touches?ev.touches[0]:ev;
      if(!moved&&Math.abs(p.clientX-sx)+Math.abs(p.clientY-sy)<5)return;   // ignore taps / micro-jitter
      moved=true; const d=nearestDate(p.clientX,p.clientY);
      setGhost({name:t.name,x:p.clientX,y:p.clientY,date:d});
      if(d!==lastD){lastD=d;previewAt(d);}};   // live drop preview — only when the hovered day changes
    const cleanup=()=>{window.removeEventListener("pointermove",move);window.removeEventListener("pointerup",up);window.removeEventListener("pointercancel",cancel);};
    const up=ev=>{cleanup();const p=ev.touches?ev.touches[0]:ev;const d=nearestDate(p.clientX,p.clientY);
      if(moved&&d)place(t.id,d); setSel&&setSel({kind:"trip",id:t.id}); setGhost(null); previewAt(null);};
    const cancel=()=>{cleanup();setGhost(null);previewAt(null);};
    window.addEventListener("pointermove",move);window.addEventListener("pointerup",up);window.addEventListener("pointercancel",cancel);
  };
  const WFC={colocate:C.juniper,commute:C.ocean,closed:C.pressHot};
  return <div style={{border:`1px solid ${C.line}`,borderRadius:8,background:C.panel,padding:"9px 11px"}}>
    <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:open?7:0}}>
      <span onClick={()=>setOpen(o=>!o)} style={{fontSize:11,fontWeight:800,letterSpacing:"0.05em",textTransform:"uppercase",color:C.gray,cursor:"pointer"}}>{open?"▾":"▸"} Trips</span>
      <span style={{fontSize:9.5,color:C.mute}}>swipe to browse · drag the ⠿ handle onto a day · </span>
      <span onClick={()=>goto&&goto("setup")} style={{fontSize:9.5,color:C.blue,cursor:"pointer",borderBottom:`1px solid ${C.line}`}}>edit in Setup →</span>
    </div>
    {open&&<div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:4,WebkitOverflowScrolling:"touch"}}>
      {trips.map(t=>{const on=sel&&sel.kind==="trip"&&sel.id===t.id;
      return <div key={t.id} onClick={()=>setSel&&setSel({kind:"trip",id:t.id})} title={`${t.workFactor} · grab ⠿ to drag onto a day`}
        style={{display:"inline-flex",alignItems:"stretch",gap:6,padding:"6px 9px",borderRadius:7,cursor:"pointer",touchAction:"pan-x",flexShrink:0,
          border:`1px solid ${on?C.ink:C.line}`,outline:on?`1px solid ${C.ink}`:"none",background:placed(t)?C.panel2:C.panel,opacity:placed(t)?1:0.92,minWidth:104}}>
        <span onPointerDown={e=>start(e,t)} title="drag onto a day"
          style={{display:"flex",alignItems:"center",padding:"0 5px",margin:"-6px 2px -6px -7px",fontSize:15,lineHeight:1,color:C.mute,cursor:"grab",touchAction:"none",borderRight:`1px solid ${C.line2}`}}>⠿</span>
        <div style={{display:"flex",flexDirection:"column",gap:2,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:8,height:8,borderRadius:"50%",background:WFC[t.workFactor]}}/>
            <span style={{fontSize:12,fontWeight:800}}>{t.name}</span>
          </div>
          <div style={{fontSize:9,color:C.mute}}>{LOC_NAME[t.loc]} · {t.workFactor} · {dur(t)}d</div>
          <div style={{fontSize:8.5,color:placed(t)?C.gray:C.est,fontWeight:700}}>{placed(t)?`${md(t.from)}–${md(t.to)}`:"⤓ unplaced — drag in"}</div>
        </div>
      </div>;})}
      <button onClick={addTrip} style={{fontFamily:MONO,fontSize:11,fontWeight:700,padding:"6px 10px",borderRadius:7,cursor:"pointer",flexShrink:0,
        border:`1px dashed ${C.line}`,background:"transparent",color:C.gray}}>+ trip</button>
    </div>}
    {ghost&&<div style={{position:"fixed",left:ghost.x+12,top:ghost.y+12,zIndex:400,pointerEvents:"none",
      background:C.ink,color:C.bg,fontSize:11,fontWeight:700,padding:"4px 8px",borderRadius:5,boxShadow:`0 6px 18px var(--shadow)`}}>
      {ghost.name}{ghost.date?` → ${md(ghost.date)}`:" · drop on a day"}</div>}
  </div>;
}

/* ════════ APP SHELL ════════ */
function App(){
  const [state,setState]=useState(()=>{
    const fromUrl=readHashState();                       // a share-link wins on first load
    if(fromUrl){try{history.replaceState(null,"",location.pathname+location.search);}catch(_){}return fromUrl;}
    try{const s=localStorage.getItem("perDiemState");if(s){const v=sanitizeState(JSON.parse(s));if(v)return v;}}catch(e){}
    return seedState();
  });
  const [view,setView]=useState("work");   // one tab set, top on desktop / bottom on mobile
  const [monthIdx,setMonthIdx]=useState(7); // August — requests are open now
  const [isMobile,setIsMobile]=useState(()=>typeof window!=="undefined"&&window.matchMedia&&window.matchMedia("(max-width: 760px)").matches);
  const [back,setBack]=useState(null);   // single-level return target for in-app deep links
  const [toast,setToast]=useState(null);
  const [theme,setTheme]=useState(()=>{try{return localStorage.getItem("perDiemTheme")||"system";}catch(e){return "system";}}); // system|light|dark
  const fileRef=useRef();
  useEffect(()=>{const mq=window.matchMedia&&window.matchMedia("(max-width: 760px)");if(!mq)return;
    const h=()=>setIsMobile(mq.matches);if(mq.addEventListener){mq.addEventListener("change",h);return ()=>mq.removeEventListener("change",h);}},[]);
  useEffect(()=>{try{localStorage.setItem("perDiemState",JSON.stringify(state));}catch(e){}},[state]);
  useEffect(()=>{if(!toast)return;const t=setTimeout(()=>setToast(null),4000);return ()=>clearTimeout(t);},[toast]);
  // theme: follow device when "system", else explicit; reflected on <html data-theme>
  useEffect(()=>{
    const mq=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)");
    const apply=()=>{const eff=theme==="system"?((mq&&mq.matches)?"dark":"light"):theme;
      document.documentElement.setAttribute("data-theme",eff);};
    apply();try{localStorage.setItem("perDiemTheme",theme);}catch(e){}
    if(theme==="system"&&mq&&mq.addEventListener){mq.addEventListener("change",apply);return ()=>mq.removeEventListener("change",apply);}
  },[theme]);
  const themeIcon={system:"◐",light:"☀",dark:"☾"}[theme];
  const themeText={system:"auto",light:"light",dark:"dark"}[theme];
  const cycleTheme=()=>setTheme(t=>t==="system"?"light":t==="light"?"dark":"system");
  const tsp=useMemo(()=>typicalShiftPay(state.sites),[state.sites]);

  const exportJSON=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="per-diem.json";a.click();
  };
  const importJSON=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=ev=>{try{const v=sanitizeState(JSON.parse(ev.target.result));if(v){setState(v);}else alert("Couldn’t read that file — wrong shape.");}catch(err){alert("Invalid file");}};rd.readAsText(f);};
  const reset=()=>{if(confirm("Reset to seed data? This discards your requests and dials."))setState(seedState());};
  const share=()=>{
    const url=shareLink(state);
    if(!url){setToast("Couldn’t build a link (compressor unavailable).");return;}
    const big=url.length>8000;
    const msg=`Link copied · ${url.length.toLocaleString()} chars${big?" · ⚠ long, may not survive every browser/proxy":""}`;
    if(navigator.clipboard&&navigator.clipboard.writeText)
      navigator.clipboard.writeText(url).then(()=>setToast(msg)).catch(()=>{prompt("Copy this share link:",url);});
    else prompt("Copy this share link:",url);
  };

  const VIEWS=[["work","▦","Calendar"],["pending","◷","Requests"],["pace","∿","Pace"],["setup","⚙","Setup"]];
  const labelOf=v=>(VIEWS.find(x=>x[0]===v)||[,,v])[2];
  const goto=t=>{if(t!==view){setBack(view);setView(t);}};   // deep link, remembers where to return
  const pick=t=>{setView(t);setBack(null);};                  // manual tab tap clears the return crumb
  const content=view==="pending"
    ? <Pending state={state} setState={setState} tsp={tsp}/>
    : <Board state={state} setState={setState} monthIdx={monthIdx} setMonthIdx={setMonthIdx} tsp={tsp} view={view} goto={goto} mobile={isMobile}/>;
  return <div style={{fontFamily:MONO,color:C.ink,height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
    {/* header */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px",
      borderBottom:`1px solid ${C.line}`,background:C.panel,flexShrink:0,gap:8,flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"baseline",gap:8}}>
        <span style={{fontSize:15.5,fontWeight:900,letterSpacing:"-0.03em"}}>PER DIEM</span>
      </div>
      <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
        <Btn small onClick={cycleTheme} title={`theme: ${themeText}`}>{themeIcon} {themeText}</Btn>
        <span style={{width:1,height:16,background:C.line}}/>
        <Btn small kind="prim" onClick={share}>share link</Btn>
        <Btn small onClick={exportJSON}>export</Btn>
        <Btn small onClick={()=>fileRef.current.click()}>import</Btn>
        <Btn small onClick={reset}>reset</Btn>
        <input ref={fileRef} type="file" accept=".json" onChange={importJSON} style={{display:"none"}}/>
      </div>
    </div>
    {toast&&<div style={{position:"fixed",bottom:isMobile?68:18,left:"50%",transform:"translateX(-50%)",zIndex:300,
      background:C.ink,color:C.bg,fontSize:12,fontWeight:600,padding:"8px 14px",borderRadius:6,
      boxShadow:"0 8px 24px rgba(0,0,0,.25)",maxWidth:"90vw",textAlign:"center"}}>{toast}</div>}
    {/* desktop: top tabs — each a view into the same model (calendar and windows are separate) */}
    {!isMobile&&<div style={{display:"flex",borderBottom:`1px solid ${C.line}`,background:C.panel,flexShrink:0}}>
      {VIEWS.map(([id,ic,label])=><button key={id} onClick={()=>pick(id)}
        style={{fontFamily:MONO,fontSize:13,fontWeight:800,padding:"9px 15px",border:"none",cursor:"pointer",
          background:"transparent",color:view===id?C.ink:C.mute,letterSpacing:"-0.01em",
          borderBottom:view===id?`2px solid ${C.ink}`:"2px solid transparent",marginBottom:-1}}>{label}</button>)}
      <span style={{marginLeft:"auto",alignSelf:"center",fontSize:9.5,color:C.mute,padding:"0 14px"}}>today {ds(TODAY)}</span>
    </div>}
    {/* in-app back crumb — there's no browser back, so deep links always offer a way home */}
    {back&&back!==view&&<div style={{flexShrink:0,borderBottom:`1px solid ${C.line2}`,background:C.panel2,padding:"5px 12px"}}>
      <button onClick={()=>{setView(back);setBack(null);}} style={{fontFamily:MONO,fontSize:12,fontWeight:700,border:"none",background:"none",
        cursor:"pointer",color:C.blue,display:"inline-flex",alignItems:"center",gap:4}}>‹ back to {labelOf(back)}</button>
    </div>}
    {/* surface — one active view */}
    <div style={{flex:1,minHeight:0}}>{content}</div>
    {/* mobile: bottom tab bar — the same views */}
    {isMobile&&<div style={{display:"flex",borderTop:`1px solid ${C.line}`,background:C.panel,flexShrink:0,paddingBottom:"env(safe-area-inset-bottom)"}}>
      {VIEWS.map(([id,ic,label])=>{
        const on=view===id;
        return <button key={id} onClick={()=>pick(id)} style={{flex:1,fontFamily:MONO,border:"none",cursor:"pointer",background:"transparent",
          padding:"7px 2px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,
          color:on?C.ink:C.mute,borderTop:on?`2px solid ${C.ink}`:"2px solid transparent",marginTop:-1}}>
          <span style={{fontSize:17,lineHeight:1}}>{ic}</span>
          <span style={{fontSize:9.5,fontWeight:800,letterSpacing:"-0.01em"}}>{label}</span>
        </button>;
      })}
    </div>}
  </div>;
}
/* ════════ ERROR BOUNDARY — last-resort guard against a white screen ════════ */
class Boundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return {err};}
  componentDidCatch(e,info){console.error("Per Diem crashed:",e,info);}
  render(){
    if(!this.state.err)return this.props.children;
    return <div style={{fontFamily:MONO,maxWidth:440,margin:"12vh auto",padding:"0 20px",color:C.ink,textAlign:"center"}}>
      <div style={{fontSize:17,fontWeight:800,marginBottom:8}}>Something went sideways.</div>
      <div style={{fontSize:13,color:C.gray,lineHeight:1.6,marginBottom:16}}>
        The data couldn’t be rendered — usually a malformed share link or import.
        Your local copy is untouched until you reset.
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
        <button onClick={()=>{try{history.replaceState(null,"",location.pathname);}catch(_){}location.reload();}}
          style={{fontFamily:MONO,fontSize:12,fontWeight:700,padding:"6px 12px",borderRadius:4,cursor:"pointer",border:`1px solid ${C.line}`,background:C.panel,color:C.ink}}>Drop link &amp; reload</button>
        <button onClick={()=>{try{localStorage.removeItem("perDiemState");history.replaceState(null,"",location.pathname);}catch(_){}location.reload();}}
          style={{fontFamily:MONO,fontSize:12,fontWeight:700,padding:"6px 12px",borderRadius:4,cursor:"pointer",border:`1px solid ${C.ink}`,background:C.ink,color:C.bg}}>Reset to sample</button>
      </div>
    </div>;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<Boundary><App/></Boundary>);
</script>
