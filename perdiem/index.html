<style>
  *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;}
  input,textarea,select{user-select:text;-webkit-user-select:text;font-family:inherit;}
  html,body,#root{height:100%;}
  /* ── theme tokens: grayscale + Juniper Green / Ocean Blue ── */
  :root{
    --bg:#F7F6F4;--panel:#FFFFFF;--panel2:#FBFAF8;--ink:#1C1A18;--gray:#6B6660;--mute:#A6A09A;
    --line:#E6E3E0;--line2:#EFEDEA;--faint:#D5D1CD;
    --juniper:#3E7D63;--ocean:#356C88;--danger:#7A645E;
    --est:#7C766F;--est-line:#B8B2AB;
    --shift-day:#6E6A64;--shift-night:#2C2A27;--ov-day:#B7B2AB;--ov-night:#8A857E;
    --tint-fam:#EEEAE3;--tint-out:#ECE7E0;--weekend:#F1EFEC;--sel:#EFEAE1;
    --good-soft:#E6F0E9;--info-soft:#E6EEF3;--warn-soft:#EFE9E5;--press-hot:#6E5F5A;
    --bar:#C7C1B9;--glow-bd:#BDB7AF;--glow-bd2:#9A948C;
    --press-1:#F0EEEA;--press-2:#E2DDD6;--press-3:#CEC8BF;--press-4:#B2ABA1;
    --shadow:rgba(28,26,24,.14);--shadow-sm:rgba(28,26,24,.08);
  }
  :root[data-theme="dark"]{
    --bg:#171614;--panel:#211F1D;--panel2:#1D1B19;--ink:#ECE8E3;--gray:#A6A09A;--mute:#6E685F;
    --line:#332F2B;--line2:#2A2723;--faint:#454039;
    --juniper:#76BA92;--ocean:#65AAC9;--danger:#C99B93;
    --est:#A39C93;--est-line:#5A554E;
    --shift-day:#A39C92;--shift-night:#DAD4CC;--ov-day:#6A655E;--ov-night:#8E897F;
    --tint-fam:#262320;--tint-out:#2B2724;--weekend:#1E1C1A;--sel:#2D2924;
    --good-soft:#1F2E27;--info-soft:#1E2B33;--warn-soft:#2C2622;--press-hot:#C99B93;
    --bar:#5C574F;--glow-bd:#4A453E;--glow-bd2:#69635B;
    --press-1:#211F1D;--press-2:#2A2723;--press-3:#3A352E;--press-4:#4C463D;
    --shadow:rgba(0,0,0,.45);--shadow-sm:rgba(0,0,0,.30);
  }
  body{overflow:hidden;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;transition:background .2s ease,color .2s ease;}
  #loader{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;background:var(--bg);font-family:'SF Mono','JetBrains Mono',monospace;}
  #loader span{font-size:13px;font-weight:600;color:var(--gray);letter-spacing:-0.02em;}
  #loader .bar{width:120px;height:3px;background:var(--line);border-radius:2px;overflow:hidden;}
  #loader .bar::after{content:'';display:block;width:40%;height:100%;background:var(--ink);border-radius:2px;animation:load 1s ease infinite;}
  @keyframes load{0%{transform:translateX(-100%)}50%{transform:translateX(200%)}100%{transform:translateX(-100%)}}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--faint);border-radius:4px;}
  @media (prefers-color-scheme:dark){:root:not([data-theme]){color-scheme:dark;}}
</style>
<script>
  /* set theme before paint to avoid a flash */
  (function(){try{var t=localStorage.getItem('perDiemTheme')||'system';
    var d=t==='dark'||(t==='system'&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.setAttribute('data-theme',d?'dark':'light');}catch(e){}})();
</script>

<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script type="text/babel">
const {useState,useMemo,useCallback,useRef,useEffect}=React;

/* ════════════════════════════════════════════════════════════
   PER DIEM — a pressure-display grammar prototype.
   Implements per-diem-build-spec.md: typed entities (§3), exact
   formulas (§4), three surfaces (§6), the request lifecycle (§5),
   and the hard invariants (§8). It computes brightness for
   SURFACING and shows raw facts separately for CHOOSING. It never
   ranks, recommends, or acts.
   ════════════════════════════════════════════════════════════ */

/* ─── palette → CSS variables (grayscale + Juniper Green / Ocean Blue; dark-mode aware).
   Call sites keep using C.x; the value is now a var() the browser resolves per theme.
   Semantic accents remap: blue→ocean, green→juniper, red→danger (muted). ─── */
const V=k=>`var(--${k})`;
const C={ink:V("ink"),bg:V("bg"),panel:V("panel"),panel2:V("panel2"),line:V("line"),line2:V("line2"),
  gray:V("gray"),mute:V("mute"),faint:V("faint"),blue:V("ocean"),red:V("danger"),
  est:V("est"),estLine:V("est-line"),green:V("juniper"),juniper:V("juniper"),ocean:V("ocean"),
  softGood:V("good-soft"),softInfo:V("info-soft"),softWarn:V("warn-soft"),sel:V("sel"),
  weekend:V("weekend"),tintOut:V("tint-out"),pressHot:V("press-hot"),bar:V("bar")};
const MONO="'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace";
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONL=["January","February","March","April","May","June","July","August","September","October","November","December"];

/* ─── today (spec context: 2026-06-14) ─── */
const TODAY=new Date(2026,5,14);
const YEAR=2026;

/* ─── dates ─── */
const ds=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const pd=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const ad=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const days=(a,b)=>Math.round((b-a)/864e5);
const dim=(y,m)=>new Date(y,m+1,0).getDate();
const clamp01=x=>Math.max(0,Math.min(1,x));
const fmt$=v=>"$"+Math.round(v).toLocaleString();
const fmtK=v=>"$"+(Math.round(v/100)/10).toLocaleString()+"k";

/* ─── Estimate provenance (§3.5) ─── */
const known=v=>({value:v,basis:"known"});
const est=(v,assumptions)=>({value:v,basis:"estimate",assumptions});

/* ─── reach adjacency: LocationId × Reach → travel hours (§4.2) ───
   Family-presence location → hours to reach a site of each tier.
   Table-driven, not hardcoded conditionals. Montana→nm reads cheap. */
const REACH_ADJ={
  boston:  {local:1,  nm:8,   rural_nm:11},
  santa_fe:{local:8,  nm:1.5, rural_nm:3.5},
  abq:     {local:8,  nm:1.5, rural_nm:3},
  montana: {local:9,  nm:2.5, rural_nm:4.5},   // Montana→nm reads cheap
  portland:{local:8,  nm:7,   rural_nm:9},
};
const CHEAP_HRS=4;                                   // <= ⇒ co-located
const ROUNDTRIP={local:1.5,nm:8,rural_nm:12};        // roundTripTravelHrs by reach
const REST_HOURS={day:10,night:12};                  // restHours(type) — estimate
const LOC_NAME={boston:"Boston",santa_fe:"Santa Fe",abq:"Albuquerque",montana:"Montana",portland:"Portland"};
const REACH_LABEL={local:"local",nm:"NM",rural_nm:"rural NM"};

/* ─── pace tag weights (§3.4) ─── */
const TAG_W={summer:0,light:0.55,normal:1,heavy:1.5,travel:0.5};
const TAGS=["summer","light","normal","heavy","travel"];

/* ─── brightness weights — FIXED v1 defaults, NOT user knobs (§4.3, Inv 1) ─── */
/* work quality ($/hr ER) is NOT a brightness factor — it stays a raw choosing
   column. familyEfficiency is the only money-derived term, so glow leans on fit. */
const BW={familyEfficiency:0.28,coLocation:0.19,lowDaysOut:0.17,quotaFit:0.23,closing:0.13};
const BW_EST={familyEfficiency:true,coLocation:false,lowDaysOut:false,quotaFit:true,closing:false};
const BW_LABEL={familyEfficiency:"family efficiency",coLocation:"co-location",lowDaysOut:"low days-out",quotaFit:"quota fit",closing:"closing"};
const BUCKETS=["dim","normal","bright","brightest"];
function coarseBucket(s){return s<0.34?"dim":s<0.55?"normal":s<0.74?"bright":"brightest";}

/* ════════ SEED STATE ════════ */
function seedState(){
  const sites=[
    {id:"boston",  name:"Boston ED",   note:"home rink. easy charting, know the nurses.",
     reach:"local",   homeBaseLoc:"boston",  dayRate:1900,nightRate:2300,dayHours:9, nightHours:9,
     submissionType:"by_shift",  cadence:{opensDaysBefore:75,dueByDaysBefore:21,expectedResponseDays:14}},
    {id:"santa_fe",name:"Santa Fe ED", note:"good people. depends on hearing from ABQ first.",
     reach:"nm",      homeBaseLoc:"santa_fe",dayRate:1700,nightRate:2100,dayHours:10,nightHours:10,
     submissionType:"by_window", cadence:{opensDaysBefore:90,dueByDaysBefore:30,expectedResponseDays:10}, dependsOn:"abq"},
    {id:"abq",     name:"Albuquerque ED",note:"high volume, fast. anchors the NM trip.",
     reach:"nm",      homeBaseLoc:"abq",     dayRate:1600,nightRate:2000,dayHours:9, nightHours:10,
     submissionType:"by_shift",  cadence:{opensDaysBefore:80,dueByDaysBefore:25,expectedResponseDays:7}},
    {id:"gallup",  name:"Gallup ED",   note:"rural, long days, pays for it. tiring.",
     reach:"rural_nm",homeBaseLoc:"abq",     dayRate:2100,nightRate:2500,dayHours:12,nightHours:12,
     submissionType:"by_window", cadence:{opensDaysBefore:70,dueByDaysBefore:14,expectedResponseDays:21}},
  ];
  // trips — family travel; workFactor: colocate (work locally), commute (leave to work), closed (no work)
  const trips=[
    {id:"t1",name:"Santa Fe summer",from:"2026-08-01",to:"2026-08-21",loc:"santa_fe",workFactor:"colocate"},
    {id:"t2",name:"Montana cabin",from:"2026-07-04",to:"2026-07-12",loc:"montana",workFactor:"commute"},
    {id:"t3",name:"Japan",from:"2026-03-14",to:"2026-03-28",loc:"boston",workFactor:"closed"},   // international → windows closed
    {id:"t4",name:"Holidays home",from:"2026-12-22",to:"2027-01-02",loc:"boston",workFactor:"colocate"},
  ];
  const locks=[
    {date:"2026-08-15",kind:"hard",label:"anniversary"},
    {date:"2026-08-08",kind:"soft",recoveryBufferHrs:24,label:"recital"},
  ];
  // presence layers — primary, categorized, editable, JSON-importable (an LLM can draft these)
  const layers=[
    {id:"jun",name:"Juniper School",kind:"school",childId:"juniper",color:"var(--juniper)",visible:true,daysOutWeight:1,
     ranges:[{from:"2026-02-16",to:"2026-02-20",label:"Feb break"},{from:"2026-04-20",to:"2026-04-24",label:"Spring break"},
       {from:"2026-06-18",to:"2026-08-31",label:"Summer"},{from:"2026-11-25",to:"2026-11-27",label:"Thanksgiving"},{from:"2026-12-21",to:"2027-01-02",label:"Winter"}]},
    {id:"oce",name:"Ocean School",kind:"school",childId:"ocean",color:"var(--ocean)",visible:true,daysOutWeight:1,
     ranges:[{from:"2026-02-16",to:"2026-02-20",label:"Feb break"},{from:"2026-04-13",to:"2026-04-17",label:"Spring break"},
       {from:"2026-06-12",to:"2026-08-25",label:"Summer"},{from:"2026-11-25",to:"2026-11-27",label:"Thanksgiving"},{from:"2026-12-21",to:"2027-01-02",label:"Winter"}]},
    {id:"hol",name:"Holidays",kind:"holiday",color:"var(--ink)",visible:true,
     ranges:[{from:"2026-01-01",to:"2026-01-01",label:"New Year"},{from:"2026-05-25",to:"2026-05-25",label:"Memorial"},
       {from:"2026-07-04",to:"2026-07-04",label:"July 4"},{from:"2026-09-07",to:"2026-09-07",label:"Labor"},
       {from:"2026-11-26",to:"2026-11-26",label:"Thanksgiving"},{from:"2026-12-25",to:"2026-12-25",label:"Christmas"}]},
    {id:"evt",name:"Events",kind:"event",color:"var(--est)",visible:true,
     ranges:[{from:"2026-08-08",to:"2026-08-08",label:"Recital"},{from:"2026-10-10",to:"2026-10-11",label:"Soccer tourney"}]},
  ];
  const pace={
    pressureCeiling:7,   // soft comfortable max shifts / month
    // shifts per month — back-loaded: lighter through spring/summer, ramps into the fall
    curve:[
      {month:1,shifts:2},{month:2,shifts:2},{month:3,shifts:4},{month:4,shifts:4},
      {month:5,shifts:2},{month:6,shifts:2},{month:7,shifts:4},{month:8,shifts:6},
      {month:9,shifts:6},{month:10,shifts:6},{month:11,shifts:2},{month:12,shifts:4},
    ],
  };
  // seeded requests spanning the whole lifecycle (Past → Confirmed → Pending → Candidate)
  const requests=[
    // worked YTD (feeds booked / floor) → the Past section
    cReq("c1","boston","day",  ["2026-01-13","2026-01-20","2026-01-27"]),
    cReq("c2","abq",   "night",["2026-02-10","2026-02-11"]),
    cReq("c3","boston","day",  ["2026-03-04","2026-03-18"]),
    cReq("c4","santa_fe","day",["2026-03-24","2026-03-25"]),
    cReq("c5","boston","night",["2026-04-08","2026-04-22"]),
    cReq("c6","gallup","day",  ["2026-05-12","2026-05-13"]),
    cReq("c7","boston","day",  ["2026-05-20"]),
    // upcoming confirmed → the Confirmed section + the calendar
    {id:"cf1",siteId:"boston",shiftType:"day",opens:"2026-04-15",dueBy:"2026-05-20",
     state:"confirmed",submittedOn:"2026-05-01",resolvedOn:"2026-05-10",expectedResponseBy:"2026-05-15",
     footprint:{kind:"pinned",dates:["2026-06-29","2026-06-30"]}},
    // submitted, awaiting the site's response → Pending (also the chain upstream for santa_fe)
    {id:"s1",siteId:"abq",shiftType:"day",opens:"2026-04-13",dueBy:"2026-05-08",
     state:"pending",submittedOn:"2026-05-02",expectedResponseBy:"2026-06-20",
     footprint:{kind:"pinned",dates:["2026-07-07","2026-07-08","2026-07-09"]}},
    // in negotiation — site countered with different dates + a rate; shows on the calendar
    {id:"ov1",siteId:"santa_fe",shiftType:"day",opens:"2026-04-20",dueBy:"2026-06-10",
     state:"override",submittedOn:"2026-05-15",expectedResponseBy:"2026-06-18",rateOverride:1850,
     footprint:{kind:"pinned",dates:["2026-07-21","2026-07-22","2026-07-28"]}},
    // selected to apply for → the Candidate section (smeared, with the dependency chain on ABQ)
    {id:"s2",siteId:"santa_fe",shiftType:"day",opens:"2026-04-08",dueBy:"2026-06-25",
     state:"candidate",
     footprint:{kind:"smeared",candidates:["2026-07-13","2026-07-14","2026-07-15","2026-07-16","2026-07-17"],take:2}},
    {id:"s3",siteId:"gallup",shiftType:"day",opens:"2026-05-01",dueBy:"2026-07-01",
     state:"candidate",
     footprint:{kind:"pinned",dates:["2026-08-04","2026-08-05"]}},
  ];
  return {sites,trips,locks,layers,pace,requests};
}
function cReq(id,siteId,shiftType,dates){
  return {id,siteId,shiftType,opens:ds(ad(pd(dates[0]),-70)),dueBy:ds(ad(pd(dates[0]),-25)),
    state:"confirmed",submittedOn:ds(ad(pd(dates[0]),-40)),resolvedOn:ds(ad(pd(dates[0]),-30)),
    expectedResponseBy:ds(ad(pd(dates[0]),-26)),footprint:{kind:"pinned",dates}};
}

/* ════════ STATE SANITY (keep the page from crashing on bad input) ════════
   Every load path — localStorage, file import, or a share-link in the URL —
   passes through sanitizeState. Unknown/garbage fields fall back to seed
   defaults; malformed requests are dropped; old schemas migrate forward. */
const DATE_RE=/^\d{4}-\d{2}-\d{2}$/;
const isDateArr=a=>Array.isArray(a)&&a.length>0&&a.every(d=>typeof d==="string"&&DATE_RE.test(d));
const numOr=(v,d)=>Number.isFinite(+v)?+v:d;
function sanitizePace(p,def){
  if(!p||typeof p!=="object")return def;
  const src=Array.isArray(p.curve)?p.curve:[];
  const curve=Array.from({length:12},(_,m)=>{
    const sh=+((src[m]||{}).shifts);
    return {month:m+1,shifts:Number.isFinite(sh)?Math.max(0,Math.min(30,Math.round(sh))):def.curve[m].shifts};
  });
  const pc=+p.pressureCeiling;
  return {pressureCeiling:Number.isFinite(pc)&&pc>=1?Math.min(30,Math.round(pc)):def.pressureCeiling,curve};
}
function sanitizeState(obj){
  try{
    if(!obj||typeof obj!=="object")return null;
    const seed=seedState(),reach=["local","nm","rural_nm"];
    let sites=(Array.isArray(obj.sites)?obj.sites:[]).map(s=>{
      if(!s||typeof s!=="object"||!s.id)return null;
      const c=s.cadence||{};
      const out={id:String(s.id),name:String(s.name||"Unnamed"),note:String(s.note||""),
        reach:reach.includes(s.reach)?s.reach:"local",
        homeBaseLoc:LOC_NAME[s.homeBaseLoc]?s.homeBaseLoc:"boston",
        dayRate:numOr(s.dayRate,1800),nightRate:numOr(s.nightRate,2200),
        dayHours:numOr(s.dayHours,9),nightHours:numOr(s.nightHours,9),
        submissionType:s.submissionType==="by_window"?"by_window":"by_shift",
        cadence:{opensDaysBefore:numOr(c.opensDaysBefore,60),dueByDaysBefore:numOr(c.dueByDaysBefore,21),expectedResponseDays:numOr(c.expectedResponseDays,14)}};
      if(s.dependsOn)out.dependsOn=String(s.dependsOn);
      return out;
    }).filter(Boolean);
    if(!sites.length)sites=seed.sites;
    const ids=new Set(sites.map(s=>s.id));
    sites.forEach(s=>{if(s.dependsOn&&!ids.has(s.dependsOn))delete s.dependsOn;});
    const pace=sanitizePace(obj.pace,seed.pace);
    const cleanRanges=a=>(Array.isArray(a)?a:[]).filter(r=>r&&DATE_RE.test(r.from||"")).map(r=>({from:r.from,to:DATE_RE.test(r.to||"")?r.to:r.from,label:String(r.label||"")}));
    const LK=["school","holiday","event","custom"];
    let layers;
    if(Array.isArray(obj.layers)&&obj.layers.length){
      layers=obj.layers.filter(l=>l&&l.id).map(l=>{
        const o={id:String(l.id),name:String(l.name||"Layer"),kind:LK.includes(l.kind)?l.kind:"custom",
          color:typeof l.color==="string"?l.color:"var(--gray)",visible:l.visible!==false,ranges:cleanRanges(l.ranges)};
        if(o.kind==="school"){o.childId=String(l.childId||o.id);o.daysOutWeight=numOr(l.daysOutWeight,1);}
        return o;});
    }else if(Array.isArray(obj.kidCalendars)){          // migrate the old kid-calendar schema → school layers
      layers=obj.kidCalendars.filter(kc=>kc&&kc.childId).map(kc=>({
        id:String(kc.childId),name:kc.childId[0].toUpperCase()+kc.childId.slice(1)+" School",kind:"school",
        childId:String(kc.childId),color:kc.childId==="ocean"?"var(--ocean)":"var(--juniper)",visible:true,
        daysOutWeight:numOr(kc.schoolDaysOutWeight,1),ranges:cleanRanges(kc.closedRanges)}));
      const seedExtra=seed.layers.filter(l=>l.kind!=="school");
      layers=layers.concat(seedExtra);
    }else layers=seed.layers;
    const WF=["colocate","commute","closed"];
    const tripSrc=Array.isArray(obj.trips)?obj.trips:(Array.isArray(obj.familySpans)?obj.familySpans:seed.trips);
    const trips=tripSrc.filter(s=>s&&DATE_RE.test(s.from||"")&&DATE_RE.test(s.to||"")&&s.loc).map((s,i)=>({
      id:String(s.id||("t"+i)),name:String(s.name||LOC_NAME[s.loc]||"Trip"),from:s.from,to:s.to,loc:s.loc,
      workFactor:WF.includes(s.workFactor)?s.workFactor:"colocate"}));
    const locks=(Array.isArray(obj.locks)?obj.locks:seed.locks).filter(l=>l&&DATE_RE.test(l.date||"")).map(l=>{
      const o={date:l.date,kind:l.kind==="hard"?"hard":"soft",label:String(l.label||"lock")};
      if(Number.isFinite(+l.recoveryBufferHrs))o.recoveryBufferHrs=+l.recoveryBufferHrs;return o;});
    const MIGRATE={draft:"candidate",submitted:"pending",denied:"rejected"};   // old schema → new
    const requests=(Array.isArray(obj.requests)?obj.requests:[]).map(r=>{
      if(!r||!r.id||!ids.has(r.siteId))return null;
      const ft=r.footprint||{};let footprint=null;
      if(ft.kind==="pinned"&&isDateArr(ft.dates))footprint={kind:"pinned",dates:ft.dates};
      else if(ft.kind==="smeared"&&isDateArr(ft.candidates))footprint={kind:"smeared",candidates:ft.candidates,take:Math.max(1,Math.min(ft.candidates.length,numOr(ft.take,1)))};
      else return null;
      const st=MIGRATE[r.state]||r.state;
      const o={id:String(r.id),siteId:r.siteId,shiftType:r.shiftType==="night"?"night":"day",
        state:REQ_STATES.includes(st)?st:"candidate",footprint,
        opens:DATE_RE.test(r.opens||"")?r.opens:ds(TODAY),dueBy:DATE_RE.test(r.dueBy||"")?r.dueBy:ds(TODAY)};
      if(Number.isFinite(+r.rateOverride))o.rateOverride=+r.rateOverride;
      ["expectedResponseBy","submittedOn","resolvedOn"].forEach(k=>{if(DATE_RE.test(r[k]||""))o[k]=r[k];});
      return o;
    }).filter(Boolean);
    return {sites,trips,locks,layers,pace,requests};
  }catch(e){console.warn("sanitizeState failed",e);return null;}
}
/* read a share-link payload from the URL hash (#s=…), LZ-decompress + validate */
function readHashState(){
  try{
    const m=(location.hash||"").match(/[#&]s=([^&]+)/);
    if(!m||typeof LZString==="undefined")return null;
    const json=LZString.decompressFromEncodedURIComponent(m[1]);
    if(!json)return null;
    return sanitizeState(JSON.parse(json));
  }catch(e){console.warn("bad share link",e);return null;}
}
function shareLink(state){
  if(typeof LZString==="undefined")return null;
  try{return location.origin+location.pathname+"#s="+LZString.compressToEncodedURIComponent(JSON.stringify(state));}
  catch(e){return null;}
}

/* ════════ DERIVED VALUES & FORMULAS (§4) — all readouts (Inv 5) ════════ */

const siteRate=(s,t)=>t==="day"?s.dayRate:s.nightRate;
const siteHours=(s,t)=>t==="day"?s.dayHours:s.nightHours;
const shiftCount=r=>r.footprint.kind==="pinned"?r.footprint.dates.length:r.footprint.take;

/* lifecycle: candidate → pending → (override) → confirmed; rejected/expired persist.
   reqRate honors a negotiated rateOverride. OCCUPY = shows on calendar + presses the
   month; TENTATIVE = occupies but not yet booked money. */
const REQ_STATES=["candidate","pending","override","confirmed","rejected","expired"];
const OCCUPY=["candidate","pending","override","confirmed"];
const reqRate=(r,s)=>Number.isFinite(r.rateOverride)?r.rateOverride:siteRate(s,r.shiftType);
const reqDates=r=>r.footprint.kind==="pinned"?r.footprint.dates:r.footprint.candidates;
const reqMinDate=r=>reqDates(r).reduce((m,d)=>d<m?d:m,reqDates(r)[0]||"");
const reqMaxDate=r=>reqDates(r).reduce((m,d)=>d>m?d:m,reqDates(r)[0]||"");
const isPastReq=r=>r.state==="confirmed"&&reqMaxDate(r)<ds(TODAY);
const EDITABLE=["candidate","pending","override"];          // can be drawn/nudged/erased on the calendar

/* calendar-drawing helpers (the main verb) */
function weekdaysBetween(a,b){
  let lo=a<b?a:b,hi=a<b?b:a,out=[],d=pd(lo),t=pd(hi);
  while(d<=t){if(d.getDay()!==0&&d.getDay()!==6)out.push(ds(d));d=ad(d,1);}
  return out;
}
const shiftDates=(dates,delta)=>dates.map(x=>ds(ad(pd(x),delta))).sort();
function makeWindow(site,type,dates){                       // a drawn window → a candidate request
  if(!dates.length)return null;
  const first=dates[0];
  return {id:"r"+Date.now()+Math.floor(Math.random()*1e3),siteId:site.id,shiftType:type,
    opens:ds(ad(pd(first),-(site.cadence.opensDaysBefore||60))),dueBy:ds(ad(pd(first),-(site.cadence.dueByDaysBefore||21))),
    state:"candidate",footprint:{kind:"pinned",dates:dates.slice().sort()}};
}

/* typicalShiftPay — estimate; carries assumption (§4.4) */
function typicalShiftPay(sites){
  const v=sites.reduce((a,s)=>a+(s.dayRate+s.nightRate)/2,0)/sites.length;
  return est(Math.round(v/10)*10,["typicalShiftPay = mean of site day/night rates"]);
}

/* §4.2 co-location + travel — trips with workFactor: colocate / commute / closed */
const tripOverlaps=(trip,weekDates)=>{const f=pd(trip.from),t=pd(trip.to);return weekDates.some(d=>d>=f&&d<=t);};
const closedTrip=(trips,weekDates)=>trips.find(tp=>tp.workFactor==="closed"&&tripOverlaps(tp,weekDates));
function coLocation(site,weekDates,trips){
  for(const sp of trips){
    if(sp.workFactor!=="colocate")continue;          // only a co-locating trip makes a site cheap
    if(!tripOverlaps(sp,weekDates))continue;
    const hrs=(REACH_ADJ[sp.loc]||{})[site.reach];
    if(hrs!=null&&hrs<=CHEAP_HRS)return {coLocated:true,loc:sp.loc,hrs};
  }
  return {coLocated:false,loc:null,hrs:null};
}
function travelHours(site,weekDates,trips){
  const co=coLocation(site,weekDates,trips);
  return co.coLocated?co.hrs:ROUNDTRIP[site.reach];
}

/* §4.1 per-window money — facts for choosing */
function windowMoney(site,type,weekDates,trips){
  const shiftPay=siteRate(site,type);
  const clinicalHours=siteHours(site,type);
  const erPerHr=known(shiftPay/clinicalHours);
  const travel=travelHours(site,weekDates,trips);
  const rest=REST_HOURS[type];
  const awayHours=travel+clinicalHours+rest;
  const awayPerHr=est(shiftPay/awayHours,
    [`restHours(${type})=${rest}`,`travelHours=${travel}`]);
  return {shiftPay,clinicalHours,erPerHr,awayPerHr,awayHours,travel};
}

const schoolLayers=layers=>layers.filter(l=>l.kind==="school");
const layerCovers=(l,d)=>(l.ranges||[]).some(r=>d>=pd(r.from)&&d<=pd(r.to));

/* weighted days-out for a week (school-layer presence; Inv 9 — presence only) */
function weekDaysOut(weekDates,layers){
  const sch=schoolLayers(layers);let out=0;
  for(const d of weekDates){
    const dow=d.getDay();let w=0;
    if(dow===0||dow===6)w=1;                     // weekend → kids home
    for(const l of sch)if(layerCovers(l,d)){w=Math.max(w,l.daysOutWeight||1);break;}
    out+=w;
  }
  return out;                                     // 0..7
}

/* per-kid days-out: candidate shift dates landing on a kid's out-of-school day
   (weekend or break). The family-time cost of a window, recorded per child. */
function kidDaysOut(dateStrs,layers){
  return schoolLayers(layers).map(l=>{
    let count=0;
    for(const s of dateStrs){const d=pd(s),we=d.getDay()===0||d.getDay()===6;
      if(we||layerCovers(l,d))count++;}
    const nm=l.childId?l.childId[0].toUpperCase()+l.childId.slice(1):l.name;
    return {childId:l.childId||l.id,name:nm,count,of:dateStrs.length};
  });
}

/* shift-days committed/pending per year-month ("Y-M"), split confirmed vs window (§ two-layer pressure) */
function loadByYM(state){
  const by={};const add=(k,n,conf)=>{by[k]=by[k]||{conf:0,win:0};by[k][conf?"conf":"win"]+=n;};
  for(const r of state.requests){
    if(!OCCUPY.includes(r.state))continue;
    const conf=r.state==="confirmed"||r.state==="override";   // locked/near-locked load vs speculative window load
    if(r.footprint.kind==="pinned"){
      for(const d of r.footprint.dates){const dt=pd(d);add(`${dt.getFullYear()}-${dt.getMonth()}`,1,conf);}
    }else{
      const dt=pd(r.footprint.candidates[0]);add(`${dt.getFullYear()}-${dt.getMonth()}`,r.footprint.take,conf);
    }
  }
  return by;
}
function pressureTint(load,ceil){
  if(load<=0)return null;
  const p=load/Math.max(1,ceil);
  if(p<0.5)return "var(--press-1)";
  if(p<0.85)return "var(--press-2)";
  if(p<1.05)return "var(--press-3)";   // at the comfortable ceiling
  return "var(--press-4)";             // over the ceiling
}
const PRESS_RAMP=["var(--press-1)","var(--press-2)","var(--press-3)","var(--press-4)"];

/* §4.4 the curve is now SHIFTS per month; dollars extrapolate as shifts × typicalShiftPay.
   annualTarget$ is derived (no longer a stored dial). Shares = each month's slice of the year. */
const monthShifts=(pace,m)=>pace.curve[m].shifts||0;
const totalShifts=pace=>pace.curve.reduce((a,m)=>a+(m.shifts||0),0);
const annualTargetOf=(pace,tsp)=>totalShifts(pace)*tsp.value;
function curveShares(pace){
  const tot=totalShifts(pace);
  return pace.curve.map(m=>tot>0?(m.shifts||0)/tot:1/12);
}
function monthQuota(pace,monthIdx,tsp){
  const q=monthShifts(pace,monthIdx);                 // the curve IS the quota now (exact count)
  const monthTarget$=q*tsp.value;                     // $ extrapolated → estimate
  return {monthTarget$,quota:known(q),quota$:est(monthTarget$,tsp.assumptions),shares:curveShares(pace)};
}
/* fraction of annual pace expected to have elapsed by `date` */
function curveCumulativeFraction(pace,date){
  const shares=curveShares(pace);
  const m=date.getMonth();
  let f=0;
  for(let i=0;i<12;i++){
    if(i<m)f+=shares[i];
    else if(i===m)f+=shares[i]*(date.getDate()/dim(date.getFullYear(),i));
  }
  return f;
}

/* §4.5 the cooling aggregate */
function coolingAggregate(state,tsp){
  const {pace,requests,sites}=state;
  const siteById=Object.fromEntries(sites.map(s=>[s.id,s]));
  const annualTarget=annualTargetOf(pace,tsp);          // extrapolated from the shift curve
  const fracYearElapsed=days(new Date(YEAR,0,1),TODAY)/365;
  const expectedToDate$=annualTarget*curveCumulativeFraction(pace,TODAY);
  let bookedToDate$=0,bookedFuture$=0,requested$=0;
  for(const r of requests){
    const s=siteById[r.siteId];if(!s)continue;
    if(r.state==="confirmed"&&r.footprint.kind==="pinned"){
      const yr=r.footprint.dates.filter(d=>pd(d).getFullYear()===YEAR);
      const worked=yr.filter(d=>pd(d)<=TODAY).length;
      bookedToDate$+=worked*reqRate(r,s);                 // already worked
      bookedFuture$+=(yr.length-worked)*reqRate(r,s);     // confirmed, not yet worked
    }else if(r.state==="candidate"||r.state==="pending"||r.state==="override"){
      const n=r.footprint.kind==="pinned"
        ?r.footprint.dates.filter(d=>pd(d).getFullYear()===YEAR).length
        :(r.footprint.candidates.some(d=>pd(d).getFullYear()===YEAR)?r.footprint.take:0);
      requested$+=n*(r.footprint.kind==="pinned"?reqRate(r,s):tsp.value);   // speculative ask
    }
  }
  const flatRunRate$=fracYearElapsed>0?bookedToDate$/fracYearElapsed:0;
  const onCurveProjection$=expectedToDate$>0?annualTarget*(bookedToDate$/expectedToDate$):bookedToDate$;
  const coolingGap$=onCurveProjection$-flatRunRate$;
  // infeasibility: can the gap still be closed at a sane pace? (§6.1)
  const monthsLeft=12-TODAY.getMonth()-(TODAY.getDate()/dim(YEAR,TODAY.getMonth()));
  const maxReachable$=bookedToDate$+pace.pressureCeiling*monthsLeft*tsp.value;
  const feasible=maxReachable$>=annualTarget;
  const shortfall=Math.max(0,annualTarget-maxReachable$);
  const heat=feasible?0:clamp01(shortfall/Math.max(1,annualTarget*0.5));
  return {fracYearElapsed,expectedToDate$,bookedToDate$,bookedFuture$,requested$,flatRunRate$,onCurveProjection$,coolingGap$,feasible,heat,maxReachable$,monthsLeft,annualTarget};
}

/* §4.6 exposure per week off the footprint */
function weekExposure(weekDates,requests,siteById,tsp){
  const wf=new Set(weekDates.map(ds));
  let floor$=0,ceil$=0,pending=[];
  for(const r of requests){
    const fp=r.footprint;
    const datesIn=(fp.kind==="pinned"?fp.dates:fp.candidates).filter(d=>wf.has(d));
    if(!datesIn.length)continue;
    const s=siteById[r.siteId];if(!s)continue;
    const rate=reqRate(r,s);
    if(r.state==="confirmed"&&fp.kind==="pinned"){floor$+=datesIn.length*rate;}
    else if(r.state==="candidate"||r.state==="pending"||r.state==="override"){
      pending.push(r);                               // not-yet-confirmed → the ceiling hedge
      if(fp.kind==="pinned")ceil$+=datesIn.length*rate;
      else ceil$+=Math.min(fp.take,datesIn.length)*tsp.value; // smeared → typicalShiftPay (estimate)
    }
  }
  ceil$+=floor$;
  // collision: two pending footprints overlapping in this week
  let collision=false;
  for(let i=0;i<pending.length;i++)for(let j=i+1;j<pending.length;j++){
    const a=new Set((pending[i].footprint.kind==="pinned"?pending[i].footprint.dates:pending[i].footprint.candidates).filter(d=>wf.has(d)));
    const b=(pending[j].footprint.kind==="pinned"?pending[j].footprint.dates:pending[j].footprint.candidates).filter(d=>wf.has(d));
    if(b.some(d=>a.has(d)))collision=true;
  }
  const thinOnly=pending.length>0&&pending.every(r=>r.footprint.kind==="smeared"&&r.footprint.take<=2);
  const hole=floor$===0&&ceil$>0&&thinOnly;
  return {floor$,ceil$,pending,collision,hole};
}

/* §5 request lifecycle clocks */
function requestPressure(r){
  if(r.state!=="candidate")return 0;             // apply-by urgency; → 0 once submitted
  return clamp01(days(pd(r.opens),TODAY)/Math.max(1,days(pd(r.opens),pd(r.dueBy))));
}
/* response wait: how far a submitted request is toward its expected-response date */
function responseWait(r){
  if((r.state!=="pending"&&r.state!=="override")||!r.submittedOn||!r.expectedResponseBy)return null;
  const o=pd(r.submittedOn),d=pd(r.expectedResponseBy);
  return {frac:clamp01(days(o,TODAY)/Math.max(1,days(o,d))),overdue:TODAY>d};
}
function closingTerm(opens,dueBy){
  const o=pd(opens),d=pd(dueBy);
  if(TODAY<o)return 0;                            // not yet open
  if(TODAY>d)return 0;                            // closed
  return clamp01(days(o,TODAY)/Math.max(1,days(o,d)));
}

/* weeks of a month (Monday-start, overlapping the month) */
function getWeeks(y,m){
  const last=new Date(y,m+1,0);
  let cur=new Date(y,m,1);cur.setDate(cur.getDate()-((cur.getDay()+6)%7));
  const weeks=[];
  while(cur<=last){
    const dates=[];for(let i=0;i<7;i++){const d=new Date(cur);d.setDate(cur.getDate()+i);dates.push(d);}
    if(dates.some(d=>d.getMonth()===m))weeks.push({start:new Date(cur),dates});
    cur.setDate(cur.getDate()+7);
  }
  return weeks;
}

/* ════════ WINDOWS + BRIGHTNESS (§4.3) ════════
   Derived per (site × week). Brightness drives GLOW ONLY:
   never order, never visibility, never action (Inv 1, 2a). */
function buildWindows(state,monthIdx,types,tsp){
  const {sites,trips,layers,locks,pace,requests}=state;
  const siteById=Object.fromEntries(sites.map(s=>[s.id,s]));
  const weeks=getWeeks(YEAR,monthIdx);
  const qInfo=monthQuota(pace,monthIdx,tsp);
  // committed shifts toward this month (pinned dates landing in month)
  let committed=0;
  for(const r of requests){
    if(OCCUPY.includes(r.state)){
      const dts=(r.footprint.kind==="pinned"?r.footprint.dates:r.footprint.candidates);
      const n=r.footprint.kind==="pinned"?dts.filter(d=>pd(d).getMonth()===monthIdx&&pd(d).getFullYear()===YEAR).length
              :(dts.some(d=>pd(d).getMonth()===monthIdx)?r.footprint.take:0);
      committed+=n;
    }
  }
  const remaining=qInfo.quota.value-committed;
  const raw=[];
  weeks.forEach((wk,wi)=>{
    sites.forEach(site=>{
      const type=types[`${site.id}-${wi}`]||"day";
      const money=windowMoney(site,type,wk.dates,trips);
      const co=coLocation(site,wk.dates,trips);
      const dout=weekDaysOut(wk.dates,layers);
      const opens=ds(ad(wk.start,-site.cadence.opensDaysBefore));
      const dueBy=ds(ad(wk.start,-site.cadence.dueByDaysBefore));
      const closing=closingTerm(opens,dueBy);
      const closed=TODAY>pd(dueBy)||!!closedTrip(trips,wk.dates);   // past due, or a closed (international) trip
      const notOpen=TODAY<pd(opens);
      const lockHit=wk.dates.filter(d=>locks.some(l=>l.date===ds(d)));
      const weekdayStrs=wk.dates.filter(d=>d.getDay()!==0&&d.getDay()!==6).map(ds);
      const perKid=kidDaysOut(weekdayStrs,layers);
      raw.push({id:`${site.id}-${wi}`,wi,site,type,week:wk,money,co,dout,opens,dueBy,weekdayStrs,perKid,
        closing,closed,notOpen,lockHit,
        existing:requests.find(r=>r.siteId===site.id&&r.footprint&&
          (r.footprint.kind==="pinned"?r.footprint.dates:r.footprint.candidates).some(d=>pd(d).getMonth()===monthIdx&&wk.dates.some(wd=>ds(wd)===d)))});
    });
  });
  // normalization ranges across the month's windows
  const aw=raw.map(w=>w.money.awayPerHr.value), dt=raw.map(w=>w.dout);
  const nrm=(v,a)=>{const lo=Math.min(...a),hi=Math.max(...a);return hi>lo?(v-lo)/(hi-lo):0.5;};
  raw.forEach(w=>{
    const c={
      familyEfficiency:nrm(w.money.awayPerHr.value,aw),
      coLocation:w.co.coLocated?1:0,
      lowDaysOut:1-nrm(w.dout,dt),
      quotaFit:remaining>0?clamp01(0.45+0.55*Math.min(1,remaining/Math.max(1,qInfo.quota.value))):0.08,
      closing:w.closing,
    };
    let score=0;for(const k in BW)score+=BW[k]*c[k];
    if(w.closed)score*=0.45;                       // closed windows dim (persist, never gone — Inv 8)
    if(w.notOpen)score*=0.7;
    w.components=c;w.score=score;w.bucket=coarseBucket(score);
  });
  return {weeks,windows:raw,qInfo,committed,remaining};
}

/* ════════ PACE CURVE — the one Balance gesture ════════
   Drag each month up/down to set SHIFTS for that month. Dollars are
   extrapolated (shifts × typicalShiftPay); the annual figure is the live sum.
   The comfort ceiling (§ pressureCeiling) rides the same curve as a draggable
   line — months above it read hot, matching the year-strip pressure tint. */
function PaceCurve({pace,setPace,tsp}){
  const SPX=9,MAXSH=18,H=MAXSH*SPX;                    // px per shift, bar area height
  const shifts=pace.curve.map(m=>m.shifts||0);
  const ceiling=pace.pressureCeiling;
  const total=shifts.reduce((a,x)=>a+x,0);
  const annual$=total*tsp.value, avg=total/12;
  const setMonthShifts=(m,val)=>{
    const v=Math.max(0,Math.min(MAXSH,Math.round(val)));
    setPace({curve:pace.curve.map((mm,i)=>i===m?{...mm,shifts:v}:mm)});
  };
  const setCeiling=val=>setPace({pressureCeiling:Math.max(1,Math.min(MAXSH,Math.round(val)))});
  const drag=(e,getStart,commit)=>{
    e.preventDefault();const el=e.currentTarget;try{el.setPointerCapture(e.pointerId);}catch(_){}
    const sY=e.clientY,sV=getStart();
    const mv=ev=>commit(sV+(sY-ev.clientY)/SPX);
    const up=()=>{el.removeEventListener("pointermove",mv);el.removeEventListener("pointerup",up);el.removeEventListener("pointercancel",up);};
    el.addEventListener("pointermove",mv);el.addEventListener("pointerup",up);el.addEventListener("pointercancel",up);
  };
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
      <div style={{fontSize:9,fontWeight:800,color:C.gray,letterSpacing:"0.04em",textTransform:"uppercase"}}>Pace curve <span style={{fontWeight:600,textTransform:"none",color:C.mute}}>· drag months · shifts/mo</span></div>
      <div style={{textAlign:"right",fontSize:9,color:C.gray}}>
        <b style={{color:C.ink,fontSize:11}}>{total}</b> shifts/yr · avg <b style={{color:C.ink}}>{avg.toFixed(1)}</b>/mo
        <div style={{fontSize:8.5}}>≈ <Num e={est(annual$,tsp.assumptions)} money k/> extrapolated</div>
      </div>
    </div>
    <div style={{position:"relative",display:"flex",alignItems:"flex-end",gap:2,height:H,marginTop:4}}>
      {/* comfort ceiling — draggable line */}
      <div onPointerDown={e=>drag(e,()=>ceiling,setCeiling)}
        title={`comfort ceiling ${ceiling}/mo — drag`}
        style={{position:"absolute",left:0,right:0,bottom:Math.min(H,ceiling*SPX)-6,height:12,zIndex:3,cursor:"ns-resize",touchAction:"none"}}>
        <div style={{position:"absolute",left:0,right:0,top:6,borderTop:`1.5px dashed ${C.gray}`}}/>
        <span style={{position:"absolute",right:0,top:-3,fontSize:6.5,fontWeight:700,color:C.pressHot,background:C.panel2,padding:"0 2px"}}>ceil {ceiling}</span>
      </div>
      {MON.map((mn,m)=>{
        const sh=shifts[m],h=Math.max(2,Math.min(H,sh*SPX)),isNow=m===TODAY.getMonth(),hot=sh>ceiling;
        return <div key={m} onPointerDown={e=>drag(e,()=>shifts[m],v=>setMonthShifts(m,v))} title={`${MONL[m]}: ${sh} shifts ≈ ${fmt$(sh*tsp.value)} — drag`}
          style={{flex:1,height:H,display:"flex",flexDirection:"column",justifyContent:"flex-end",alignItems:"center",
            cursor:"ns-resize",touchAction:"none"}}>
          <div style={{fontSize:7,fontWeight:700,color:hot?C.pressHot:(sh?C.gray:C.mute),marginBottom:1}}>{sh}</div>
          <div style={{width:"74%",height:h,background:isNow?C.ink:(hot?C.pressHot:C.bar),borderRadius:"3px 3px 0 0",
            border:isNow?"none":`1px solid ${hot?C.pressHot:C.faint}`}}/>
        </div>;
      })}
    </div>
    <div style={{display:"flex",gap:2,marginTop:3}}>
      {MON.map((mn,m)=><div key={m} style={{flex:1,textAlign:"center",fontSize:6.5,fontWeight:700,color:m===TODAY.getMonth()?C.ink:C.mute}}>{mn[0]}</div>)}
    </div>
  </div>;
}

   Board drawer (§6.1). Annual $ is extrapolated; the comfort ceiling rides the
   curve; infeasibility still renders as the cooling aggregate failing to cool. */

/* ════════ PENDING — the lifecycle list (§5) ════════
   One scrolling column: Candidates (apply, with deadline chain) → Confirmed →
   Pending (awaiting + in-negotiation overrides) → Past (worked, scrolling down). */
const md=d=>`${MON[pd(d).getMonth()]} ${pd(d).getDate()}`;
const ST_COL={candidate:C.gray,pending:C.blue,override:C.pressHot,confirmed:C.green,rejected:C.red,expired:C.mute};
const ST_LABEL={candidate:"candidate",pending:"pending",override:"in negotiation",confirmed:"confirmed",rejected:"rejected",expired:"expired"};
function Pending({state,setState,tsp}){
  const siteById=Object.fromEntries(state.sites.map(s=>[s.id,s]));
  const setReq=(id,fn)=>setState(s=>({...s,requests:s.requests.map(x=>x.id===id?fn(x):x)}));
  const discard=id=>setState(s=>({...s,requests:s.requests.filter(x=>x.id!==id)}));
  const cadDays=r=>(siteById[r.siteId]&&siteById[r.siteId].cadence.expectedResponseDays)||10;
  const pinFrom=r=>r.footprint.kind==="smeared"?r.footprint.candidates.slice(0,r.footprint.take):r.footprint.dates.slice();
  const submit=r=>setReq(r.id,x=>({...x,state:"pending",submittedOn:ds(TODAY),expectedResponseBy:ds(ad(TODAY,cadDays(x)))}));
  const accept=r=>setReq(r.id,x=>({...x,state:"confirmed",resolvedOn:ds(TODAY),footprint:{kind:"pinned",dates:pinFrom(x)}}));
  const reject=r=>setReq(r.id,x=>({...x,state:"rejected",resolvedOn:ds(TODAY)}));
  const toOverride=r=>setReq(r.id,x=>({...x,state:"override",footprint:{kind:"pinned",dates:pinFrom(x)},rateOverride:Number.isFinite(x.rateOverride)?x.rateOverride:siteRate(siteById[x.siteId],x.shiftType)}));
  const confirmOverride=r=>setReq(r.id,x=>({...x,state:"confirmed",resolvedOn:ds(TODAY)}));
  const payOf=r=>{const s=siteById[r.siteId];return shiftCount(r)*(s?reqRate(r,s):0);};

  function chainFor(r){
    const site=siteById[r.siteId];if(!site||!site.dependsOn)return null;
    const up=siteById[site.dependsOn];
    const upstream=state.requests.find(u=>u.siteId===site.dependsOn&&(u.state==="pending"||u.state==="override"||u.state==="confirmed"));
    if(!upstream)return {up,missing:true};
    const slack=days(pd(upstream.expectedResponseBy||upstream.dueBy),pd(r.dueBy));
    return {up,upstream,slack};
  }

  const reqs=state.requests;
  const candidates=reqs.filter(r=>r.state==="candidate").sort((a,b)=>pd(a.dueBy)-pd(b.dueBy));
  const confirmedUp=reqs.filter(r=>r.state==="confirmed"&&!isPastReq(r)).sort((a,b)=>reqMaxDate(a).localeCompare(reqMaxDate(b)));
  const inflight=reqs.filter(r=>r.state==="pending"||r.state==="override").sort((a,b)=>pd(a.expectedResponseBy||a.dueBy)-pd(b.expectedResponseBy||b.dueBy));
  const resolved=reqs.filter(r=>r.state==="rejected"||r.state==="expired");
  const past=reqs.filter(isPastReq).sort((a,b)=>reqMaxDate(b).localeCompare(reqMaxDate(a)));

  const Head=({title,n,sub})=> <div style={{display:"flex",alignItems:"baseline",gap:8,margin:"0 2px 8px"}}>
    <span style={{fontSize:12,fontWeight:800,letterSpacing:"-0.01em"}}>{title}</span>
    <span style={{fontSize:9,fontWeight:700,color:C.mute}}>{n}</span>
    <span style={{fontSize:9,color:C.gray}}>{sub}</span>
  </div>;
  const Empty=({t})=> <div style={{fontSize:9,color:C.mute,fontStyle:"italic",padding:"4px 2px 0"}}>{t}</div>;
  const RowCard=({children,dim,accent})=> <div style={{padding:"9px 11px",border:`1px solid ${accent||C.line}`,borderRadius:7,
    background:C.panel,marginBottom:6,opacity:dim?0.5:1}}>{children}</div>;
  const Ident=({r})=>{const site=siteById[r.siteId];return <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
    <span style={{fontSize:11,fontWeight:800}}>{site?site.name:"(removed site)"}</span>
    <Tag bg={C.line2} col={ST_COL[r.state]}>{ST_LABEL[r.state]}</Tag>
    <Tag>{r.shiftType}</Tag>
    {Number.isFinite(r.rateOverride)&&<Tag bg={C.softWarn} col={C.pressHot}>rate {fmt$(r.rateOverride)}</Tag>}
    <span style={{marginLeft:"auto",fontSize:9,fontWeight:700,color:C.ink}}>{fmt$(payOf(r))}</span>
  </div>;};
  const Dates=({r})=> <div style={{fontSize:8.5,color:C.gray,marginTop:4}}>
    {r.footprint.kind==="smeared"?`${md(r.footprint.candidates[0])}–${md(r.footprint.candidates.at(-1))} · take ${r.footprint.take} of ${r.footprint.candidates.length}`
      :r.footprint.dates.map(md).join(" · ")}</div>;

  return <div style={{height:"100%",overflow:"auto"}}>
    <div style={{maxWidth:720,margin:"0 auto",padding:"14px 16px 80px"}}>
      <div style={{fontSize:15,fontWeight:800,letterSpacing:"-0.02em"}}>Pending</div>
      <div style={{fontSize:9.5,color:C.gray,marginBottom:16}}>the request lifecycle, newest intent on top, history scrolling down.</div>

      {/* ── CANDIDATES ── */}
      <Head title="Candidates" n={candidates.length} sub="selected to apply for · deadline chain"/>
      {candidates.length===0&&<Empty t="None staged — create one on the Board."/>}
      {candidates.map(r=>{
        const press=requestPressure(r),notOpen=TODAY<pd(r.opens),chain=chainFor(r);
        return <RowCard key={r.id}>
          <Ident r={r}/><Dates r={r}/>
          <div style={{marginTop:7}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:C.mute,marginBottom:2}}>
              <span>{notOpen?`opens ${r.opens}`:`window open`}</span>
              <span style={{color:press>0.7?C.red:C.gray}}>apply by {r.dueBy}</span>
            </div>
            <div style={{height:5,background:C.line2,borderRadius:3,overflow:"hidden"}}>
              <div style={{width:(press*100)+"%",height:"100%",background:press>0.7?C.red:C.ink}}/>
            </div>
          </div>
          {chain&&<div style={{marginTop:6,fontSize:8.5,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{color:C.gray}}>⛓ waits on <b>{chain.up?chain.up.name:"?"}</b></span>
            {chain.missing? <Tag bg={C.line2} col={C.mute}>no live upstream request</Tag>
              : chain.slack<0? <Tag bg={C.softWarn} col={C.red}>slack {chain.slack}d — due before they respond</Tag>
              : <Tag bg={C.softGood} col={C.green}>{chain.slack}d slack</Tag>}
          </div>}
          <div style={{display:"flex",gap:6,marginTop:8}}>
            <Btn small kind="prim" onClick={()=>submit(r)}>submit</Btn>
            <Btn small kind="danger" onClick={()=>discard(r.id)}>discard</Btn>
          </div>
        </RowCard>;
      })}

      {/* ── CONFIRMED (upcoming) ── */}
      <div style={{marginTop:18}}><Head title="Confirmed" n={confirmedUp.length} sub="upcoming · on the calendar"/></div>
      {confirmedUp.length===0&&<Empty t="No upcoming confirmed shifts."/>}
      {confirmedUp.map(r=><RowCard key={r.id} accent={C.juniper}>
        <Ident r={r}/><Dates r={r}/>
        <div style={{fontSize:8,color:C.green,fontWeight:700,marginTop:6}}>→ hardened placement (home base, §7)</div>
      </RowCard>)}

      {/* ── PENDING (awaiting + in negotiation) ── */}
      <div style={{marginTop:18}}><Head title="Pending" n={inflight.length} sub="awaiting the site · accept / reject / override"/></div>
      {inflight.length===0&&<Empty t="Nothing out for response."/>}
      {inflight.map(r=>{
        const wait=responseWait(r),neg=r.state==="override";
        return <RowCard key={r.id} accent={neg?C.pressHot:undefined}>
          <Ident r={r}/><Dates r={r}/>
          {wait&&<div style={{marginTop:7}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:8,color:C.mute,marginBottom:2}}>
              <span>submitted {r.submittedOn}</span>
              <span style={{color:wait.overdue?C.red:C.gray}}>{wait.overdue?"overdue":"response by"} {r.expectedResponseBy}</span>
            </div>
            <div style={{height:5,background:C.line2,borderRadius:3,overflow:"hidden"}}>
              <div style={{width:(wait.frac*100)+"%",height:"100%",background:wait.overdue?C.red:C.blue}}/>
            </div>
          </div>}
          {!neg
            ? <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                <Btn small kind="good" onClick={()=>accept(r)}>accept</Btn>
                <Btn small kind="danger" onClick={()=>reject(r)}>reject</Btn>
                <Btn small onClick={()=>toOverride(r)}>override</Btn>
              </div>
            : <OverrideEditor r={r} site={siteById[r.siteId]}
                onRm={d=>setReq(r.id,x=>({...x,footprint:{kind:"pinned",dates:x.footprint.dates.filter(y=>y!==d)}}))}
                onAdd={d=>setReq(r.id,x=>x.footprint.dates.includes(d)?x:({...x,footprint:{kind:"pinned",dates:[...x.footprint.dates,d].sort()}}))}
                onRate={v=>setReq(r.id,x=>({...x,rateOverride:v}))}
                onConfirm={()=>confirmOverride(r)} onReject={()=>reject(r)}/>}
        </RowCard>;
      })}
      {resolved.length>0&&<div style={{marginTop:8}}>
        <div style={{fontSize:8.5,fontWeight:700,color:C.mute,textTransform:"uppercase",letterSpacing:"0.04em",margin:"0 2px 6px"}}>resolved · persists (Inv 8)</div>
        {resolved.map(r=><RowCard key={r.id} dim>
          <Ident r={r}/><Dates r={r}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
            <span style={{fontSize:8,color:C.mute,fontStyle:"italic"}}>faded to legibility floor</span>
            <Btn small onClick={()=>discard(r.id)}>dismiss</Btn>
          </div>
        </RowCard>)}
      </div>}

      {/* ── PAST (worked) ── */}
      <div style={{marginTop:18}}><Head title="Past" n={past.length} sub="worked · scrolling down"/></div>
      {past.length===0&&<Empty t="No past shifts yet."/>}
      {past.map(r=><RowCard key={r.id} dim>
        <Ident r={r}/><Dates r={r}/>
      </RowCard>)}

      <p style={{fontSize:9,color:C.mute,textAlign:"center",marginTop:22,lineHeight:1.6}}>
        Confirmed and in-negotiation shifts land on the calendar and press the month.<br/>
        Only the pace/exposure readout crosses back to the Board (the seam, §7).
      </p>
    </div>
  </div>;
}
/* inline negotiation editor — edits commit live (shows on the calendar / pressure) */
function OverrideEditor({r,site,onRm,onAdd,onRate,onConfirm,onReject}){
  const [add,setAdd]=useState("");
  return <div style={{marginTop:8,padding:"9px 10px",border:`1px dashed ${C.pressHot}`,borderRadius:6,background:C.softWarn}}>
    <div style={{fontSize:8,fontWeight:800,color:C.pressHot,letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:6}}>Negotiated terms · can fall outside the original window</div>
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
      {r.footprint.dates.map(d=><span key={d} style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:9,fontWeight:700,
        padding:"2px 4px 2px 7px",border:`1px solid ${C.line}`,borderRadius:4,background:C.panel}}>
        {md(d)}<button onClick={()=>onRm(d)} style={{border:"none",background:"none",cursor:"pointer",color:C.red,fontFamily:MONO,fontSize:10}}>×</button></span>)}
    </div>
    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
      <input type="date" value={add} onChange={e=>setAdd(e.target.value)} style={{...inp,width:140}}/>
      <Btn small onClick={()=>{if(DATE_RE.test(add)){onAdd(add);setAdd("");}}}>+ add date</Btn>
      <span style={{marginLeft:"auto",fontSize:8.5,color:C.gray}}>rate</span>
      <input type="number" value={r.rateOverride} onChange={e=>onRate(+e.target.value||0)} style={{...inp,width:80}}/>
      <span style={{fontSize:8.5,color:C.mute}}>={fmt$((r.footprint.dates.length)*(Number(r.rateOverride)||0))}</span>
    </div>
    <div style={{display:"flex",gap:6}}>
      <Btn small kind="good" disabled={!r.footprint.dates.length} onClick={onConfirm}>confirm</Btn>
      <Btn small kind="danger" onClick={onReject}>reject</Btn>
    </div>
  </div>;
}

/* ════════ SITES WORKSHEET — add / edit named, never-rated sites; live, near the window list (§3.1, Inv 4) ════════ */
function SiteWizard({state,setState,embed,onClose}){
  const [openId,setOpenId]=useState(state.sites[0]?.id||null);
  const sites=state.sites;
  const setSites=fn=>setState(st=>({...st,sites:fn(st.sites)}));   // live edits
  const reqCount=id=>state.requests.filter(r=>r.siteId===id).length;
  const upd=(id,patch)=>setSites(p=>p.map(s=>s.id===id?{...s,...patch}:s));
  const updCad=(id,patch)=>setSites(p=>p.map(s=>s.id===id?{...s,cadence:{...s.cadence,...patch}}:s));
  const addSite=()=>{const id="site"+Date.now();
    setSites(p=>[...p,{id,name:"New site",note:"",reach:"local",homeBaseLoc:"boston",
      dayRate:1800,nightRate:2200,dayHours:9,nightHours:9,submissionType:"by_shift",
      cadence:{opensDaysBefore:60,dueByDaysBefore:21,expectedResponseDays:14}}]);
    setOpenId(id);};
  const rm=id=>{if(reqCount(id)>0)return;setSites(p=>p.filter(s=>s.id!==id));if(openId===id)setOpenId(null);};
  const N=props=> <input type="number" style={inp} {...props}/>;
  const Inner=<div style={{maxHeight:embed?"none":"82vh",display:"flex",flexDirection:"column"}}>
      {!embed&&<div style={{fontSize:13,fontWeight:800,marginBottom:2}}>Sites worksheet</div>}
      <div style={{fontSize:9,color:C.gray,marginBottom:10}}>Sites carry satisfaction in their <b>name</b> + free-text <b>note</b> — never a rating (Inv 4). Edits are live.</div>
      <div style={{flex:1,overflow:"auto",margin:"0 -2px",padding:"0 2px"}}>
        {sites.map(s=>{
          const open=openId===s.id, refs=reqCount(s.id);
          return <div key={s.id} style={{border:`1px solid ${C.line}`,borderRadius:7,marginBottom:7,background:C.panel,overflow:"hidden"}}>
            <div onClick={()=>setOpenId(open?null:s.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",cursor:"pointer"}}>
              <span style={{fontSize:11,fontWeight:800}}>{s.name||"(unnamed)"}</span>
              <Tag>{REACH_LABEL[s.reach]}</Tag>
              <Tag bg={C.line2}>{s.submissionType==="by_window"?"by window":"by shift"}</Tag>
              {s.dependsOn&&<Tag bg={C.softInfo} col={C.blue}>after {sites.find(x=>x.id===s.dependsOn)?.name||"?"}</Tag>}
              <span style={{marginLeft:"auto",fontSize:9,color:C.mute}}>{open?"▾":"▸"}</span>
            </div>
            {open&&<div style={{padding:"4px 10px 10px",borderTop:`1px solid ${C.line2}`}}>
              <Field label="Name (carries satisfaction)"><input style={inp} value={s.name} onChange={e=>upd(s.id,{name:e.target.value})}/></Field>
              <Field label="Note (free text · non-sortable)"><input style={inp} value={s.note} onChange={e=>upd(s.id,{note:e.target.value})}/></Field>
              <div style={{display:"flex",gap:8}}>
                <Field label="Reach"><select style={inp} value={s.reach} onChange={e=>upd(s.id,{reach:e.target.value})}>
                  {Object.keys(REACH_LABEL).map(r=><option key={r} value={r}>{REACH_LABEL[r]}</option>)}</select></Field>
                <Field label="Home base"><select style={inp} value={s.homeBaseLoc} onChange={e=>upd(s.id,{homeBaseLoc:e.target.value})}>
                  {Object.keys(LOC_NAME).map(l=><option key={l} value={l}>{LOC_NAME[l]}</option>)}</select></Field>
              </div>
              <div style={{display:"flex",gap:8}}>
                <Field label="Day rate $"><N value={s.dayRate} onChange={e=>upd(s.id,{dayRate:+e.target.value||0})}/></Field>
                <Field label="Day hours"><N value={s.dayHours} onChange={e=>upd(s.id,{dayHours:+e.target.value||0})}/></Field>
                <Field label="Night rate $"><N value={s.nightRate} onChange={e=>upd(s.id,{nightRate:+e.target.value||0})}/></Field>
                <Field label="Night hours"><N value={s.nightHours} onChange={e=>upd(s.id,{nightHours:+e.target.value||0})}/></Field>
              </div>
              <Field label="Submission type"><select style={inp} value={s.submissionType} onChange={e=>upd(s.id,{submissionType:e.target.value})}>
                <option value="by_shift">by shift (pinned)</option><option value="by_window">by window (smeared)</option></select></Field>
              <div style={{display:"flex",gap:8}}>
                <Field label="Opens (days before)"><N value={s.cadence.opensDaysBefore} onChange={e=>updCad(s.id,{opensDaysBefore:+e.target.value||0})}/></Field>
                <Field label="Due (days before)"><N value={s.cadence.dueByDaysBefore} onChange={e=>updCad(s.id,{dueByDaysBefore:+e.target.value||0})}/></Field>
                <Field label="Response (days)"><N value={s.cadence.expectedResponseDays} onChange={e=>updCad(s.id,{expectedResponseDays:+e.target.value||0})}/></Field>
              </div>
              <Field label="Depends on (chain — must hear back first)"><select style={inp} value={s.dependsOn||""} onChange={e=>upd(s.id,{dependsOn:e.target.value||undefined})}>
                <option value="">— none —</option>
                {sites.filter(x=>x.id!==s.id).map(x=><option key={x.id} value={x.id}>{x.name}</option>)}</select></Field>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                <Btn small kind="danger" disabled={refs>0} onClick={()=>rm(s.id)}>remove</Btn>
                {refs>0&&<span style={{fontSize:8.5,color:C.mute}}>{refs} request{refs>1?"s":""} reference this site — can’t remove</span>}
              </div>
            </div>}
          </div>;
        })}
      </div>
      <div style={{display:"flex",gap:8,marginTop:10}}>
        <Btn onClick={addSite}>+ add site</Btn>
        <div style={{flex:1}}/>
        {!embed&&<Btn kind="prim" onClick={onClose}>done</Btn>}
      </div>
    </div>;
  return embed?Inner:<Overlay onClose={onClose}>{Inner}</Overlay>;
}

/* ════════ PRESENCE LAYERS — primary, categorized, editable, JSON-importable (near the calendar) ════════ */
function LayersPanel({state,setState}){
  const [editing,setEditing]=useState(null);
  const [adding,setAdding]=useState("");
  const fileRef=useRef(),target=useRef(null);
  const layers=state.layers;
  const setLayers=fn=>setState(s=>({...s,layers:fn(s.layers)}));
  const setLayer=(id,patch)=>setLayers(ls=>ls.map(l=>l.id===id?{...l,...patch}:l));
  const toggle=id=>setLayers(ls=>ls.map(l=>l.id===id?{...l,visible:l.visible===false}:l));
  const addLayer=()=>{const id="L"+Date.now();setLayers(ls=>[...ls,{id,name:(adding.trim()||"New layer"),kind:"custom",color:"#888880",visible:true,ranges:[]}]);setAdding("");setEditing(id);};
  const del=id=>{setLayers(ls=>ls.filter(l=>l.id!==id));setEditing(null);};
  const setRanges=(id,fn)=>setLayers(ls=>ls.map(l=>l.id===id?{...l,ranges:fn(l.ranges||[])}:l));
  const addRange=id=>setRanges(id,rs=>[...rs,{from:`${YEAR}-01-01`,to:`${YEAR}-01-01`,label:""}].sort((a,b)=>a.from.localeCompare(b.from)));
  const updRange=(id,i,patch)=>setRanges(id,rs=>rs.map((r,j)=>j===i?{...r,...patch}:r));
  const rmRange=(id,i)=>setRanges(id,rs=>rs.filter((_,j)=>j!==i));
  const expL=l=>{const blob=new Blob([JSON.stringify(l.ranges||[],null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=l.name.replace(/\s+/g,"_")+".json";a.click();};
  const impL=e=>{const f=e.target.files?.[0],id=target.current;if(!f||!id)return;const rd=new FileReader();
    rd.onload=ev=>{try{const j=JSON.parse(ev.target.result);const arr=Array.isArray(j)?j:(j.ranges||[]);
      const norm=arr.map(r=>({from:r.from||r.s,to:r.to||r.e||r.from||r.s,label:String(r.label||r.l||"")})).filter(r=>DATE_RE.test(r.from||""));
      if(!norm.length){alert("No valid ranges (need from / s).");return;}
      setRanges(id,rs=>{const by=new Map(rs.map((r,i)=>[r.from,i]));const m=[...rs];for(const r of norm){if(by.has(r.from))m[by.get(r.from)]=r;else m.push(r);}return m.sort((a,b)=>a.from.localeCompare(b.from));});
      alert(`Imported ${norm.length} ranges into the layer.`);}catch(err){alert("Invalid JSON.");}};
    rd.readAsText(f);e.target.value="";};
  const ed=layers.find(l=>l.id===editing);
  const KIND={school:"school",holiday:"holiday",event:"event",custom:"custom"};
  return <div style={{border:`1px solid ${C.line}`,borderRadius:8,background:C.panel,padding:"9px 11px"}}>
    <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:7}}>
      <span style={{fontSize:9,fontWeight:800,letterSpacing:"0.05em",textTransform:"uppercase",color:C.gray}}>Presence layers</span>
      <span style={{fontSize:8,color:C.mute}}>tap to show/hide · ✎ to edit ranges & import JSON</span>
    </div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
      {layers.map(l=>{const on=l.visible!==false;return <span key={l.id}
        style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 7px",borderRadius:14,cursor:"pointer",
          border:`1px solid ${on?C.line:C.line2}`,background:on?C.panel2:"transparent",opacity:on?1:0.55}}>
        <span onClick={()=>toggle(l.id)} style={{display:"inline-flex",alignItems:"center",gap:5}}>
          <span style={{width:9,height:9,borderRadius:"50%",background:l.color,border:on?"none":`1px solid ${C.faint}`}}/>
          <span style={{fontSize:9.5,fontWeight:700,color:on?C.ink:C.mute}}>{l.name}</span>
          <span style={{fontSize:7.5,color:C.mute}}>{(l.ranges||[]).length}</span>
        </span>
        <span onClick={()=>setEditing(editing===l.id?null:l.id)} title="edit" style={{fontSize:9,color:editing===l.id?C.ink:C.mute,cursor:"pointer"}}>✎</span>
      </span>;})}
      <span style={{display:"inline-flex",alignItems:"center",gap:4}}>
        <input value={adding} onChange={e=>setAdding(e.target.value)} placeholder="+ layer" onKeyDown={e=>{if(e.key==="Enter")addLayer();}}
          style={{...inp,width:84,padding:"3px 7px",borderRadius:14}}/>
        <Btn small onClick={addLayer}>add</Btn>
      </span>
    </div>
    {ed&&<div style={{marginTop:9,paddingTop:9,borderTop:`1px solid ${C.line2}`}}>
      <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
        <input value={ed.name} onChange={e=>setLayer(ed.id,{name:e.target.value})} style={{...inp,width:150}}/>
        <select value={ed.kind} onChange={e=>setLayer(ed.id,{kind:e.target.value})} style={{...inp,width:96}}>
          {Object.keys(KIND).map(k=><option key={k} value={k}>{k}</option>)}</select>
        {ed.kind!=="school"&&<input type="color" value={/^#/.test(ed.color)?ed.color:"#888880"} onChange={e=>setLayer(ed.id,{color:e.target.value})} style={{width:28,height:24,padding:0,border:`1px solid ${C.line}`,borderRadius:4,background:C.panel,cursor:"pointer"}}/>}
        {ed.kind==="school"&&<span style={{fontSize:8,color:C.mute}}>drives days-out (Inv 9)</span>}
        <div style={{marginLeft:"auto",display:"flex",gap:5}}>
          <Btn small onClick={()=>{target.current=ed.id;fileRef.current.click();}}>↥ import</Btn>
          <Btn small onClick={()=>expL(ed)}>↧ export</Btn>
          <Btn small kind="danger" onClick={()=>del(ed.id)}>delete</Btn>
        </div>
      </div>
      <div style={{maxHeight:160,overflow:"auto"}}>
        {(ed.ranges||[]).length===0&&<div style={{fontSize:9,color:C.mute,fontStyle:"italic",padding:"4px 0"}}>No ranges. Add one or import JSON ({`[{from,to,label}]`} or {`{s,e,l}`}).</div>}
        {(ed.ranges||[]).map((r,i)=><div key={i} style={{display:"flex",gap:4,alignItems:"center",padding:"3px 0",borderBottom:`1px solid ${C.line2}`}}>
          <input style={{...inp,flex:1}} value={r.label} placeholder="label" onChange={e=>updRange(ed.id,i,{label:e.target.value})}/>
          <input type="date" style={{...inp,width:128}} value={r.from} onChange={e=>updRange(ed.id,i,{from:e.target.value})}/>
          <input type="date" style={{...inp,width:128}} value={r.to} onChange={e=>updRange(ed.id,i,{to:e.target.value})}/>
          <Btn small kind="danger" onClick={()=>rmRange(ed.id,i)}>×</Btn>
        </div>)}
      </div>
      <div style={{marginTop:7}}><Btn small onClick={()=>addRange(ed.id)}>+ add range</Btn></div>
      <input ref={fileRef} type="file" accept=".json" onChange={impL} style={{display:"none"}}/>
    </div>}
  </div>;
}

/* ════════ YEAR VIEW — the footprint / home base (§7): confirmed placements + pending ════════ */
const SHIFT_COL={day:"var(--shift-day)",night:"var(--shift-night)"};
const OVERRIDE_COL={day:"var(--ov-day)",night:"var(--ov-night)"};   // tentative (in-negotiation) shifts
const LOC_TINT={boston:"var(--tint-fam)",santa_fe:"var(--tint-fam)",abq:"var(--tint-fam)",montana:"var(--tint-fam)",portland:"var(--tint-fam)"};
function monthGrid(y,m){
  const f=(new Date(y,m,1).getDay()+6)%7,n=dim(y,m),wk=Math.ceil((f+n)/7);
  const cells=[];for(let i=0;i<wk*7;i++){const dn=i-f+1;cells.push(dn>=1&&dn<=n?new Date(y,m,dn):null);}
  return {cells,totalCols:wk*7};
}
function useFootprint(state){
  return useMemo(()=>{
    const siteById=Object.fromEntries(state.sites.map(s=>[s.id,s]));
    const byDay={},famBy={},lockBy={},perYM={};       // all keyed by full date / "Y-M" (multi-year)
    for(const r of state.requests){
      const s=siteById[r.siteId];if(!s)continue;
      const fp=r.footprint;
      if(fp.kind==="pinned"){
        for(const d of fp.dates){(byDay[d]=byDay[d]||[]).push({state:r.state,type:r.shiftType,site:s});
          if(r.state==="confirmed"){const dt=pd(d),k=`${dt.getFullYear()}-${dt.getMonth()}`;(perYM[k]=perYM[k]||{n:0,$:0});perYM[k].n++;perYM[k].$+=reqRate(r,s);}}
      }else if(r.state==="candidate"||r.state==="pending"){
        for(const d of fp.candidates){(byDay[d]=byDay[d]||[]).push({state:"smeared",type:r.shiftType,site:s});}
      }
    }
    for(const sp of state.trips){let d=pd(sp.from);const t=pd(sp.to);while(d<=t){famBy[ds(d)]={loc:sp.loc,wf:sp.workFactor,name:sp.name};d=ad(d,1);}}
    for(const l of state.locks)lockBy[l.date]=l;
    return {byDay,famBy,lockBy,perYM,loadYM:loadByYM(state)};
  },[state]);
}
/* layer-day coverage across a rendered year range, with future-year inference (shifted) */
function layerCoverage(layers,startY,endY){
  // for each layer+year, the ranges to use: real if present, else shift from the latest prior year that has any
  const byDayLayers={};                                // dateStr → [{id,name,color,kind,inferred}]
  for(const l of layers){
    if(l.visible===false)continue;
    const yearsWith=new Set((l.ranges||[]).map(r=>+r.from.slice(0,4)));
    for(let y=startY;y<=endY;y++){
      let src=y,inferred=false;
      if(!yearsWith.has(y)){
        const prior=[...yearsWith].filter(yy=>yy<y).sort((a,b)=>b-a)[0];
        if(prior==null)continue; src=prior;inferred=true;
      }
      const shift=y-src;
      for(const r of (l.ranges||[])){
        if(+r.from.slice(0,4)!==src)continue;
        let d=ad(pd(r.from),0);const t=pd(r.to);d.setFullYear(d.getFullYear()+shift);t.setFullYear(t.getFullYear()+shift);
        while(d<=t){const k=ds(d);(byDayLayers[k]=byDayLayers[k]||[]).push({id:l.id,name:l.name,color:l.color,kind:l.kind,inferred});d=ad(d,1);}
      }
    }
  }
  return byDayLayers;
}

function MonthRow({y,m,footprint,layerCov,selectable,sel,onSelect,ceiling,tool,drawSet,selReqDates,onCellDown}){

          <div style={{width:winW,height:"100%",background:C.bar}}/>
          <div style={{position:"absolute",left:Math.min(barW-1,barW*ceiling/Math.max(ceiling,load)),top:-1,bottom:-1,width:1,background:C.gray}}/>
        </div>

        <input type="date" style={{...inp,width:128}} value={t.from} onChange={e=>upd(t.id,{from:e.target.value})}/>
        <input type="date" style={{...inp,width:128}} value={t.to} onChange={e=>upd(t.id,{to:e.target.value})}/>
        <div style={{display:"inline-flex",border:`1px solid ${C.line}`,borderRadius:4,overflow:"hidden"}}>
          {WF.map(([k,l])=><button key={k} onClick={()=>upd(t.id,{workFactor:k})} title={WFNOTE[k]} style={{fontFamily:MONO,fontSize:8,fontWeight:700,
            padding:"3px 7px",border:"none",cursor:"pointer",background:t.workFactor===k?C.ink:"transparent",color:t.workFactor===k?C.bg:C.gray}}>{l}</button>)}
        </div>
      </div>
      <div style={{fontSize:7.5,color:C.mute,marginTop:4}}>{WFNOTE[t.workFactor]}</div>
    </div>)}
    <Btn small onClick={add}>+ add trip</Btn>
    <span style={{fontSize:8,color:C.mute,marginLeft:8}}>trips render on the calendar; closed trips strike out their days</span>
  </Drawer>;
}
function SitesWorksheet({state,setState}){
  const [open,setOpen]=useState(false);
  return <Drawer title="Sites" sub="rates, reach, cadence — near your windows" n={state.sites.length} open={open} setOpen={setOpen}>
    <SiteWizard state={state} setState={setState} embed/>
  </Drawer>;
}

/* ════════ APP SHELL ════════ */
function App(){
  const [state,setState]=useState(()=>{
    const fromUrl=readHashState();                       // a share-link wins on first load
    if(fromUrl){try{history.replaceState(null,"",location.pathname+location.search);}catch(_){}return fromUrl;}
    try{const s=localStorage.getItem("perDiemState");if(s){const v=sanitizeState(JSON.parse(s));if(v)return v;}}catch(e){}
    return seedState();
  });
  const [view,setView]=useState("calendar");   // one tab set, top on desktop / bottom on mobile
  const [monthIdx,setMonthIdx]=useState(7); // August — requests are open now
  const [isMobile,setIsMobile]=useState(()=>typeof window!=="undefined"&&window.matchMedia&&window.matchMedia("(max-width: 760px)").matches);
  const [toast,setToast]=useState(null);
  const [theme,setTheme]=useState(()=>{try{return localStorage.getItem("perDiemTheme")||"system";}catch(e){return "system";}}); // system|light|dark
  const fileRef=useRef();
  useEffect(()=>{const mq=window.matchMedia&&window.matchMedia("(max-width: 760px)");if(!mq)return;
    const h=()=>setIsMobile(mq.matches);if(mq.addEventListener){mq.addEventListener("change",h);return ()=>mq.removeEventListener("change",h);}},[]);
  useEffect(()=>{try{localStorage.setItem("perDiemState",JSON.stringify(state));}catch(e){}},[state]);
  useEffect(()=>{if(!toast)return;const t=setTimeout(()=>setToast(null),4000);return ()=>clearTimeout(t);},[toast]);
  // theme: follow device when "system", else explicit; reflected on <html data-theme>
  useEffect(()=>{
    const mq=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)");
    const apply=()=>{const eff=theme==="system"?((mq&&mq.matches)?"dark":"light"):theme;
      document.documentElement.setAttribute("data-theme",eff);};
    apply();try{localStorage.setItem("perDiemTheme",theme);}catch(e){}
    if(theme==="system"&&mq&&mq.addEventListener){mq.addEventListener("change",apply);return ()=>mq.removeEventListener("change",apply);}
  },[theme]);
  const themeIcon={system:"◐",light:"☀",dark:"☾"}[theme];
  const cycleTheme=()=>setTheme(t=>t==="system"?"light":t==="light"?"dark":"system");
  const tsp=useMemo(()=>typicalShiftPay(state.sites),[state.sites]);

  const exportJSON=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="per-diem.json";a.click();
  };
  const importJSON=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();
    rd.onload=ev=>{try{const v=sanitizeState(JSON.parse(ev.target.result));if(v){setState(v);}else alert("Couldn’t read that file — wrong shape.");}catch(err){alert("Invalid file");}};rd.readAsText(f);};
  const reset=()=>{if(confirm("Reset to seed data? This discards your requests and dials."))setState(seedState());};
  const share=()=>{
    const url=shareLink(state);
    if(!url){setToast("Couldn’t build a link (compressor unavailable).");return;}
    const big=url.length>8000;
    const msg=`Link copied · ${url.length.toLocaleString()} chars${big?" · ⚠ long, may not survive every browser/proxy":""}`;
    if(navigator.clipboard&&navigator.clipboard.writeText)
      navigator.clipboard.writeText(url).then(()=>setToast(msg)).catch(()=>{prompt("Copy this share link:",url);});
    else prompt("Copy this share link:",url);
  };

  const VIEWS=[["calendar","▦","Calendar"],["windows","▤","Windows"],["pending","◷","Pending"],["pace","∿","Pace"],["setup","⚙","Setup"]];
  const content=view==="pending"
    ? <Pending state={state} setState={setState} tsp={tsp}/>
    : <Board state={state} setState={setState} monthIdx={monthIdx} setMonthIdx={setMonthIdx} tsp={tsp} view={view}/>;
  return <div style={{fontFamily:MONO,color:C.ink,height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
    {/* header */}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px",
      borderBottom:`1px solid ${C.line}`,background:C.panel,flexShrink:0,gap:8,flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"baseline",gap:8}}>
        <span style={{fontSize:13,fontWeight:900,letterSpacing:"-0.03em"}}>PER DIEM</span>
        <span style={{fontSize:8.5,color:C.mute}}>surface, don’t choose</span>
      </div>
      <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
        <Btn small onClick={cycleTheme} title={`theme: ${theme}`}>{themeIcon}</Btn>
        <span style={{width:1,height:16,background:C.line}}/>
        <Btn small kind="prim" onClick={share}>share link</Btn>
        <Btn small onClick={exportJSON}>export</Btn>
        <Btn small onClick={()=>fileRef.current.click()}>import</Btn>
        <Btn small onClick={reset}>reset</Btn>
        <input ref={fileRef} type="file" accept=".json" onChange={importJSON} style={{display:"none"}}/>
      </div>
    </div>
    {toast&&<div style={{position:"fixed",bottom:isMobile?68:18,left:"50%",transform:"translateX(-50%)",zIndex:300,
      background:C.ink,color:C.bg,fontSize:10,fontWeight:600,padding:"8px 14px",borderRadius:6,
      boxShadow:"0 8px 24px rgba(0,0,0,.25)",maxWidth:"90vw",textAlign:"center"}}>{toast}</div>}
    {/* desktop: top tabs — each a view into the same model (calendar and windows are separate) */}
    {!isMobile&&<div style={{display:"flex",borderBottom:`1px solid ${C.line}`,background:C.panel,flexShrink:0}}>
      {VIEWS.map(([id,ic,label])=><button key={id} onClick={()=>setView(id)}
        style={{fontFamily:MONO,fontSize:11,fontWeight:800,padding:"9px 15px",border:"none",cursor:"pointer",
          background:"transparent",color:view===id?C.ink:C.mute,letterSpacing:"-0.01em",
          borderBottom:view===id?`2px solid ${C.ink}`:"2px solid transparent",marginBottom:-1}}>{label}</button>)}
      <span style={{marginLeft:"auto",alignSelf:"center",fontSize:8,color:C.mute,padding:"0 14px"}}>today {ds(TODAY)}</span>
    </div>}
    {/* surface — one active view */}
    <div style={{flex:1,minHeight:0}}>{content}</div>
    {/* mobile: bottom tab bar — the same views */}
    {isMobile&&<div style={{display:"flex",borderTop:`1px solid ${C.line}`,background:C.panel,flexShrink:0,paddingBottom:"env(safe-area-inset-bottom)"}}>
      {VIEWS.map(([id,ic,label])=>{
        const on=view===id;
        return <button key={id} onClick={()=>setView(id)} style={{flex:1,fontFamily:MONO,border:"none",cursor:"pointer",background:"transparent",
          padding:"7px 2px 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,
          color:on?C.ink:C.mute,borderTop:on?`2px solid ${C.ink}`:"2px solid transparent",marginTop:-1}}>
          <span style={{fontSize:14,lineHeight:1}}>{ic}</span>
          <span style={{fontSize:8,fontWeight:800,letterSpacing:"-0.01em"}}>{label}</span>
        </button>;
      })}
    </div>}
  </div>;
}
/* ════════ ERROR BOUNDARY — last-resort guard against a white screen ════════ */
class Boundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return {err};}
  componentDidCatch(e,info){console.error("Per Diem crashed:",e,info);}
  render(){
    if(!this.state.err)return this.props.children;
    return <div style={{fontFamily:MONO,maxWidth:440,margin:"12vh auto",padding:"0 20px",color:C.ink,textAlign:"center"}}>
      <div style={{fontSize:14,fontWeight:800,marginBottom:8}}>Something went sideways.</div>
      <div style={{fontSize:11,color:C.gray,lineHeight:1.6,marginBottom:16}}>
        The data couldn’t be rendered — usually a malformed share link or import.
        Your local copy is untouched until you reset.
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap"}}>
        <button onClick={()=>{try{history.replaceState(null,"",location.pathname);}catch(_){}location.reload();}}
          style={{fontFamily:MONO,fontSize:10,fontWeight:700,padding:"6px 12px",borderRadius:4,cursor:"pointer",border:`1px solid ${C.line}`,background:C.panel,color:C.ink}}>Drop link &amp; reload</button>
        <button onClick={()=>{try{localStorage.removeItem("perDiemState");history.replaceState(null,"",location.pathname);}catch(_){}location.reload();}}
          style={{fontFamily:MONO,fontSize:10,fontWeight:700,padding:"6px 12px",borderRadius:4,cursor:"pointer",border:`1px solid ${C.ink}`,background:C.ink,color:C.bg}}>Reset to sample</button>
      </div>
    </div>;
  }
}
ReactDOM.createRoot(document.getElementById("root")).render(<Boundary><App/></Boundary>);
</script>
</body>
</html>
