<style>
  *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;}
  input,textarea,select{user-select:text;-webkit-user-select:text;font-family:inherit;}
  html,body,#root{height:100%;}
  /* ── theme tokens: grayscale + Juniper Green / Ocean Blue ── */
  :root{
    --bg:#F7F6F4;--panel:#FFFFFF;--panel2:#FBFAF8;--ink:#1C1A18;--gray:#6B6660;--mute:#A6A09A;
    --line:#E6E3E0;--line2:#EFEDEA;--faint:#D5D1CD;
    --juniper:#3E7D63;--ocean:#356C88;--danger:#7A645E;
    --est:#7C766F;--est-line:#B8B2AB;--on-shift:#F7F6F4;
    --shift-day:#6E6A64;--shift-night:#2C2A27;--ov-day:#B7B2AB;--ov-night:#8A857E;
    --tint-fam:#EEEAE3;--tint-out:#ECE7E0;--weekend:#F1EFEC;--sel:#EFEAE1;
    --block-fam:#E6F0E9;--block-trip:#E6EEF3;   /* family-calendar = green · trip = blue */

    --press-1:#F2ECE6;--press-2:#E1CDC2;--press-3:#D1AF9E;--press-4:#C0907A;   /* pressure = clay ramp */
    --shadow:rgba(28,26,24,.14);--shadow-sm:rgba(28,26,24,.08);
  }
  :root[data-theme="dark"]{
    --bg:#141310;--panel:#221F1B;--panel2:#1A1714;--ink:#F0ECE6;--gray:#B2ABA1;--mute:#7E776C;
    --line:#4A4239;--line2:#373028;--faint:#5A5147;
    --juniper:#7CC79C;--ocean:#6FB6D6;--danger:#CDA59B;
    --est:#B0A89D;--est-line:#5E574E;--on-shift:#16140F;
    --shift-day:#C6BAA6;--shift-night:#8E877C;--ov-day:#6E685E;--ov-night:#938C81;
    --tint-fam:#2B2722;--tint-out:#2F2A25;--weekend:#1B1916;--sel:#332D25;
    --block-fam:#21342B;--block-trip:#1F3039;   /* family-calendar = green · trip = blue */
    --good-soft:#21342B;--info-soft:#1F3039;--warn-soft:#33291F;--press-hot:#E0AFA3;
    --bar:#6C6358;--glow-bd:#514A41;--glow-bd2:#7A7165;
    --press-1:#241C18;--press-2:#3D2B23;--press-3:#553B2F;--press-4:#6E4A3A;   /* pressure = clay ramp */
    --shadow:rgba(0,0,0,.5);--shadow-sm:rgba(0,0,0,.34);
  }
  body{overflow:hidden;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;transition:background .2s ease,color .2s ease;}
  #loader{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;background:var(--bg);font-family:'SF Mono','JetBrains Mono',monospace;}
  #loader span{font-size:13px;font-weight:600;color:var(--gray);letter-spacing:-0.02em;}
  #loader .bar{width:120px;height:3px;background:var(--line);border-radius:2px;overflow:hidden;}
  #loader .bar::after{content:'';display:block;width:40%;height:100%;background:var(--ink);border-radius:2px;animation:load 1s ease infinite;}
  @keyframes load{0%{transform:translateX(-100%)}50%{transform:translateX(200%)}100%{transform:translateX(-100%)}}
  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--faint);border-radius:4px;}
  @media (prefers-color-scheme:dark){:root:not([data-theme]){color-scheme:dark;}}
</style>
<script>
  /* set theme before paint to avoid a flash */
  (function(){try{var t=localStorage.getItem('perDiemTheme')||'system';
    var d=t==='dark'||(t==='system'&&window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.setAttribute('data-theme',d?'dark':'light');}catch(e){}})();
</script>

<script type="text/babel">
const {useState,useMemo,useCallback,useRef,useEffect}=React;

/* ════════════════════════════════════════════════════════════
   PER DIEM — a pressure-display grammar prototype.
   Implements per-diem-build-spec.md: typed entities (§3), exact
   formulas (§4), three surfaces (§6), the request lifecycle (§5),
   and the hard invariants (§8). It computes brightness for
   SURFACING and shows raw facts separately for CHOOSING. It never
   ranks, recommends, or acts.
   ════════════════════════════════════════════════════════════ */

/* ─── palette → CSS variables (grayscale + Juniper Green / Ocean Blue; dark-mode aware).
   Call sites keep using C.x; the value is now a var() the browser resolves per theme.
   Semantic accents remap: blue→ocean, green→juniper, red→danger (muted). ─── */
const V=k=>`var(--${k})`;
const C={ink:V("ink"),bg:V("bg"),panel:V("panel"),panel2:V("panel2"),line:V("line"),line2:V("line2"),
  gray:V("gray"),mute:V("mute"),faint:V("faint"),blue:V("ocean"),red:V("danger"),
  est:V("est"),estLine:V("est-line"),green:V("juniper"),juniper:V("juniper"),ocean:V("ocean"),
  softGood:V("good-soft"),softInfo:V("info-soft"),softWarn:V("warn-soft"),sel:V("sel"),
  weekend:V("weekend"),tintOut:V("tint-out"),pressHot:V("press-hot"),bar:V("bar"),
  blockFam:V("block-fam"),blockTrip:V("block-trip")};
const MONO="'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace";
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONL=["January","February","March","April","May","June","July","August","September","October","November","December"];

/* ─── today (spec context: 2026-06-14) ─── */
const TODAY=new Date(2026,5,14);
const YEAR=2026;
const START_M=5;   // earliest month shown on the calendar (June 2026) — no data before, so 2025 + Jan–May are jettisoned

/* ─── dates ─── */
const ds=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const pd=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const ad=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const days=(a,b)=>Math.round((b-a)/864e5);
const dim=(y,m)=>new Date(y,m+1,0).getDate();
const firstOfMonth=d=>new Date(d.getFullYear(),d.getMonth(),1);
// deadlines are per site + per month: every shift in a month shares one due date = month start − the site's lead.
const monthDueBy=(d,leadDays)=>ds(ad(firstOfMonth(typeof d==="string"?pd(d):d),-(leadDays||0)));
const fmtDT=d=>`${MON[d.getMonth()]} ${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
const clamp01=x=>Math.max(0,Math.min(1,x));
const fmt$=v=>"$"+Math.round(v).toLocaleString();
const fmtK=v=>"$"+(Math.round(v/100)/10).toLocaleString()+"k";

/* ─── Estimate provenance (§3.5) ─── */
const known=v=>({value:v,basis:"known"});
const est=(v,assumptions)=>({value:v,basis:"estimate",assumptions});

/* ─── reach adjacency: LocationId × Reach → travel hours (§4.2) ───
   Family-presence location → hours to reach a site of each tier.
   Table-driven, not hardcoded conditionals. Montana→nm reads cheap. */
const REACH_ADJ={
  boston:  {local:1,  nm:8,   rural_nm:11},
  santa_fe:{local:8,  nm:1.5, rural_nm:3.5},
  abq:     {local:8,  nm:1.5, rural_nm:3},
  montana: {local:9,  nm:2.5, rural_nm:4.5},   // Montana→nm reads cheap
  portland:{local:8,  nm:7,   rural_nm:9},
};
const CHEAP_HRS=4;                                   // <= ⇒ co-located
const ROUNDTRIP={local:1.5,nm:8,rural_nm:12};        // roundTripTravelHrs by reach
/* ─── shift catalog — a shift is (start, duration); "night" = an overnight start ─── */
const SHIFTS=[
  {id:"d6", start:"06:00",hours:8, night:false,label:"6a · 8h"},
  {id:"d7", start:"07:00",hours:8, night:false,label:"7a · 8h"},
  {id:"d10",start:"10:00",hours:8, night:false,label:"10a · 8h"},
  {id:"d11",start:"11:00",hours:8, night:false,label:"11a · 8h"},
  {id:"n22",start:"22:00",hours:8, night:true, label:"10p · 8h"},
  {id:"n23",start:"23:00",hours:8, night:true, label:"11p · 8h"},
  {id:"D7", start:"07:00",hours:12,night:false,label:"7a · 12h"},
  {id:"N19",start:"19:00",hours:12,night:true, label:"7p · 12h"},
];
const SHIFT_BY=Object.fromEntries(SHIFTS.map(s=>[s.id,s]));
const REST_BY_DUR={8:10,12:12};                      // default rest after a shift, by duration (estimate)
/* a request's shiftType is either a coarse CATEGORY ("day"/"night") or a specific catalog id.
   candidates request coarse; the site's answer (negotiation/booking) can be a specific shift. */
const isCat=t=>t==="day"||t==="night";
const CATS=[{id:"day",label:"Day"},{id:"night",label:"Night"}];
const shiftOf=id=>SHIFT_BY[id]||SHIFT_BY.d7;          // unknown ids fall back to a 7a/8h day
const shiftHours=id=>shiftOf(id).hours;
const shiftStart=id=>shiftOf(id).start;
const shiftIsNight=t=>t==="night"?true:t==="day"?false:shiftOf(t).night;
const shiftLabel=t=>t==="day"?"Day":t==="night"?"Night":shiftOf(t).label;
const shiftRestDefault=id=>REST_BY_DUR[shiftHours(id)]||10;
// per-reach default travel schedule — when you leave home & when you get back, relative to the shift block.
// Lydia edits these per site (real flight timing); a request can override with its own (incl. multi-day) window.
const TRAVEL_DEFAULT={
  local:   {beforeDays:0,departTime:"06:00",afterDays:0,returnTime:"20:00"},   // drive in, home that evening
  nm:      {beforeDays:1,departTime:"15:00",afterDays:0,returnTime:"22:00"},   // fly out the day before, home late after the last shift
  rural_nm:{beforeDays:1,departTime:"11:00",afterDays:1,returnTime:"13:00"},   // long haul out & back
};
const defaultTravel=reach=>({...(TRAVEL_DEFAULT[reach]||TRAVEL_DEFAULT.local)});
const KID_AWAKE_START=7,KID_AWAKE_END=20;            // kid-awake band (7a–8p) — the only hours a trip can cost
const LOC_NAME={boston:"Boston",santa_fe:"Santa Fe",abq:"Albuquerque",montana:"Montana",portland:"Portland"};
const REACH_LABEL={local:"local",nm:"NM",rural_nm:"rural NM"};

/* ─── pace tag weights (§3.4) ─── */
const TAG_W={summer:0,light:0.55,normal:1,heavy:1.5,travel:0.5};
const TAGS=["summer","light","normal","heavy","travel"];

/* ─── brightness weights — FIXED v1 defaults, NOT user knobs (§4.3, Inv 1) ─── */
/* work quality ($/hr ER) is NOT a brightness factor — it stays a raw choosing
   column. familyEfficiency is the only money-derived term, so glow leans on fit. */
const BW={familyEfficiency:0.28,coLocation:0.19,lowDaysOut:0.17,quotaFit:0.23,closing:0.13};
const BW_EST={familyEfficiency:true,coLocation:false,lowDaysOut:false,quotaFit:true,closing:false};
const BW_LABEL={familyEfficiency:"family efficiency",coLocation:"co-location",lowDaysOut:"low days-out",quotaFit:"quota fit",closing:"closing"};
const BUCKETS=["dim","normal","bright","brightest"];
const BUCKET_LABEL={dim:"low",normal:"fair",bright:"good",brightest:"best"};   // plain "fit" wording for the same buckets
function coarseBucket(s){return s<0.34?"dim":s<0.55?"normal":s<0.74?"bright":"brightest";}

/* ════════ SEED STATE ════════ */
function seedState(){
  const sites=[
    {id:"boston",  name:"Boston ED",   note:"home rink. easy charting, know the nurses.",
     reach:"local",   homeBaseLoc:"boston",  menu:[{shift:"d7",rate:245,rest:10},{shift:"n22",rate:290,rest:12}],
     submissionType:"by_shift",  cadence:{opensDaysBefore:75,dueByDaysBefore:21,expectedResponseDays:14},
     travel:{beforeDays:0,departTime:"06:00",afterDays:0,returnTime:"20:00"}},
    {id:"santa_fe",name:"Santa Fe ED", note:"good people. depends on hearing from ABQ first.",
     reach:"nm",      homeBaseLoc:"santa_fe",menu:[{shift:"d7",rate:170,rest:10},{shift:"N19",rate:210,rest:12}],
     submissionType:"by_window", cadence:{opensDaysBefore:90,dueByDaysBefore:30,expectedResponseDays:10},
     travel:{beforeDays:1,departTime:"16:00",afterDays:0,returnTime:"22:00"}},
    {id:"abq",     name:"Albuquerque ED",note:"high volume, fast. anchors the NM trip.",
     reach:"nm",      homeBaseLoc:"abq",     menu:[{shift:"d7",rate:285,rest:10},{shift:"n23",rate:305,rest:12}],
     submissionType:"by_shift",  cadence:{opensDaysBefore:80,dueByDaysBefore:25,expectedResponseDays:7},
     travel:{beforeDays:1,departTime:"15:00",afterDays:0,returnTime:"21:00"}},
    {id:"gallup",  name:"Silver City ED",note:"rural, long days, pays for it. tiring.",
     reach:"rural_nm",homeBaseLoc:"abq",     menu:[{shift:"D7",rate:300,rest:12},{shift:"N19",rate:335,rest:14}],
     submissionType:"by_window", cadence:{opensDaysBefore:70,dueByDaysBefore:14,expectedResponseDays:21},
     travel:{beforeDays:1,departTime:"11:00",afterDays:1,returnTime:"13:00"}},
  ];
  // trips — family travel; workFactor: colocate (work locally), commute (leave to work), closed (no work)
  const trips=[
    {id:"t1",name:"Santa Fe summer",from:"2026-08-01",to:"2026-08-21",loc:"santa_fe",workFactor:"colocate"},
    {id:"t2",name:"Montana cabin",from:"2026-07-04",to:"2026-07-12",loc:"montana",workFactor:"commute"},
    {id:"t3",name:"Japan",from:"2026-03-14",to:"2026-03-28",loc:"boston",workFactor:"closed"},   // international → windows closed
    {id:"t4",name:"Holidays home",from:"2026-12-22",to:"2027-01-02",loc:"boston",workFactor:"colocate"},
  ];
  const locks=[
    {date:"2026-08-15",kind:"hard",label:"anniversary"},
    {date:"2026-08-08",kind:"soft",recoveryBufferHrs:24,label:"recital"},
  ];
  // presence layers — Juni's days come from BISB's 2026–27 calendar; Ocean's from SolBe's summer.
  const layers=[
    {id:"jun",name:"Juni (BISB)",kind:"school",childId:"juniper",color:"var(--juniper)",visible:true,daysOutWeight:1,
     ranges:[{from:"2026-06-18",to:"2026-08-23",label:"Summer (BISB resumes 8/24)"},
       {from:"2026-09-07",to:"2026-09-07",label:"Labor Day"},{from:"2026-10-12",to:"2026-10-16",label:"Mid-term Break / Columbus Day"},
       {from:"2026-10-19",to:"2026-10-19",label:"Staff Training (no school)"},{from:"2026-11-11",to:"2026-11-11",label:"Veterans Day"},
       {from:"2026-11-17",to:"2026-11-17",label:"Parent-Teacher Conferences"},{from:"2026-11-25",to:"2026-11-27",label:"Thanksgiving"},
       {from:"2026-12-18",to:"2026-12-18",label:"End of Fall Term (half day)"},{from:"2026-12-21",to:"2027-01-03",label:"Winter Break (resumes 1/4)"},
       {from:"2027-01-18",to:"2027-01-18",label:"MLK Day"},{from:"2027-02-11",to:"2027-02-11",label:"Staff Training (no school)"},
       {from:"2027-02-12",to:"2027-02-15",label:"Mid-term Break / Presidents Day"},{from:"2027-03-09",to:"2027-03-09",label:"Parent-Teacher Conferences"},
       {from:"2027-03-12",to:"2027-03-12",label:"End of Winter Term (half day)"},{from:"2027-03-15",to:"2027-03-26",label:"Spring Break"},
       {from:"2027-04-19",to:"2027-04-19",label:"Patriots Day"},{from:"2027-05-27",to:"2027-05-31",label:"Mid-term Break / Memorial Day"},
       {from:"2027-06-18",to:"2027-06-18",label:"Juneteenth"},{from:"2027-06-23",to:"2027-06-23",label:"Last Day (half day)"},
       {from:"2027-06-24",to:"2027-08-20",label:"Summer 2027"}]},
    {id:"oce",name:"Ocean (SolBe)",kind:"school",childId:"ocean",color:"var(--ocean)",visible:true,daysOutWeight:1,
     ranges:[{from:"2026-06-19",to:"2026-06-19",label:"SolBe closed (Juneteenth)"},{from:"2026-06-26",to:"2026-06-26",label:"Family event"},
       {from:"2026-07-04",to:"2026-07-04",label:"SolBe closed (July 4)"},{from:"2026-08-22",to:"2026-08-31",label:"SolBe ends → new school 9/1"}]},
    {id:"hol",name:"Holidays",kind:"holiday",color:"var(--ink)",visible:true,
     ranges:[{from:"2026-01-01",to:"2026-01-01",label:"New Year"},{from:"2026-05-25",to:"2026-05-25",label:"Memorial"},
       {from:"2026-07-04",to:"2026-07-04",label:"July 4"},{from:"2026-09-07",to:"2026-09-07",label:"Labor"},
       {from:"2026-11-26",to:"2026-11-26",label:"Thanksgiving"},{from:"2026-12-25",to:"2026-12-25",label:"Christmas"}]},
    {id:"evt",name:"Events",kind:"event",color:"var(--est)",visible:true,
     ranges:[{from:"2026-08-08",to:"2026-08-08",label:"Recital"},{from:"2026-10-10",to:"2026-10-11",label:"Soccer tourney"}]},
  ];
  const pace={
    pressureCeiling:7,   // soft comfortable max shifts / month
    // shifts per month — back-loaded: lighter through spring/summer, ramps into the fall
    curve:[
      {month:1,shifts:2},{month:2,shifts:2},{month:3,shifts:4},{month:4,shifts:4},
      {month:5,shifts:2},{month:6,shifts:2},{month:7,shifts:4},{month:8,shifts:6},
      {month:9,shifts:6},{month:10,shifts:6},{month:11,shifts:2},{month:12,shifts:4},
    ],
    curves:{},   // per-year overrides; absent years fall back to the curve above
  };
  // Lydia's confirmed S-PHY shifts, imported from her work calendar → Boston home site.
  // night = overnight starts (10p/11p); everything else = day. Past dates feed booked/floor.
  const LYDIA=[
    ["2026-06-03","day"],["2026-06-05","day"],["2026-06-06","day"],["2026-06-09","day"],
    ["2026-06-13","day"],["2026-06-15","day"],["2026-06-16","day"],["2026-06-17","day"],
    ["2026-06-18","day"],["2026-06-19","night"],["2026-06-23","night"],["2026-06-24","night"],
    ["2026-06-25","night"],["2026-06-27","day"],["2026-06-28","day"],["2026-06-30","day"],
    ["2026-07-07","day"],["2026-07-08","day"],["2026-07-09","day"],["2026-07-30","day"],["2026-07-31","day"],
  ];
  const requests=[
    // confirmed work (real) → Past (worked) + Confirmed (upcoming), both on the calendar
    ...LYDIA.map((s,i)=>cReq("L"+String(i+1).padStart(2,"0"),"boston",s[1]==="night"?"n22":"d7",[s[0]])),
    // ── per-diem requests in flight (illustrative — the sources carry no per-diem asks) ──
    // submitted, awaiting the site's response → Pending (its earlier due date anchors the emergent chain)
    {id:"s1",siteId:"abq",shiftType:"day",opens:"2026-04-13",dueBy:"2026-05-08",
     state:"pending",submittedOn:"2026-05-02",expectedResponseBy:"2026-06-20",
     footprint:{kind:"pinned",dates:["2026-07-23","2026-07-24","2026-07-27"]}},
    // negotiating — site countered with different dates + a rate; shows on the calendar
    {id:"ov1",siteId:"santa_fe",shiftType:"d7",opens:"2026-04-20",dueBy:"2026-06-10",
     state:"override",submittedOn:"2026-05-15",expectedResponseBy:"2026-06-18",rateOverride:185,
     footprint:{kind:"pinned",dates:["2026-07-21","2026-07-22","2026-07-28"]}},
    // selected to apply for → the Candidate section (a density window: work 2 of 5, dependency chain on ABQ)
    {id:"s2",siteId:"santa_fe",shiftType:"day",opens:"2026-04-08",dueBy:"2026-06-25",
     state:"candidate",
     footprint:{kind:"pinned",dates:["2026-07-13","2026-07-14","2026-07-15","2026-07-16","2026-07-17"],target:2}},
    {id:"s3",siteId:"gallup",shiftType:"day",opens:"2026-05-01",dueBy:"2026-07-01",
     state:"candidate",
     footprint:{kind:"pinned",dates:["2026-08-04","2026-08-05"]}},
  ];
  return {sites,trips,locks,layers,pace,requests};
}
function cReq(id,siteId,shiftType,dates){
  return {id,siteId,shiftType,opens:ds(ad(pd(dates[0]),-70)),dueBy:ds(ad(pd(dates[0]),-25)),
    state:"confirmed",submittedOn:ds(ad(pd(dates[0]),-40)),resolvedOn:ds(ad(pd(dates[0]),-30)),
    expectedResponseBy:ds(ad(pd(dates[0]),-26)),footprint:{kind:"pinned",dates}};
}

/* ════════ STATE SANITY (keep the page from crashing on bad input) ════════
   Every load path — localStorage, file import, or a share-link in the URL —
   passes through sanitizeState. Unknown/garbage fields fall back to seed
   defaults; malformed requests are dropped; old schemas migrate forward. */
const DATE_RE=/^\d{4}-\d{2}-\d{2}$/;
const isDateArr=a=>Array.isArray(a)&&a.length>0&&a.every(d=>typeof d==="string"&&DATE_RE.test(d));
const numOr=(v,d)=>Number.isFinite(+v)?+v:d;
function sanitizePace(p,def){
  if(!p||typeof p!=="object")return def;

/* ════════ DERIVED VALUES & FORMULAS (§4) — all readouts (Inv 5) ════════ */

const siteMenu=s=>s&&Array.isArray(s.menu)&&s.menu.length?s.menu             // a site's offered shifts …

const resolveShiftId=(site,t)=>isCat(t)?repShiftId(site,t):t;               // category → a concrete representative shift

const siteRate=(s,t)=>{const id=resolveShiftId(s,t),m=menuEntry(s,id);return m&&Number.isFinite(m.rate)?m.rate:(shiftIsNight(id)?numOr(s&&s.nightRate,240):numOr(s&&s.dayRate,200));};  // $/hr

const fpTarget=fp=>Number.isFinite(fp.target)?Math.max(1,Math.min(fp.dates.length,fp.target)):fp.dates.length;

/* lifecycle: candidate → pending → (override) → confirmed; rejected/expired persist.
   reqRate honors a negotiated rateOverride. OCCUPY = shows on calendar + presses the
   month; TENTATIVE = occupies but not yet booked money. */
const REQ_STATES=["candidate","pending","override","confirmed","rejected","expired"];
const OCCUPY=["candidate","pending","override","confirmed"];

const reqBonus=r=>Number.isFinite(r.bonusOverride)?r.bonusOverride:0;                          // flat $ per shift (negotiated)
const reqShiftPay=(r,s)=>reqRate(r,s)*siteHours(s,r.shiftType)+reqBonus(r);                     // $/hr × clinical hours + flat bonus = per-shift pay
const reqDates=r=>r.footprint.dates;

const EDITABLE=["candidate"];          // only candidate drafts can be drawn/nudged/erased — the calendar is a drafting space

/* calendar-drawing helpers (the main verb) — every day in the span, weekends included */

const shiftDates=(dates,delta)=>dates.map(x=>ds(ad(pd(x),delta))).sort();
/* forgiving hit-test: the date under (x,y), or the nearest cell within ~60px */
function nearestDate(x,y){
  const el=document.elementFromPoint(x,y),c=el&&el.closest&&el.closest("[data-date]");
  if(c)return c.dataset.date;
  let best=null,bd=1e9;
  document.querySelectorAll("[data-date]").forEach(n=>{const r=n.getBoundingClientRect();
    const dx=Math.max(r.left-x,0,x-r.right),dy=Math.max(r.top-y,0,y-r.bottom);const d=Math.hypot(dx,dy);
    if(d<bd){bd=d;best=n.dataset.date;}});

}
/* automerge: contiguous candidate work-windows of the same site+type → one coherent block */
function mergeCandidates(requests){
  const cands=requests.filter(r=>r.state==="candidate"&&!reqIsDensity(r));   // density windows stand alone — never auto-merged
  const rest=requests.filter(r=>!(r.state==="candidate"&&!reqIsDensity(r)));
  const groups={};
  for(const r of cands)(groups[r.siteId+"|"+r.shiftType]=groups[r.siteId+"|"+r.shiftType]||[]).push(r);
  const out=[];
  for(const k in groups){
    const list=groups[k].slice().sort((a,b)=>reqMinDate(a).localeCompare(reqMinDate(b)));
    let cur=null;
    for(const r of list){
      if(!cur){cur={...r,footprint:{kind:"pinned",dates:[...r.footprint.dates]}};continue;}
      if(days(pd(reqMaxDate(cur)),pd(reqMinDate(r)))<=1){   // truly adjacent — weekends are just another day, never bridged
        cur.footprint.dates=Array.from(new Set([...cur.footprint.dates,...r.footprint.dates])).sort();
        if(r.opens<cur.opens)cur.opens=r.opens; if(r.dueBy<cur.dueBy)cur.dueBy=r.dueBy;

function makeWindow(site,type,dates){                       // a drawn window → a candidate request
  if(!dates.length)return null;
  const first=dates[0];
  return {id:"r"+Date.now()+Math.floor(Math.random()*1e3),siteId:site.id,shiftType:type,
    opens:ds(ad(pd(first),-(site.cadence.opensDaysBefore||60))),dueBy:monthDueBy(first,site.cadence.dueByDaysBefore||21),
    state:"candidate",footprint:{kind:"pinned",dates:dates.slice().sort()}};

/* typicalShiftPay — estimate; carries assumption (§4.4) */
function typicalShiftPay(sites){
  const v=sites.reduce((a,s)=>{const m=siteMenu(s);return a+(m.length?m.reduce((x,e)=>x+e.rate*shiftHours(e.shift),0)/m.length:0);},0)/Math.max(1,sites.length);
  return est(Math.round(v/10)*10,["typicalShiftPay = mean of site day/night ($/hr × hours)"]);

/* §4.2 co-location + travel — trips with workFactor: colocate / commute / closed */
const placed=t=>t.placed!==false&&DATE_RE.test(t.from||"")&&DATE_RE.test(t.to||"");

function coLocation(site,weekDates,trips){
  for(const sp of trips){
    if(!placed(sp)||sp.workFactor!=="colocate")continue;   // only a placed, co-locating trip makes a site cheap
    if(!tripOverlaps(sp,weekDates))continue;
    const hrs=(REACH_ADJ[sp.loc]||{})[site.reach];
    if(hrs!=null&&hrs<=CHEAP_HRS)return {coLocated:true,loc:sp.loc,hrs};
  }

function travelHours(site,weekDates,trips){
  const co=coLocation(site,weekDates,trips);
  return co.coLocated?co.hrs:ROUNDTRIP[site.reach];
}

/* §4.1 per-window money — facts for choosing */
function windowMoney(site,type,weekDates,trips){
  const hourly=siteRate(site,type);                  // $/hr (type is a catalog shift id)
  const clinicalHours=siteHours(site,type);
  const shiftPay=hourly*clinicalHours;
  const erPerHr=known(hourly);
  const travel=travelHours(site,weekDates,trips);
  const rest=siteRest(site,type);
  const awayHours=travel+clinicalHours+rest;
  const awayPerHr=est(shiftPay/awayHours,
    [`restHours(${shiftLabel(type)})=${rest}`,`travelHours=${travel}`]);
  return {shiftPay,clinicalHours,erPerHr,awayPerHr,awayHours,travel};
}

/* ─── kid-awake hours: the family-time cost of a trip ───
   A trip's away window runs from departure (beforeDays before the first shift, at departTime)
   to return (afterDays after the last shift, at returnTime). Its cost is the kid-awake hours
   (7a–8p) it overlaps, summed per day — so night shifts and late travel land precisely. */
const parseHM=t=>{const m=/^(\d{1,2}):(\d{2})$/.exec(String(t||""));return m?Math.min(24,(+m[1])+(+m[2])/60):0;};

    const hi=Math.min(atHM(day,KID_AWAKE_END).getTime(),end.getTime());
    if(hi>lo)total+=(hi-lo)/36e5;

// resolve a site's travel (or a per-request override) into clean {beforeDays,departTime,afterDays,returnTime}
const travelOf=(site,ov)=>{const d=defaultTravel(site&&site.reach),t=(ov&&typeof ov==="object")?ov:((site&&site.travel)||{});

    afterDays:Math.max(0,numOr(t.afterDays,d.afterDays)),returnTime:/^\d{1,2}:\d{2}$/.test(t.returnTime||"")?t.returnTime:d.returnTime};};
const COMMUTE_H=1.5;                                 // local door-to-door buffer on each side of a shift
/* away intervals for a set of shift dates at a given shift type.

  if(t.beforeDays>0||t.afterDays>0){
    const start=atHM(ad(pd(s[0]),-t.beforeDays),parseHM(t.departTime));
    const lastEnd=atHM(pd(s[s.length-1]),parseHM(sh.start)+sh.hours);
    const ret=atHM(ad(pd(s[s.length-1]),t.afterDays),parseHM(t.returnTime));
    return {t,intervals:[{start,end:ret>lastEnd?ret:lastEnd}]};
  }
  return {t,intervals:s.map(d=>({start:atHM(pd(d),parseHM(sh.start)-COMMUTE_H),end:atHM(pd(d),parseHM(sh.start)+sh.hours+COMMUTE_H)}))};
}
/* default kid-awake hours for one shift, kids home all day — the local shift interval ∩ the 7a–8p band.

function defaultKidHours(shiftId){const sh=shiftOf(shiftId),base=new Date(2026,0,5);   // reference day; band overlap is date-independent

const siteKidHours=(s,t)=>{const id=resolveShiftId(s,t),m=menuEntry(s,id);return m&&Number.isFinite(m.kidHours)?m.kidHours:defaultKidHours(id);};
/* family-time cost: the per-shift kid-awake hours (typed or default) × the days each kid is home

function kidHoursCost(dates,site,ov,shiftType,layers){
  if(!dates||!dates.length)return {hours:0,perShift:0,perKid:[],window:null,t:travelOf(site,ov)};
  const id=resolveShiftId(site,shiftType),perShift=siteKidHours(site,shiftType);

/* a shift's clinical wall-clock interval on a date (no commute) — for booking exclusivity.

function shiftInterval(dateStr,shiftId){const sh=shiftOf(shiftId);const start=atHM(pd(dateStr),parseHM(sh.start));
  return {start,end:new Date(start.getTime()+sh.hours*36e5)};}
const intervalsOverlap=(a,b)=>a.start<b.end&&b.start<a.end;
/* confirmed shifts as wall-clock instances; a new booking can't overlap one in time. */
function confirmedInstances(requests,ignoreId){
  const out=[];

    for(const d of r.footprint.dates)out.push({id:r.id,date:d,shift:r.shiftType,...shiftInterval(d,r.shiftType)});}

const layerCovers=(l,d)=>(l.ranges||[]).some(r=>d>=pd(r.from)&&d<=pd(r.to));

function weekDaysOut(weekDates,layers){
  const sch=schoolLayers(layers);let out=0;
  for(const d of weekDates){
    const dow=d.getDay();let w=0;
    if(dow===0||dow===6)w=1;                     // weekend → kids home
    for(const l of sch)if(layerCovers(l,d)){w=Math.max(w,l.daysOutWeight||1);break;}
    out+=w;
  }
  return out;                                     // 0..7

   (weekend or break). The family-time cost of a window, recorded per child. */
function kidDaysOut(dateStrs,layers){
  return schoolLayers(layers).map(l=>{
    let count=0;
    for(const s of dateStrs){const d=pd(s),we=d.getDay()===0||d.getDay()===6;
      if(we||layerCovers(l,d))count++;}
    const nm=l.childId?l.childId[0].toUpperCase()+l.childId.slice(1):l.name;
    return {childId:l.childId||l.id,name:nm,count,of:dateStrs.length};
  });
}

/* shift-days committed/pending per year-month ("Y-M"), split confirmed vs window (§ two-layer pressure) */
function loadByYM(state){
  const by={};const add=(k,n,conf)=>{by[k]=by[k]||{conf:0,win:0};by[k][conf?"conf":"win"]+=n;};
  for(const r of state.requests){
    if(!OCCUPY.includes(r.state))continue;
    const conf=r.state==="confirmed"||r.state==="override";   // locked/near-locked load vs speculative window load
    if(reqIsDensity(r)){
      const dt=pd(r.footprint.dates[0]);add(`${dt.getFullYear()}-${dt.getMonth()}`,shiftCount(r),conf);   // density → target shifts, anchored at the window's start
    }else{
      for(const d of r.footprint.dates){const dt=pd(d);add(`${dt.getFullYear()}-${dt.getMonth()}`,1,conf);}
    }

function pressureTint(load,ceil){

  if(p<0.85)return "var(--press-2)";
  if(p<1.05)return "var(--press-3)";   // at the comfortable ceiling

const PRESS_RAMP=["var(--press-1)","var(--press-2)","var(--press-3)","var(--press-4)"];

/* §4.4 the curve is now SHIFTS per month; dollars extrapolate as shifts × typicalShiftPay.

   Per-year: pace.curves[year] overrides the default pace.curve; for YEAR the pre-floor
   months (Jan–May 2026) are zeroed — no data there, so they don't skew the projection. */
const curveFor=(pace,year)=>{const b=(pace.curves&&pace.curves[year])||pace.curve;
  return (year===YEAR&&START_M>0)?b.map((m,i)=>i<START_M?{...m,shifts:0}:m):b;};
const monthShifts=(pace,m,year=YEAR)=>curveFor(pace,year)[m].shifts||0;
const totalShifts=(pace,year=YEAR)=>curveFor(pace,year).reduce((a,m)=>a+(m.shifts||0),0);
const annualTargetOf=(pace,tsp,year=YEAR)=>totalShifts(pace,year)*tsp.value;
function curveShares(pace,year=YEAR){
  const tot=totalShifts(pace,year);
  return curveFor(pace,year).map(m=>tot>0?(m.shifts||0)/tot:1/12);
}
function monthQuota(pace,monthIdx,tsp,year=YEAR){
  const q=monthShifts(pace,monthIdx,year);            // the curve IS the quota now (exact count)
  const monthTarget$=q*tsp.value;                     // $ extrapolated → estimate
  return {monthTarget$,quota:known(q),quota$:est(monthTarget$,tsp.assumptions),shares:curveShares(pace,year)};
}
/* fraction of annual pace expected to have elapsed by `date` */
function curveCumulativeFraction(pace,date){
  const year=date.getFullYear();
  const shares=curveShares(pace,year);
  const m=date.getMonth();
  let f=0;
  for(let i=0;i<12;i++){
    if(i<m)f+=shares[i];
    else if(i===m)f+=shares[i]*(date.getDate()/dim(date.getFullYear(),i));
  }
  return f;
}

/* §4.5 the cooling aggregate */
function coolingAggregate(state,tsp){
  const {pace,requests,sites}=state;
  const siteById=Object.fromEntries(sites.map(s=>[s.id,s]));
  const annualTarget=annualTargetOf(pace,tsp);          // extrapolated from the shift curve
  const fracYearElapsed=days(new Date(YEAR,0,1),TODAY)/365;
  const expectedToDate$=annualTarget*curveCumulativeFraction(pace,TODAY);
  let bookedToDate$=0,bookedFuture$=0,requested$=0;
  for(const r of requests){
    const s=siteById[r.siteId];if(!s)continue;
    if(r.state==="confirmed"){
      const yr=r.footprint.dates.filter(d=>pd(d).getFullYear()===YEAR);
      const worked=yr.filter(d=>pd(d)<=TODAY).length;
      bookedToDate$+=worked*reqShiftPay(r,s);                 // already worked
      bookedFuture$+=(yr.length-worked)*reqShiftPay(r,s);     // confirmed, not yet worked
    }else if(r.state==="candidate"||r.state==="pending"||r.state==="override"){
      const inYr=r.footprint.dates.filter(d=>pd(d).getFullYear()===YEAR);
      const n=reqIsDensity(r)?(inYr.length?shiftCount(r):0):inYr.length;
      requested$+=n*(reqIsDensity(r)?tsp.value:reqShiftPay(r,s));   // density → typicalShiftPay estimate; exact → its own rate
    }
  }
  const flatRunRate$=fracYearElapsed>0?bookedToDate$/fracYearElapsed:0;
  const onCurveProjection$=expectedToDate$>0?annualTarget*(bookedToDate$/expectedToDate$):bookedToDate$;
  const coolingGap$=onCurveProjection$-flatRunRate$;
  // infeasibility: can the gap still be closed at a sane pace? (§6.1)
  const monthsLeft=12-TODAY.getMonth()-(TODAY.getDate()/dim(YEAR,TODAY.getMonth()));
  const maxReachable$=bookedToDate$+pace.pressureCeiling*monthsLeft*tsp.value;
  const feasible=maxReachable$>=annualTarget;
  const shortfall=Math.max(0,annualTarget-maxReachable$);
  const heat=feasible?0:clamp01(shortfall/Math.max(1,annualTarget*0.5));
  return {fracYearElapsed,expectedToDate$,bookedToDate$,bookedFuture$,requested$,flatRunRate$,onCurveProjection$,coolingGap$,feasible,heat,maxReachable$,monthsLeft,annualTarget};
}

/* §4.6 exposure per week off the footprint */
function weekExposure(weekDates,requests,siteById,tsp){
  const wf=new Set(weekDates.map(ds));
  let floor$=0,ceil$=0,pending=[];
  for(const r of requests){
    const fp=r.footprint;
    const datesIn=fp.dates.filter(d=>wf.has(d));
    if(!datesIn.length)continue;
    const s=siteById[r.siteId];if(!s)continue;
    const pay=reqShiftPay(r,s);
    if(r.state==="confirmed"){floor$+=datesIn.length*pay;}
    else if(r.state==="candidate"||r.state==="pending"||r.state==="override"){
      pending.push(r);                               // not-yet-confirmed → the ceiling hedge
      if(!reqIsDensity(r))ceil$+=datesIn.length*pay;
      else ceil$+=Math.min(shiftCount(r),datesIn.length)*tsp.value; // density → typicalShiftPay (estimate)
    }
  }
  ceil$+=floor$;
  // collision: two pending footprints overlapping in this week
  let collision=false;
  for(let i=0;i<pending.length;i++)for(let j=i+1;j<pending.length;j++){
    const a=new Set(pending[i].footprint.dates.filter(d=>wf.has(d)));
    const b=pending[j].footprint.dates.filter(d=>wf.has(d));
    if(b.some(d=>a.has(d)))collision=true;
  }
  const thinOnly=pending.length>0&&pending.every(r=>reqIsDensity(r)&&shiftCount(r)<=2);
  const hole=floor$===0&&ceil$>0&&thinOnly;
  return {floor$,ceil$,pending,collision,hole};
}

/* §5 request lifecycle clocks */
function requestPressure(r){
  if(r.state!=="candidate")return 0;             // apply-by urgency; → 0 once submitted
  return clamp01(days(pd(r.opens),TODAY)/Math.max(1,days(pd(r.opens),pd(r.dueBy))));
}
/* response wait: how far a submitted request is toward its expected-response date */
function responseWait(r){
  if((r.state!=="pending"&&r.state!=="override")||!r.submittedOn||!r.expectedResponseBy)return null;
  const o=pd(r.submittedOn),d=pd(r.expectedResponseBy);
  return {frac:clamp01(days(o,TODAY)/Math.max(1,days(o,d))),overdue:TODAY>d};
}
function closingTerm(opens,dueBy){
  const o=pd(opens),d=pd(dueBy);
  if(TODAY<o)return 0;                            // not yet open
  if(TODAY>d)return 0;                            // closed
  return clamp01(days(o,TODAY)/Math.max(1,days(o,d)));
}

/* weeks of a month (Monday-start, overlapping the month) */
function getWeeks(y,m){
  const last=new Date(y,m+1,0);
  let cur=new Date(y,m,1);cur.setDate(cur.getDate()-((cur.getDay()+6)%7));
  const weeks=[];
  while(cur<=last){
    const dates=[];for(let i=0;i<7;i++){const d=new Date(cur);d.setDate(cur.getDate()+i);dates.push(d);}
    if(dates.some(d=>d.getMonth()===m))weeks.push({start:new Date(cur),dates});
    cur.setDate(cur.getDate()+7);
  }
  return weeks;
}

/* ════════ WINDOWS + BRIGHTNESS (§4.3) ════════
   Derived per (site × week). Brightness drives GLOW ONLY:
   never order, never visibility, never action (Inv 1, 2a). */
function buildWindows(state,monthIdx,types,tsp){
  const {sites,trips,layers,locks,pace,requests}=state;
  const siteById=Object.fromEntries(sites.map(s=>[s.id,s]));
  const weeks=getWeeks(YEAR,monthIdx);
  const qInfo=monthQuota(pace,monthIdx,tsp);
  // committed shifts toward this month (pinned dates landing in month)
  let committed=0;
  for(const r of requests){
    if(OCCUPY.includes(r.state)){
      const dts=r.footprint.dates;
      const n=reqIsDensity(r)?(dts.some(d=>pd(d).getMonth()===monthIdx&&pd(d).getFullYear()===YEAR)?shiftCount(r):0)
              :dts.filter(d=>pd(d).getMonth()===monthIdx&&pd(d).getFullYear()===YEAR).length;
      committed+=n;
    }
  }
  const remaining=qInfo.quota.value-committed;
  const raw=[];
  weeks.forEach((wk,wi)=>{
    sites.forEach(site=>{
      const type=types[`${site.id}-${wi}`]||"day";   // window preview is coarse — day vs night
      const money=windowMoney(site,type,wk.dates,trips);
      const co=coLocation(site,wk.dates,trips);
      const dout=weekDaysOut(wk.dates,layers);
      const opens=ds(ad(wk.start,-site.cadence.opensDaysBefore));
      const dueBy=monthDueBy(wk.start,site.cadence.dueByDaysBefore);
      const closing=closingTerm(opens,dueBy);
      const closed=TODAY>pd(dueBy)||!!closedTrip(trips,wk.dates);   // past due, or a closed (international) trip
      const notOpen=TODAY<pd(opens);
      const lockHit=wk.dates.filter(d=>locks.some(l=>l.date===ds(d)));
      const dayStrs=wk.dates.map(ds);                   // all days of the week — weekends are workable
      const perKid=kidDaysOut(dayStrs,layers);
      const kidHrs=kidHoursCost(dayStrs,site,null,type,layers);   // family-time cost if you worked this week here at this shift
      raw.push({id:`${site.id}-${wi}`,wi,site,type,week:wk,money,co,dout,opens,dueBy,dayStrs,perKid,kidHrs,
        closing,closed,notOpen,lockHit,
        existing:requests.find(r=>r.siteId===site.id&&r.footprint&&
          r.footprint.dates.some(d=>pd(d).getMonth()===monthIdx&&wk.dates.some(wd=>ds(wd)===d)))});
    });
  });
  // normalization ranges across the month's windows
  const aw=raw.map(w=>w.money.awayPerHr.value), dt=raw.map(w=>w.dout);
  const nrm=(v,a)=>{const lo=Math.min(...a),hi=Math.max(...a);return hi>lo?(v-lo)/(hi-lo):0.5;};
  raw.forEach(w=>{
    const c={
      familyEfficiency:nrm(w.money.awayPerHr.value,aw),
      coLocation:w.co.coLocated?1:0,
      lowDaysOut:1-nrm(w.dout,dt),
      quotaFit:remaining>0?clamp01(0.45+0.55*Math.min(1,remaining/Math.max(1,qInfo.quota.value))):0.08,
      closing:w.closing,
    };
    let score=0;for(const k in BW)score+=BW[k]*c[k];
    if(w.closed)score*=0.45;                       // closed windows dim (persist, never gone — Inv 8)
    if(w.notOpen)score*=0.7;
    w.components=c;w.score=score;w.bucket=coarseBucket(score);
  });
  return {weeks,windows:raw,qInfo,committed,remaining};
}

/* ════════ PACE CURVE — the one Balance gesture ════════
   Drag each month up/down to set SHIFTS for that month. Dollars are
   extrapolated (shifts × typicalShiftPay); the annual figure is the live sum.
   The comfort ceiling (§ pressureCeiling) rides the same curve as a draggable
   line — months above it read hot, matching the year-strip pressure tint. */
function PaceCurve({pace,setPace,tsp}){
  const SPX=9,MAXSH=18,H=MAXSH*SPX;                    // px per shift, bar area height
  const [year,setYear]=useState(YEAR);                 // by-year: each year has its own curve
  const months=year===YEAR?Array.from({length:12-START_M},(_,i)=>i+START_M):Array.from({length:12},(_,i)=>i);  // 2026 floors at June
  const shifts=curveFor(pace,year).map(m=>m.shifts||0);
  const ceiling=pace.pressureCeiling;
  const total=months.reduce((a,m)=>a+shifts[m],0);
  const annual$=total*tsp.value, avg=months.length?total/months.length:0;
  const setMonthShifts=(m,val)=>{
    const v=Math.max(0,Math.min(MAXSH,Math.round(val)));
    let base=(pace.curves&&pace.curves[year])?pace.curves[year]:pace.curve;
    if(year===YEAR&&START_M>0)base=base.map((mm,i)=>i<START_M?{...mm,shifts:0}:mm);   // keep pre-floor months at 0
    const next=base.map((mm,i)=>i===m?{...mm,shifts:v}:mm);
    setPace({curves:{...(pace.curves||{}),[year]:next}});                              // edit only this year
  };
  const setCeiling=val=>setPace({pressureCeiling:Math.max(1,Math.min(MAXSH,Math.round(val)))});
  const drag=(e,getStart,commit)=>{
    e.preventDefault();const el=e.currentTarget;try{el.setPointerCapture(e.pointerId);}catch(_){}
    const sY=e.clientY,sV=getStart();
    const mv=ev=>commit(sV+(sY-ev.clientY)/SPX);
    const up=()=>{el.removeEventListener("pointermove",mv);el.removeEventListener("pointerup",up);el.removeEventListener("pointercancel",up);};
    el.addEventListener("pointermove",mv);el.addEventListener("pointerup",up);el.addEventListener("pointercancel",up);
  };
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4,gap:8,flexWrap:"wrap"}}>
      <div style={{display:"flex",alignItems:"center",gap:7}}>
        <span style={{fontSize:11,fontWeight:800,color:C.gray,letterSpacing:"0.04em",textTransform:"uppercase"}}>Pace</span>
        <div style={{display:"inline-flex",alignItems:"center",gap:3}}>
          <button disabled={year<=YEAR} onClick={()=>setYear(y=>Math.max(YEAR,y-1))} style={{border:"none",background:"none",cursor:year<=YEAR?"default":"pointer",color:year<=YEAR?C.faint:C.gray,fontFamily:MONO,fontSize:14,padding:"0 2px",lineHeight:1}}>‹</button>
          <span style={{fontSize:13,fontWeight:800,minWidth:34,textAlign:"center"}}>{year}</span>
          <button onClick={()=>setYear(y=>y+1)} style={{border:"none",background:"none",cursor:"pointer",color:C.gray,fontFamily:MONO,fontSize:14,padding:"0 2px",lineHeight:1}}>›</button>
        </div>
        <span style={{fontSize:9.5,fontWeight:600,color:C.mute}}>drag months · shifts/mo</span>
      </div>
      <div style={{textAlign:"right",fontSize:11,color:C.gray}}>
        <b style={{color:C.ink,fontSize:13}}>{total}</b> shifts{year===YEAR?" (Jun–Dec)":"/yr"} · avg <b style={{color:C.ink}}>{avg.toFixed(1)}</b>/mo
        <div style={{fontSize:10}}>≈ <Num e={est(annual$,tsp.assumptions)} money k/> · <b style={{color:C.ink}}>{fmt$(avg*tsp.value)}</b>/mo avg</div>
        <div style={{fontSize:9.5,color:C.mute}}>at <Num e={tsp} money/>/shift avg rate</div>
      </div>
    </div>
    <div style={{position:"relative",display:"flex",alignItems:"flex-end",gap:2,height:H,marginTop:4}}>
      {/* comfort ceiling — draggable line */}
      <div onPointerDown={e=>drag(e,()=>ceiling,setCeiling)}
        title={`comfort ceiling ${ceiling}/mo — drag`}
        style={{position:"absolute",left:0,right:0,bottom:Math.min(H,ceiling*SPX)-6,height:12,zIndex:3,cursor:"ns-resize",touchAction:"none"}}>
        <div style={{position:"absolute",left:0,right:0,top:6,borderTop:`1.5px dashed ${C.gray}`}}/>
        <span style={{position:"absolute",right:0,top:-3,fontSize:8,fontWeight:700,color:C.pressHot,background:C.panel2,padding:"0 2px"}}>ceil {ceiling}</span>
      </div>
      {months.map(m=>{
        const sh=shifts[m],h=Math.max(2,Math.min(H,sh*SPX)),isNow=year===YEAR&&m===TODAY.getMonth(),hot=sh>ceiling;
        return <div key={m} onPointerDown={e=>drag(e,()=>shifts[m],v=>setMonthShifts(m,v))} title={`${MONL[m]} ${year}: ${sh} shifts ≈ ${fmt$(sh*tsp.value)} — drag`}
          style={{flex:1,height:H,display:"flex",flexDirection:"column",justifyContent:"flex-end",alignItems:"center",
            cursor:"ns-resize",touchAction:"none"}}>
          <div style={{fontSize:8.5,fontWeight:700,color:hot?C.pressHot:(sh?C.gray:C.mute),marginBottom:1}}>{sh}</div>
          <div style={{width:"74%",height:h,background:isNow?C.ink:(hot?C.pressHot:C.bar),borderRadius:"3px 3px 0 0",
            border:isNow?"none":`1px solid ${hot?C.pressHot:C.faint}`}}/>
        </div>;
      })}
    </div>
    <div style={{display:"flex",gap:2,marginTop:3}}>
      {months.map(m=><div key={m} style={{flex:1,textAlign:"center",fontSize:8,fontWeight:700,color:(year===YEAR&&m===TODAY.getMonth())?C.ink:C.mute}}>{MON[m][0]}</div>)}
    </div>
  </div>;
}

function Board({state,setState,monthIdx,setMonthIdx,tsp,view,goto,mobile}){
  view=view||"all";
  const [types,setTypes]=useState({});
  const [open,setOpen]=useState(null);
  const [creating,setCreating]=useState(null);
  const [drawer,setDrawer]=useState(true);
  const [sel,setSel]=useState(null);                 // {kind:"req"|"trip", id}
  const [tripDrag,setTripDrag]=useState(null);       // live drop preview while dragging a trip: {set:Set<dateStr>, color}
  const cool=useMemo(()=>coolingAggregate(state,tsp),[state,tsp]);
  const footprint=useFootprint(state);
  const {weeks,windows,qInfo,committed,remaining}=useMemo(
    ()=>buildWindows(state,monthIdx,types,tsp),[state,monthIdx,types,tsp]);
  const siteById=Object.fromEntries(state.sites.map(s=>[s.id,s]));

  const setType=(id,t)=>setTypes(p=>({...p,[id]:t}));
  const setPace=p=>setState(s=>({...s,pace:{...s.pace,...p}}));
  function createRequest(w,type,foot,travel){

  if(view==="pace")body=<><div style={{fontSize:15.5,fontWeight:800,marginBottom:10}}>Pace</div>{paceInner}</>;

  else body=<>{calEl}{sp}{tripsPaletteEl}{sp}{winEl}</>;

  return <div style={{height:"100%",overflow:"auto"}}>
    <div style={{maxWidth:980,margin:"0 auto",padding:"12px 16px 60px"}}>{body}</div>

  function go(){
    const dates=picked.slice().sort();
    const foot={kind:"pinned",dates};                  // one window type — a drawn day-set …

  const perKid=kidDaysOut(effDates,state.layers);

    {byWindow&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
      <span style={{fontSize:12,color:C.gray}}>take</span>

      <span style={{fontSize:15.5,fontWeight:800,minWidth:18,textAlign:"center"}}>{take}</span>

      <span style={{fontSize:11,color:C.mute}}>of {picked.length} days · ceiling at <Num e={tsp} money/>/shift</span>

    <label style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:C.gray,marginBottom:travelOn?7:14,cursor:"pointer"}}>

    </label>
    {travelOn&&<div style={{display:"flex",gap:6,alignItems:"flex-end",flexWrap:"wrap",marginBottom:14}}>
      <Field label="leave (days before)"><input type="number" min="0" style={{...inp,width:78}} value={tv.beforeDays} onChange={e=>setTv(v=>({...v,beforeDays:Math.max(0,+e.target.value||0)}))}/></Field>
      <Field label="at"><input type="time" style={{...inp,width:104}} value={tv.departTime} onChange={e=>setTv(v=>({...v,departTime:e.target.value}))}/></Field>

      <Field label="at"><input type="time" style={{...inp,width:104}} value={tv.returnTime} onChange={e=>setTv(v=>({...v,returnTime:e.target.value}))}/></Field>

          <div style={{fontSize:8.5,color:C.mute}}>{money.travel}h travel{w.co.coLocated?" · co-located":""}</div></div>

function Overlay({children,onClose}){

    alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}>

      boxShadow:"0 20px 60px rgba(0,0,0,.25)"}}>{children}</div>

}

/* Balance collapsed into a single gesture — the shift-quantity PaceCurve in the
   Board drawer (§6.1). Annual $ is extrapolated; the comfort ceiling rides the
   curve; infeasibility still renders as the cooling aggregate failing to cool. */

/* ════════ PENDING — the lifecycle list (§5) ════════
   One scrolling column: Candidates (apply, with deadline chain) → Confirmed →
   Pending (awaiting + in-negotiation overrides) → Past (worked, scrolling down). */
const md=d=>`${MON[pd(d).getMonth()]} ${pd(d).getDate()}`;
/* group sorted dates into contiguous (consecutive-day) runs → window ranges for display */
const dateRuns=dates=>{const s=[...dates].sort();const runs=[];
  for(const d of s){const last=runs[runs.length-1];
    if(last&&days(pd(last.to),pd(d))===1)last.to=d;else runs.push({from:d,to:d});}
  return runs;};
const fmtRun=r=>r.from===r.to?md(r.from)
  :`${md(r.from)}–${pd(r.from).getMonth()===pd(r.to).getMonth()?pd(r.to).getDate():md(r.to)}`;
const ST_COL={candidate:C.gray,pending:C.blue,override:C.pressHot,confirmed:C.green,rejected:C.red,expired:C.mute};
const ST_LABEL={candidate:"draft",pending:"submitted",override:"negotiating",confirmed:"booked",rejected:"rejected",expired:"expired"};
function Pending({state,setState,tsp}){
  const siteById=Object.fromEntries(state.sites.map(s=>[s.id,s]));
  const [note,setNote]=useState(null);                 // transient booking-conflict notice
  const setReq=(id,fn)=>setState(s=>({...s,requests:s.requests.map(x=>x.id===id?fn(x):x)}));
  const discard=id=>setState(s=>({...s,requests:s.requests.filter(x=>x.id!==id)}));
  // booking exclusivity: a confirm can't land a shift whose wall-clock interval overlaps an already-confirmed one
  const bookGuard=r=>{const cf=bookingConflict(pinFrom(r),r.shiftType,state.requests,r.id);
    if(cf){const other=state.requests.find(x=>x.id===cf.other.id),os=other&&siteById[other.siteId];
      setNote(`Can't book ${shiftLabel(r.shiftType)} on ${md(cf.date)} — overlaps a confirmed ${shiftLabel(cf.other.shift)}${os?` at ${os.name}`:""}.`);return false;}
    setNote(null);return true;};
  const cadDays=r=>(siteById[r.siteId]&&siteById[r.siteId].cadence.expectedResponseDays)||10;
  const pinFrom=r=>r.footprint.dates.slice(0,shiftCount(r));   // density resolves to its first `target` days; exact keeps all
  const submit=r=>setReq(r.id,x=>({...x,state:"pending",submittedOn:ds(TODAY),expectedResponseBy:ds(ad(TODAY,cadDays(x)))}));
  const accept=r=>{if(!bookGuard(r))return;setReq(r.id,x=>({...x,state:"confirmed",resolvedOn:ds(TODAY),footprint:{kind:"pinned",dates:pinFrom(x)}}));};
  const reject=r=>setReq(r.id,x=>({...x,state:"rejected",resolvedOn:ds(TODAY)}));
  const toOverride=r=>setReq(r.id,x=>({...x,state:"override",footprint:{kind:"pinned",dates:pinFrom(x)},rateOverride:Number.isFinite(x.rateOverride)?x.rateOverride:siteRate(siteById[x.siteId],x.shiftType)}));
  const confirmOverride=r=>{if(!bookGuard(r))return;setReq(r.id,x=>({...x,state:"confirmed",resolvedOn:ds(TODAY)}));};
  const payOf=r=>{const s=siteById[r.siteId];return s?shiftCount(r)*reqShiftPay(r,s):0;};

  function chainFor(r){
    // no manual dependency — the chain emerges from due dates: r "waits on" the still-open
    // request (awaiting a response) that's furthest along the queue yet due before r is.
    const ahead=state.requests.filter(u=>u.id!==r.id&&(u.state==="pending"||u.state==="override")&&pd(u.dueBy)<pd(r.dueBy));
    if(!ahead.length)return null;
    const upstream=ahead.reduce((a,b)=>pd(b.dueBy)>pd(a.dueBy)?b:a);
    const up=siteById[upstream.siteId];
    const slack=days(pd(upstream.expectedResponseBy||upstream.dueBy),pd(r.dueBy));
    return {up,upstream,slack};
  }

  const reqs=state.requests;
  const candidates=reqs.filter(r=>r.state==="candidate").sort((a,b)=>pd(a.dueBy)-pd(b.dueBy));
  const confirmedUp=reqs.filter(r=>r.state==="confirmed"&&!isPastReq(r)).sort((a,b)=>reqMaxDate(a).localeCompare(reqMaxDate(b)));
  const inflight=reqs.filter(r=>r.state==="pending"||r.state==="override").sort((a,b)=>pd(a.expectedResponseBy||a.dueBy)-pd(b.expectedResponseBy||b.dueBy));
  const resolved=reqs.filter(r=>r.state==="rejected"||r.state==="expired");
  const past=reqs.filter(isPastReq).sort((a,b)=>reqMaxDate(b).localeCompare(reqMaxDate(a)));

  const Head=({title,n,sub})=> <div style={{display:"flex",alignItems:"baseline",gap:8,margin:"0 2px 8px"}}>
    <span style={{fontSize:14.5,fontWeight:800,letterSpacing:"-0.01em"}}>{title}</span>
    <span style={{fontSize:11,fontWeight:700,color:C.mute}}>{n}</span>
    <span style={{fontSize:11,color:C.gray}}>{sub}</span>
  </div>;
  const Empty=({t})=> <div style={{fontSize:11,color:C.mute,fontStyle:"italic",padding:"4px 2px 0"}}>{t}</div>;
  const RowCard=({children,dim,accent})=> <div style={{padding:"9px 11px",border:`1px solid ${accent||C.line}`,borderRadius:7,
    background:C.panel,marginBottom:6,opacity:dim?0.5:1}}>{children}</div>;
  const Ident=({r})=>{const site=siteById[r.siteId];return <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
    <span style={{fontSize:13,fontWeight:800}}>{site?site.name:"(removed site)"}</span>
    <Tag bg={C.line2} col={ST_COL[r.state]}>{ST_LABEL[r.state]}</Tag>
    <Tag>{shiftLabel(r.shiftType)}</Tag>
    {Number.isFinite(r.rateOverride)&&<Tag bg={C.softWarn} col={C.pressHot}>rate {fmt$(r.rateOverride)}/hr</Tag>}
    {Number.isFinite(r.bonusOverride)&&r.bonusOverride>0&&<Tag bg={C.softWarn} col={C.pressHot}>+{fmt$(r.bonusOverride)}/shift</Tag>}
    <span style={{marginLeft:"auto",fontSize:11,fontWeight:700,color:C.ink}}>{fmt$(payOf(r))}</span>
  </div>;};
  const Dates=({r})=> <div style={{fontSize:10,color:C.gray,marginTop:4}}>
    {reqIsDensity(r)?`${md(r.footprint.dates[0])}–${md(r.footprint.dates.at(-1))} · ${shiftCount(r)} of ${r.footprint.dates.length} days`
      :dateRuns(r.footprint.dates).map(fmtRun).join(" · ")}</div>;

  return <div style={{height:"100%",overflow:"auto"}}>
    <div style={{maxWidth:720,margin:"0 auto",padding:"14px 16px 80px"}}>
      <div style={{fontSize:18,fontWeight:800,letterSpacing:"-0.02em"}}>Requests</div>
      <div style={{fontSize:11.5,color:C.gray,marginBottom:16}}>the request lifecycle, newest intent on top, history scrolling down.</div>
      {note&&<div onClick={()=>setNote(null)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 11px",marginBottom:12,borderRadius:7,
        border:`1px solid ${C.pressHot}`,background:C.softWarn,cursor:"pointer"}}>
        <span style={{fontSize:11.5,fontWeight:700,color:C.pressHot}}>{note}</span>
        <span style={{marginLeft:"auto",fontSize:10,color:C.mute}}>dismiss ✕</span></div>}

      {/* ── DRAFTS ── */}
      <Head title="Drafts" n={candidates.length} sub="drafts to submit · deadline chain"/>
      {candidates.length===0&&<Empty t="No drafts yet — create one on the calendar."/>}
      {candidates.map(r=>{
        const press=requestPressure(r),notOpen=TODAY<pd(r.opens),chain=chainFor(r);
        return <RowCard key={r.id}>
          <Ident r={r}/><Dates r={r}/>
          <div style={{marginTop:7}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9.5,color:C.mute,marginBottom:2}}>
              <span>{notOpen?`opens ${r.opens}`:`open now`}</span>
              <span style={{color:press>0.7?C.red:C.gray}}>apply by {r.dueBy}</span>
            </div>
            <div style={{height:5,background:C.line2,borderRadius:3,overflow:"hidden"}}>
              <div style={{width:(press*100)+"%",height:"100%",background:press>0.7?C.red:C.ink}}/>
            </div>
          </div>
          {chain&&<div style={{marginTop:6,fontSize:10,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{color:C.gray}}>⛓ hear back from <b>{chain.up?chain.up.name:"?"}</b> first</span>
            {chain.slack<0? <Tag bg={C.softWarn} col={C.red}>slack {chain.slack}d — due before they respond</Tag>
              : <Tag bg={C.softGood} col={C.green}>{chain.slack}d slack</Tag>}
          </div>}
          <div style={{display:"flex",gap:6,marginTop:8}}>
            <Btn small kind="prim" onClick={()=>submit(r)}>submit</Btn>
            <Btn small kind="danger" onClick={()=>discard(r.id)}>discard</Btn>
          </div>
        </RowCard>;
      })}

      {/* ── CONFIRMED (upcoming) ── */}
      <div style={{marginTop:18}}><Head title="Booked" n={confirmedUp.length} sub="upcoming · on the calendar"/></div>
      {confirmedUp.length===0&&<Empty t="No upcoming booked shifts."/>}
      {confirmedUp.map(r=><RowCard key={r.id} accent={C.juniper}>
        <Ident r={r}/><Dates r={r}/>
      </RowCard>)}

      {/* ── SUBMITTED (awaiting + negotiating) ── */}
      <div style={{marginTop:18}}><Head title="Submitted" n={inflight.length} sub="awaiting the site · accept / decline / negotiate"/></div>
      {inflight.length===0&&<Empty t="Nothing out for response."/>}
      {inflight.map(r=>{
        const wait=responseWait(r),neg=r.state==="override";
        return <RowCard key={r.id} accent={neg?C.pressHot:undefined}>
          <Ident r={r}/><Dates r={r}/>
          {wait&&<div style={{marginTop:7}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9.5,color:C.mute,marginBottom:2}}>
              <span>submitted {r.submittedOn}</span>
              <span style={{color:wait.overdue?C.red:C.gray}}>{wait.overdue?"overdue":"response by"} {r.expectedResponseBy}</span>
            </div>
            <div style={{height:5,background:C.line2,borderRadius:3,overflow:"hidden"}}>
              <div style={{width:(wait.frac*100)+"%",height:"100%",background:wait.overdue?C.red:C.blue}}/>
            </div>
          </div>}
          {!neg
            ? <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
                <Btn small kind="good" onClick={()=>accept(r)}>accept</Btn>
                <Btn small kind="danger" onClick={()=>reject(r)}>reject</Btn>
                <Btn small onClick={()=>toOverride(r)}>override</Btn>
              </div>
            : <OverrideEditor r={r} site={siteById[r.siteId]}
                onRm={d=>setReq(r.id,x=>({...x,footprint:{kind:"pinned",dates:x.footprint.dates.filter(y=>y!==d)}}))}
                onAdd={d=>setReq(r.id,x=>x.footprint.dates.includes(d)?x:({...x,footprint:{kind:"pinned",dates:[...x.footprint.dates,d].sort()}}))}
                onRate={v=>setReq(r.id,x=>({...x,rateOverride:v}))}
                onBonus={v=>setReq(r.id,x=>({...x,bonusOverride:v}))}
                onShift={v=>setReq(r.id,x=>({...x,shiftType:v}))}
                onConfirm={()=>confirmOverride(r)} onReject={()=>reject(r)}/>}
        </RowCard>;
      })}
      {resolved.length>0&&<div style={{marginTop:8}}>
        <div style={{fontSize:10,fontWeight:700,color:C.mute,textTransform:"uppercase",letterSpacing:"0.04em",margin:"0 2px 6px"}}>resolved · persists (Inv 8)</div>
        {resolved.map(r=><RowCard key={r.id} dim>
          <Ident r={r}/><Dates r={r}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
            <span style={{fontSize:9.5,color:C.mute,fontStyle:"italic"}}>faded to legibility floor</span>
            <Btn small onClick={()=>discard(r.id)}>dismiss</Btn>
          </div>
        </RowCard>)}
      </div>}

      {/* ── PAST (worked) ── */}
      <div style={{marginTop:18}}><Head title="Past" n={past.length} sub="worked · scrolling down"/></div>
      {past.length===0&&<Empty t="No past shifts yet."/>}
      {past.map(r=><RowCard key={r.id} dim>
        <Ident r={r}/><Dates r={r}/>
      </RowCard>)}

      <p style={{fontSize:11,color:C.mute,textAlign:"center",marginTop:22,lineHeight:1.6}}>
        Booked and negotiating shifts land on the calendar and press the month.<br/>
        Only the pace/exposure readout crosses back to the Board (the seam, §7).
      </p>
    </div>
  </div>;
}
/* inline negotiation editor — edits commit live (shows on the calendar / pressure) */
function OverrideEditor({r,site,onRm,onAdd,onRate,onBonus,onShift,onConfirm,onReject}){
  const [add,setAdd]=useState("");
  const perShift=(Number(r.rateOverride)||0)*siteHours(site,r.shiftType)+(Number(r.bonusOverride)||0);
  const dayShifts=siteMenu(site).filter(m=>!shiftIsNight(m.shift)),nightShifts=siteMenu(site).filter(m=>shiftIsNight(m.shift));
  return <div style={{marginTop:8,padding:"9px 10px",border:`1px dashed ${C.pressHot}`,borderRadius:6,background:C.softWarn}}>
    <div style={{fontSize:9.5,fontWeight:800,color:C.pressHot,letterSpacing:"0.04em",textTransform:"uppercase",marginBottom:6}}>Negotiated shift, dates, rate and bonus</div>
    {/* the site's answer can be coarse (day/night) or a specific shift it assigned */}
    <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:8}}>
      <span style={{fontSize:10,color:C.gray}}>shift</span>
      <select value={r.shiftType} onChange={e=>onShift(e.target.value)} style={{...inp,width:140}}>
        <optgroup label="Any">{CATS.map(c=><option key={c.id} value={c.id}>{c.label} (any)</option>)}</optgroup>
        {dayShifts.length>0&&<optgroup label="Day shifts">{dayShifts.map(m=><option key={m.shift} value={m.shift}>{shiftLabel(m.shift)}</option>)}</optgroup>}
        {nightShifts.length>0&&<optgroup label="Night shifts">{nightShifts.map(m=><option key={m.shift} value={m.shift}>{shiftLabel(m.shift)}</option>)}</optgroup>}
      </select>
    </div>
    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>
      {r.footprint.dates.map(d=><span key={d} style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:11,fontWeight:700,
        padding:"2px 4px 2px 7px",border:`1px solid ${C.line}`,borderRadius:4,background:C.panel}}>
        {md(d)}<button onClick={()=>onRm(d)} style={{border:"none",background:"none",cursor:"pointer",color:C.red,fontFamily:MONO,fontSize:12}}>×</button></span>)}
    </div>
    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginBottom:8}}>
      <input type="date" value={add} onChange={e=>setAdd(e.target.value)} style={{...inp,width:140}}/>
      <Btn small onClick={()=>{if(DATE_RE.test(add)){onAdd(add);setAdd("");}}}>+ add date</Btn>
      <span style={{marginLeft:"auto",fontSize:10,color:C.gray}}>$/hr</span>
      <input type="number" value={r.rateOverride} onChange={e=>onRate(+e.target.value||0)} style={{...inp,width:72}}/>
      <span style={{fontSize:10,color:C.gray}}>+ bonus/shift</span>
      <input type="number" value={Number.isFinite(r.bonusOverride)?r.bonusOverride:0} onChange={e=>onBonus(Math.max(0,+e.target.value||0))} style={{...inp,width:72}}/>
    </div>
    <div style={{fontSize:10,color:C.mute,marginBottom:8}}>{fmt$(perShift)}/shift × {r.footprint.dates.length} = <b style={{color:C.gray}}>{fmt$(perShift*r.footprint.dates.length)}</b>{Number(r.bonusOverride)>0?` (incl. ${fmt$(r.bonusOverride)} bonus/shift)`:""}</div>
    <div style={{display:"flex",gap:6}}>
      <Btn small kind="good" disabled={!r.footprint.dates.length} onClick={onConfirm}>confirm</Btn>
      <Btn small kind="danger" onClick={onReject}>reject</Btn>
    </div>
  </div>;
}

/* ════════ SITES WORKSHEET — add / edit named, never-rated sites; live, near the window list (§3.1, Inv 4) ════════ */
function SiteWizard({state,setState,embed,onClose}){
  const [openId,setOpenId]=useState(state.sites[0]?.id||null);
  const sites=state.sites;
  const setSites=fn=>setState(st=>({...st,sites:fn(st.sites)}));   // live edits
  const reqCount=id=>state.requests.filter(r=>r.siteId===id).length;
  const upd=(id,patch)=>setSites(p=>p.map(s=>s.id===id?{...s,...patch}:s));
  const updCad=(id,patch)=>setSites(p=>p.map(s=>s.id===id?{...s,cadence:{...s.cadence,...patch}}:s));
  const updTravel=(id,patch)=>setSites(p=>p.map(s=>s.id===id?{...s,travel:{...travelOf(s),...patch}}:s));
  const setMenu=(id,fn)=>setSites(p=>p.map(s=>s.id===id?{...s,menu:fn(siteMenu(s))}:s));
  const updMenu=(id,i,patch)=>setMenu(id,m=>m.map((e,j)=>j===i?{...e,...patch}:e));
  const delMenu=(id,i)=>setMenu(id,m=>m.length>1?m.filter((_,j)=>j!==i):m);   // keep at least one offered shift
  const addMenu=id=>setMenu(id,m=>{const used=new Set(m.map(e=>e.shift));const free=SHIFTS.find(sh=>!used.has(sh.id))||SHIFTS[0];
    return [...m,{shift:free.id,rate:200,rest:shiftRestDefault(free.id)}];});
  const addSite=()=>{const id="site"+Date.now();
    setSites(p=>[...p,{id,name:"New site",note:"",reach:"local",homeBaseLoc:"boston",
      menu:[{shift:"d7",rate:200,rest:10}],submissionType:"by_shift",travel:defaultTravel("local"),
      cadence:{opensDaysBefore:60,dueByDaysBefore:21,expectedResponseDays:14}}]);
    setOpenId(id);};
  const rm=id=>{if(reqCount(id)>0)return;setSites(p=>p.filter(s=>s.id!==id));if(openId===id)setOpenId(null);};
  const N=props=> <input type="number" style={inp} {...props}/>;
  const Inner=<div style={{maxHeight:embed?"none":"82vh",display:"flex",flexDirection:"column"}}>
      {!embed&&<div style={{fontSize:15.5,fontWeight:800,marginBottom:2}}>Sites worksheet</div>}
      <div style={{fontSize:11,color:C.gray,marginBottom:10}}>Name and note are free text. Changes save as you type.</div>
      <div style={{flex:1,overflow:"auto",margin:"0 -2px",padding:"0 2px"}}>
        {sites.map(s=>{
          const open=openId===s.id, refs=reqCount(s.id);
          return <div key={s.id} style={{border:`1px solid ${C.line}`,borderRadius:7,marginBottom:7,background:C.panel,overflow:"hidden"}}>
            <div onClick={()=>setOpenId(open?null:s.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",cursor:"pointer"}}>
              <span style={{fontSize:13,fontWeight:800}}>{s.name||"(unnamed)"}</span>
              <Tag>{REACH_LABEL[s.reach]}</Tag>
              <Tag bg={C.line2}>{s.submissionType==="by_window"?"by week":"by shift"}</Tag>
              <Tag bg={C.line2}>due {s.cadence.dueByDaysBefore}d before month</Tag>
              <span style={{marginLeft:"auto",fontSize:11,color:C.mute}}>{open?"▾":"▸"}</span>
            </div>
            {open&&<div style={{padding:"4px 10px 10px",borderTop:`1px solid ${C.line2}`}}>
              <Field label="Name (carries satisfaction)"><input style={inp} value={s.name} onChange={e=>upd(s.id,{name:e.target.value})}/></Field>
              <Field label="Note (free text · non-sortable)"><input style={inp} value={s.note} onChange={e=>upd(s.id,{note:e.target.value})}/></Field>
              <div style={{display:"flex",gap:8}}>
                <Field label="Reach"><select style={inp} value={s.reach} onChange={e=>upd(s.id,{reach:e.target.value})}>
                  {Object.keys(REACH_LABEL).map(r=><option key={r} value={r}>{REACH_LABEL[r]}</option>)}</select></Field>
                <Field label="Home base"><select style={inp} value={s.homeBaseLoc} onChange={e=>upd(s.id,{homeBaseLoc:e.target.value})}>
                  {Object.keys(LOC_NAME).map(l=><option key={l} value={l}>{LOC_NAME[l]}</option>)}</select></Field>
              </div>
              <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.04em",textTransform:"uppercase",color:C.gray,margin:"8px 0 3px"}}>Shift menu — what this site offers ($/hr · rest · kid-hrs)</div>
              {CATS.map(c=>{const night=c.id==="night";
                const rows=siteMenu(s).map((m,i)=>({m,i})).filter(({m})=>shiftIsNight(m.shift)===night);
                return <div key={c.id} style={{marginBottom:3}}>
                  <div style={{fontSize:9,fontWeight:800,letterSpacing:"0.04em",textTransform:"uppercase",color:night?C.ocean:C.gray,margin:"5px 0 2px"}}>{c.label}</div>
                  {rows.length===0&&<div style={{fontSize:9.5,color:C.mute,fontStyle:"italic",paddingLeft:2}}>none offered</div>}
                  {rows.map(({m,i})=><div key={i} style={{display:"flex",gap:6,alignItems:"flex-end",marginBottom:5}}>
                    <Field label="Shift"><select style={{...inp,width:100}} value={m.shift} onChange={e=>updMenu(s.id,i,{shift:e.target.value})}>
                      {SHIFTS.map(sh=><option key={sh.id} value={sh.id}>{sh.label}</option>)}</select></Field>
                    <Field label="$/hr"><N value={m.rate} onChange={e=>updMenu(s.id,i,{rate:+e.target.value||0})}/></Field>
                    <Field label="rest"><N value={m.rest} onChange={e=>updMenu(s.id,i,{rest:Math.max(0,+e.target.value||0)})}/></Field>
                    <Field label="kid-hrs"><N value={Number.isFinite(m.kidHours)?m.kidHours:Math.round(defaultKidHours(m.shift)*10)/10} onChange={e=>updMenu(s.id,i,{kidHours:Math.max(0,+e.target.value||0)})}/></Field>
                    <span style={{fontSize:9.5,color:C.mute,paddingBottom:7}}>{shiftHours(m.shift)}h</span>
                    <Btn small kind="danger" disabled={siteMenu(s).length<=1} onClick={()=>delMenu(s.id,i)}>✕</Btn>
                  </div>)}
                </div>;})}
              <div style={{fontSize:9,color:C.mute,margin:"2px 0 4px"}}>kid-hrs = waking hours with the kids this shift costs (school days are excluded automatically). Blank = estimated from the shift time.</div>
              <div style={{marginBottom:6}}><Btn small onClick={()=>addMenu(s.id)} disabled={siteMenu(s).length>=SHIFTS.length}>+ add shift</Btn></div>
              <Field label="Submission type"><select style={inp} value={s.submissionType} onChange={e=>upd(s.id,{submissionType:e.target.value})}>
                <option value="by_shift">by shift (pinned)</option><option value="by_window">by week (smeared)</option></select></Field>
              <div style={{display:"flex",gap:8}}>
                <Field label="Opens (days before)"><N value={s.cadence.opensDaysBefore} onChange={e=>updCad(s.id,{opensDaysBefore:+e.target.value||0})}/></Field>
                <Field label="Requests due (days before the month)"><N value={s.cadence.dueByDaysBefore} onChange={e=>updCad(s.id,{dueByDaysBefore:+e.target.value||0})}/></Field>
                <Field label="Response (days)"><N value={s.cadence.expectedResponseDays} onChange={e=>updCad(s.id,{expectedResponseDays:+e.target.value||0})}/></Field>
              </div>
              <div style={{fontSize:9.5,color:C.mute,margin:"2px 0 4px"}}>Every shift in a month shares one due date (month start − this lead). The site whose date lands earliest leads the chain.</div>
              <div style={{fontSize:10,fontWeight:800,letterSpacing:"0.04em",textTransform:"uppercase",color:C.gray,margin:"8px 0 3px"}}>Travel (real flight timing)</div>
              <div style={{display:"flex",gap:8,alignItems:"flex-end",flexWrap:"wrap"}}>
                <Field label="Leave (days before)"><N value={travelOf(s).beforeDays} onChange={e=>updTravel(s.id,{beforeDays:Math.max(0,+e.target.value||0)})}/></Field>
                <Field label="at"><input type="time" style={inp} value={travelOf(s).departTime} onChange={e=>updTravel(s.id,{departTime:e.target.value})}/></Field>
                <Field label="Home (days after)"><N value={travelOf(s).afterDays} onChange={e=>updTravel(s.id,{afterDays:Math.max(0,+e.target.value||0)})}/></Field>
                <Field label="at"><input type="time" style={inp} value={travelOf(s).returnTime} onChange={e=>updTravel(s.id,{returnTime:e.target.value})}/></Field>
              </div>
              <div style={{fontSize:9.5,color:C.mute,margin:"2px 0 4px"}}>When you leave home and get back, relative to the shift block. This away window drives the kid-awake hours a trip costs.</div>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:4}}>
                <Btn small kind="danger" disabled={refs>0} onClick={()=>rm(s.id)}>remove</Btn>
                {refs>0&&<span style={{fontSize:10,color:C.mute}}>{refs} request{refs>1?"s":""} reference this site — can’t remove</span>}
              </div>
            </div>}
          </div>;
        })}
      </div>
      <div style={{display:"flex",gap:8,marginTop:10}}>
        <Btn onClick={addSite}>+ add site</Btn>
        <div style={{flex:1}}/>
        {!embed&&<Btn kind="prim" onClick={onClose}>done</Btn>}
      </div>
    </div>;
  return embed?Inner:<Overlay onClose={onClose}>{Inner}</Overlay>;
}

/* ════════ PRESENCE LAYERS — primary, categorized, editable, JSON-importable (near the calendar) ════════ */
function LayersPanel({state,setState}){
  const [editing,setEditing]=useState(null);
  const [adding,setAdding]=useState("");
  const fileRef=useRef(),target=useRef(null);
  const layers=state.layers;
  const setLayers=fn=>setState(s=>({...s,layers:fn(s.layers)}));
  const setLayer=(id,patch)=>setLayers(ls=>ls.map(l=>l.id===id?{...l,...patch}:l));
  const toggle=id=>setLayers(ls=>ls.map(l=>l.id===id?{...l,visible:l.visible===false}:l));
  const addLayer=()=>{const id="L"+Date.now();setLayers(ls=>[...ls,{id,name:(adding.trim()||"New layer"),kind:"custom",color:"#888880",visible:true,ranges:[]}]);setAdding("");setEditing(id);};
  const del=id=>{setLayers(ls=>ls.filter(l=>l.id!==id));setEditing(null);};
  const setRanges=(id,fn)=>setLayers(ls=>ls.map(l=>l.id===id?{...l,ranges:fn(l.ranges||[])}:l));
  const addRange=id=>setRanges(id,rs=>[...rs,{from:`${YEAR}-01-01`,to:`${YEAR}-01-01`,label:""}].sort((a,b)=>a.from.localeCompare(b.from)));
  const updRange=(id,i,patch)=>setRanges(id,rs=>rs.map((r,j)=>j===i?{...r,...patch}:r));
  const rmRange=(id,i)=>setRanges(id,rs=>rs.filter((_,j)=>j!==i));
  const expL=l=>{const blob=new Blob([JSON.stringify(l.ranges||[],null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=l.name.replace(/\s+/g,"_")+".json";a.click();};
  const impL=e=>{const f=e.target.files?.[0],id=target.current;if(!f||!id)return;const rd=new FileReader();
    rd.onload=ev=>{try{const j=JSON.parse(ev.target.result);const arr=Array.isArray(j)?j:(j.ranges||[]);
      const norm=arr.map(r=>({from:r.from||r.s,to:r.to||r.e||r.from||r.s,label:String(r.label||r.l||"")})).filter(r=>DATE_RE.test(r.from||""));
      if(!norm.length){alert("No valid ranges (need from / s).");return;}
      setRanges(id,rs=>{const by=new Map(rs.map((r,i)=>[r.from,i]));const m=[...rs];for(const r of norm){if(by.has(r.from))m[by.get(r.from)]=r;else m.push(r);}return m.sort((a,b)=>a.from.localeCompare(b.from));});
      alert(`Imported ${norm.length} ranges into the layer.`);}catch(err){alert("Invalid JSON.");}};
    rd.readAsText(f);e.target.value="";};
  const ed=layers.find(l=>l.id===editing);
  const KIND={school:"school",holiday:"holiday",event:"event",custom:"custom"};
  return <div style={{border:`1px solid ${C.line}`,borderRadius:8,background:C.panel,padding:"9px 11px"}}>
    <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:7}}>
      <span style={{fontSize:11,fontWeight:800,letterSpacing:"0.05em",textTransform:"uppercase",color:C.gray}}>Presence layers</span>
      <span style={{fontSize:9.5,color:C.mute}}>tap to show/hide · ✎ to edit ranges & import JSON</span>
    </div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
      {layers.map(l=>{const on=l.visible!==false;return <span key={l.id}
        style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 7px",borderRadius:14,cursor:"pointer",
          border:`1px solid ${on?C.line:C.line2}`,background:on?C.panel2:"transparent",opacity:on?1:0.55}}>
        <span onClick={()=>toggle(l.id)} style={{display:"inline-flex",alignItems:"center",gap:5}}>
          <span style={{width:9,height:9,borderRadius:"50%",background:l.color,border:on?"none":`1px solid ${C.faint}`}}/>
          <span style={{fontSize:11.5,fontWeight:700,color:on?C.ink:C.mute}}>{l.name}</span>
          <span style={{fontSize:9,color:C.mute}}>{(l.ranges||[]).length}</span>
        </span>

/* ════════ YEAR VIEW — the footprint / home base (§7): confirmed placements + pending ════════ */
const SHIFT_COL={day:"var(--shift-day)",night:"var(--shift-night)"};
const OVERRIDE_COL={day:"var(--ov-day)",night:"var(--ov-night)"};   // tentative (in-negotiation) shifts

const overrideCol=id=>OVERRIDE_COL[shiftIsNight(id)?"night":"day"];

function useFootprint(state){
  return useMemo(()=>{
    const siteById=Object.fromEntries(state.sites.map(s=>[s.id,s]));
    const byDay={},famBy={},lockBy={},perYM={};       // all keyed by full date / "Y-M" (multi-year)
    for(const r of state.requests){
      const s=siteById[r.siteId];if(!s)continue;
      const fp=r.footprint;
      const speculative=reqIsDensity(r)&&(r.state==="candidate"||r.state==="pending");   // density days read as "some of these will land"
      for(const d of fp.dates){(byDay[d]=byDay[d]||[]).push({state:speculative?"smeared":r.state,type:r.shiftType,site:s});
        if(r.state==="confirmed"){const dt=pd(d),k=`${dt.getFullYear()}-${dt.getMonth()}`;(perYM[k]=perYM[k]||{n:0,$:0});perYM[k].n++;perYM[k].$+=reqShiftPay(r,s);}}

}
/* does one layer cover a single date? mirrors layerCoverage's future-year inference.

function layerOnDay(layer,dateStr){

  let src=y,inferred=false;
  if(!yearsWith.has(y)){const prior=[...yearsWith].filter(yy=>yy<y).sort((a,b)=>b-a)[0];if(prior==null)return null;src=prior;inferred=true;}
  const shift=y-src;
  for(const r of (layer.ranges||[])){
    if(+r.from.slice(0,4)!==src)continue;
    const f=pd(r.from),t=pd(r.to);f.setFullYear(f.getFullYear()+shift);t.setFullYear(t.getFullYear()+shift);

/* layer-day coverage across a rendered year range, with future-year inference (shifted) */
function layerCoverage(layers,startY,endY){
  // for each layer+year, the ranges to use: real if present, else shift from the latest prior year that has any
  const byDayLayers={};                                // dateStr → [{id,name,color,kind,inferred}]
  for(const l of layers){
    if(l.visible===false)continue;
    const yearsWith=new Set((l.ranges||[]).map(r=>+r.from.slice(0,4)));
    for(let y=startY;y<=endY;y++){
      let src=y,inferred=false;
      if(!yearsWith.has(y)){
        const prior=[...yearsWith].filter(yy=>yy<y).sort((a,b)=>b-a)[0];
        if(prior==null)continue; src=prior;inferred=true;
      }
      const shift=y-src;
      for(const r of (l.ranges||[])){
        if(+r.from.slice(0,4)!==src)continue;
        let d=ad(pd(r.from),0);const t=pd(r.to);d.setFullYear(d.getFullYear()+shift);t.setFullYear(t.getFullYear()+shift);
        while(d<=t){const k=ds(d);(byDayLayers[k]=byDayLayers[k]||[]).push({id:l.id,name:l.name,color:l.color,kind:l.kind,childId:l.childId,label:r.label,inferred});d=ad(d,1);}
