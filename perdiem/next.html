<div id="root"><div id="loader"><span>PER DIEM · next</span></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useMemo,useRef,useEffect}=React;

/* ════════════════════════════════════════════════════════════
   PER DIEM — redesign, Stage 1: Frame + readout + kid engine.
   Draw-first surface. State axis: Proposed → Scheduled → Worked.
   The calendar is the work surface; the readout below it is the
   per-day picker/editor. Hours-missed comes from one engine wired
   to Wake / Bed / School-Start / School-End.
   ════════════════════════════════════════════════════════════ */

const V=k=>`var(--${k})`;
const C={ink:V("ink"),bg:V("bg"),panel:V("panel"),panel2:V("panel2"),line:V("line"),line2:V("line2"),
  gray:V("gray"),mute:V("mute"),faint:V("faint"),ocean:V("ocean"),juniper:V("juniper"),danger:V("danger"),
  weekend:V("weekend"),sel:V("sel"),blockTrip:V("block-trip"),blockFam:V("block-fam"),warn:V("warn"),bar:V("bar")};
const MONO="'SF Mono','JetBrains Mono','Fira Code',ui-monospace,monospace";
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONL=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const TODAY=new Date(2026,5,17);   // ctx: 2026-06-17
const TODAY_S=`2026-06-17`;
const YEAR=2026;

/* ─── dates ─── */
const ds=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const pd=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const ad=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const mk=s=>s.slice(0,7);                         // month key YYYY-MM
const fmt$=v=>"$"+Math.round(v).toLocaleString();
const fmtK=v=>"$"+(Math.round(v/100)/10).toLocaleString()+"k";
const fmtH=v=>(Math.round(v*10)/10)+"h";
const parseHM=t=>{const m=/^(\d{1,2}):(\d{2})$/.exec(String(t||""));return m?Math.min(24,(+m[1])+(+m[2])/60):0;};
const hm=h=>`${String(Math.floor(h)).padStart(2,"0")}:${String(Math.round((h%1)*60)).padStart(2,"0")}`;
const ovl=(a,b,c,d)=>Math.max(0,Math.min(b,d)-Math.max(a,c));   // overlap of [a,b] & [c,d]
const clamp=(x,lo,hi)=>Math.max(lo,Math.min(hi,x));

/* ─── shift catalog: a shift is (start, duration); night = overnight start ─── */
const SHIFTS=[
  {id:"d7", start:"07:00",hours:8, night:false,label:"7a · 8h"},
  {id:"d6", start:"06:00",hours:8, night:false,label:"6a · 8h"},
  {id:"D7", start:"07:00",hours:12,night:false,label:"7a · 12h"},
  {id:"n22",start:"22:00",hours:8, night:true, label:"10p · 8h"},
  {id:"n23",start:"23:00",hours:8, night:true, label:"11p · 8h"},
  {id:"N19",start:"19:00",hours:12,night:true, label:"7p · 12h"},
];
const SHIFT_BY=Object.fromEntries(SHIFTS.map(s=>[s.id,s]));
const REACH_LABEL={local:"local",nm:"NM",rural_nm:"rural NM"};
// per-reach default travel bracket: days out before / back after the shift block
const TRAVEL_DEFAULT={
  local:   {beforeDays:0,departTime:"06:00",afterDays:0,returnTime:"20:00"},
  nm:      {beforeDays:1,departTime:"15:00",afterDays:0,returnTime:"22:00"},
  rural_nm:{beforeDays:1,departTime:"11:00",afterDays:1,returnTime:"13:00"},
};

/* ════════ SEED ════════ */
function seedState(){
  const sites=[
    {id:"boston",  name:"Boston ED",     reach:"local",   menu:[{shift:"d7",rate:245},{shift:"n22",rate:290}], travel:TRAVEL_DEFAULT.local},
    {id:"santa_fe",name:"Santa Fe ED",   reach:"nm",      menu:[{shift:"d7",rate:170},{shift:"N19",rate:210}], travel:{beforeDays:1,departTime:"16:00",afterDays:0,returnTime:"22:00"}},
    {id:"abq",     name:"Albuquerque ED",reach:"nm",      menu:[{shift:"d7",rate:285},{shift:"n23",rate:305}], travel:{beforeDays:1,departTime:"15:00",afterDays:0,returnTime:"21:00"}},
    {id:"gallup",  name:"Silver City ED",reach:"rural_nm",menu:[{shift:"D7",rate:300},{shift:"N19",rate:335}], travel:{beforeDays:1,departTime:"11:00",afterDays:1,returnTime:"13:00"}},
  ];
  const trips=[
    {id:"t1",name:"Santa Fe summer",from:"2026-08-01",to:"2026-08-21",loc:"santa_fe",workFactor:"colocate",visible:true},
    {id:"t2",name:"Montana cabin",  from:"2026-07-04",to:"2026-07-12",loc:"montana", workFactor:"commute", visible:true},
    {id:"t3",name:"Japan",          from:"2026-09-12",to:"2026-09-26",loc:"boston",  workFactor:"closed",   visible:true},
  ];
  const calendars=[
    {id:"jun",name:"Juni (BISB)",kind:"school",color:"var(--juniper)",visible:true,
     ranges:[{from:"2026-06-18",to:"2026-08-23",label:"Summer"},{from:"2026-11-25",to:"2026-11-27",label:"Thanksgiving"},
       {from:"2026-12-21",to:"2027-01-03",label:"Winter Break"}]},
    {id:"oce",name:"Ocean (SolBe)",kind:"school",color:"var(--ocean)",visible:true,
     ranges:[{from:"2026-08-22",to:"2026-08-31",label:"Between schools"}]},
    {id:"hol",name:"Holidays",kind:"holiday",color:"var(--ink)",visible:true,
     ranges:[{from:"2026-07-04",to:"2026-07-04",label:"July 4"},{from:"2026-09-07",to:"2026-09-07",label:"Labor Day"},
       {from:"2026-11-26",to:"2026-11-26",label:"Thanksgiving"},{from:"2026-12-25",to:"2026-12-25",label:"Christmas"}]},
  ];
  // Lydia's real S-PHY shifts → Boston, scheduled. Past ones read as worked.
  const LYDIA=[["2026-06-03","day"],["2026-06-05","day"],["2026-06-06","day"],["2026-06-09","day"],
    ["2026-06-13","day"],["2026-06-15","day"],["2026-06-16","day"],["2026-06-23","night"],["2026-06-24","night"],
    ["2026-06-27","day"],["2026-06-30","day"],["2026-07-07","day"],["2026-07-08","day"],["2026-07-30","day"]];
  let n=0;
  const shifts=LYDIA.map(([date,t])=>({id:"L"+(++n),date,siteId:"boston",type:t,status:"scheduled",coLocated:false}));
  // a couple of proposed shifts at travel sites, to show the readout's reach/co-location affordances
  shifts.push({id:"P1",date:"2026-07-14",siteId:"abq",   type:"day",  status:"proposed",coLocated:false});
  shifts.push({id:"P2",date:"2026-07-15",siteId:"abq",   type:"day",  status:"proposed",coLocated:false});
  shifts.push({id:"P3",date:"2026-08-12",siteId:"santa_fe",type:"day",status:"proposed",coLocated:false});
  // a scheduled remote cluster (ABQ) so real travel days bookend it out of the box
  shifts.push({id:"S1",date:"2026-09-29",siteId:"abq",type:"day",status:"scheduled",coLocated:false});
  shifts.push({id:"S2",date:"2026-09-30",siteId:"abq",type:"day",status:"scheduled",coLocated:false});
  // 2026 catch-up: per-month earned override for the pre-app months
  const monthOverrides={"2026-01":7600,"2026-02":9200,"2026-03":12400,"2026-04":10800,"2026-05":8800};
  const settings={wake:"07:00",bed:"20:00",schoolStart:"08:00",schoolEnd:"15:00",goal:220000};
  // a proposed window at a travel site: hold 7 days (incl. a weekend), work 2; a travel day bookends it
  const windows=[{id:"w1",siteId:"santa_fe",type:"day",from:"2026-10-17",to:"2026-10-23",x:2}];
  return {sites,trips,calendars,shifts,monthOverrides,settings,windows};
}

/* ════════ ENGINE ════════ */
const siteIndex=sites=>Object.fromEntries(sites.map(s=>[s.id,s]));
function resolveEntry(site,type){
  const menu=(site&&site.menu)||[{shift:"d7",rate:0}];
  if(type==="day")  return menu.find(e=>!SHIFT_BY[e.shift].night)||menu[0];
  if(type==="night")return menu.find(e=> SHIFT_BY[e.shift].night)||menu[0];
  return menu.find(e=>e.shift===type)||menu[0];
}
const shiftCat=(site,type)=>SHIFT_BY[resolveEntry(site,type).shift].night?"night":"day";
function shiftInterval(site,type){            // [startHour, endHour] within the day
  const e=resolveEntry(site,type),sh=SHIFT_BY[e.shift]||SHIFT_BY.d7,start=parseHM(sh.start);
  return [start,start+sh.hours];
}
function shiftPay(site,type){const e=resolveEntry(site,type),sh=SHIFT_BY[e.shift]||SHIFT_BY.d7;return e.rate*sh.hours;}

const isWeekend=str=>{const g=pd(str).getDay();return g===0||g===6;};
const calCovers=(cal,str)=>(cal.ranges||[]).some(r=>str>=r.from&&str<=r.to);
function schoolOut(str,state){     // kids home all day: weekend, holiday, or a school-calendar break
  if(isWeekend(str))return true;
  return (state.calendars||[]).some(c=>c.visible!==false&&(c.kind==="school"||c.kind==="holiday")&&calCovers(c,str));
}
// kid-home-&-awake intervals for a date, from settings
function homeAwake(str,state){
  const s=state.settings,wake=parseHM(s.wake),bed=parseHM(s.bed);
  if(bed<=wake)return [];
  if(schoolOut(str,state))return [[wake,bed]];
  const ss=clamp(parseHM(s.schoolStart),wake,bed),se=clamp(parseHM(s.schoolEnd),ss,bed);
  return [[wake,ss],[se,bed]].filter(([a,b])=>b>a);
}
const dayAwakeHours=(str,state)=>homeAwake(str,state).reduce((t,[a,b])=>t+(b-a),0);
// hours a single shift misses: its interval ∩ the kid-home-awake band (0 if co-located)
function shiftMissed(shift,state,sIdx){
  const site=sIdx[shift.siteId];if(!site)return 0;
  if(shift.coLocated)return 0;
  const [a,b]=shiftInterval(site,shift.type),aw=homeAwake(shift.date,state);
  let t=0;for(const [x,y] of aw)t+=ovl(a,Math.min(b,24),x,y);
  return Math.round(t*10)/10;
}
const isWorked=sh=>sh.status==="scheduled"&&sh.date<TODAY_S;
const bucketOf=sh=>sh.status==="proposed"?"proposed":(sh.date<TODAY_S?"worked":"scheduled");
// worked shifts can carry hand-edited actuals; otherwise fall back to the planned value
const missedOf=(sh,state,sIdx)=>(isWorked(sh)&&Number.isFinite(sh.actualMissed))?sh.actualMissed:shiftMissed(sh,state,sIdx);
const payOf=(sh,sIdx)=>(isWorked(sh)&&Number.isFinite(sh.actualPay))?sh.actualPay:shiftPay(sIdx[sh.siteId],sh.type);
// soft warnings — never block, just flag an odd state in a colour
function warnOf(sh,state){
  const trip=(state.trips||[]).find(t=>t.visible!==false&&t.workFactor==="closed"&&sh.date>=t.from&&sh.date<=t.to);
  if(trip)return "on a closed trip ("+trip.name+")";
  if(sh.status==="proposed"&&sh.date<TODAY_S)return "proposed but already in the past";
  return null;
}

/* ─── windows: a held span where you'll work X of Y days (ratio sites) ─── */
const winDates=w=>{const out=[];for(let d=pd(w.from);d<=pd(w.to);d=ad(d,1))out.push(ds(d));return out;};
function windowBrackets(w,sIdx){            // provisional travel days outside the window, for remote sites
  const site=sIdx[w.siteId];if(!site||site.reach==="local")return {before:[],after:[]};
  const tv=site.travel||TRAVEL_DEFAULT[site.reach]||TRAVEL_DEFAULT.local,before=[],after=[];
  for(let i=(tv.beforeDays||0);i>=1;i--)before.push(ds(ad(pd(w.from),-i)));
  for(let i=1;i<=(tv.afterDays||0);i++)after.push(ds(ad(pd(w.to),i)));
  return {before,after};
}
// date → {wid,kind:"span"|"travel"} for every day a window touches
function winBand(windows,sIdx){
  const map={};
  (windows||[]).forEach(w=>{
    winDates(w).forEach(dt=>{map[dt]={w,kind:"span"};});
    const b=windowBrackets(w,sIdx);[...b.before,...b.after].forEach(dt=>{if(!map[dt])map[dt]={w,kind:"travel"};});
  });
  return map;
}
// the proposed-impact band: min/max kid-awake hours missed + provisional travel
function windowBand(w,state,sIdx){
  const site=sIdx[w.siteId],dates=winDates(w),Y=dates.length,X=clamp(w.x||1,1,Y);
  const perDay=dates.map(dt=>shiftMissed({date:dt,siteId:w.siteId,type:w.type,coLocated:false},state,sIdx)).sort((a,b)=>a-b);
  const lo=perDay.slice(0,X).reduce((a,b)=>a+b,0),hi=perDay.slice(Y-X).reduce((a,b)=>a+b,0);
  const b=windowBrackets(w,sIdx);let travel=0;[...b.before,...b.after].forEach(dt=>{travel+=dayAwakeHours(dt,state);});
  const r=x=>Math.round(x*10)/10;
  return {Y,X,min:r(lo+travel),max:r(hi+travel),travel:r(travel),money:X*(site?shiftPay(site,w.type):0)};
}
// materialize a window into X scheduled shifts on its X lowest-impact days
function scheduleWindow(state,sIdx,w){
  const dates=winDates(w).map(dt=>({dt,m:shiftMissed({date:dt,siteId:w.siteId,type:w.type,coLocated:false},state,sIdx)}))
    .sort((a,b)=>a.m-b.m).slice(0,clamp(w.x||1,1,winDates(w).length)).map(o=>o.dt);
  const keep=state.shifts.filter(s=>!dates.includes(s.date));
  const made=dates.map((dt,i)=>({id:"w"+w.id+"_"+i,date:dt,siteId:w.siteId,type:w.type,status:"scheduled",coLocated:false}));
  return {...state,shifts:[...keep,...made],windows:state.windows.filter(x=>x.id!==w.id)};
}

/* ─── travel days: real bookends around scheduled remote clusters, editable ─── */
function scheduledClusters(state,sIdx){
  const bySite={};
  state.shifts.filter(s=>s.status==="scheduled").forEach(s=>{(bySite[s.siteId]=bySite[s.siteId]||[]).push(s.date);});
  const out=[];
  for(const siteId in bySite){
    if(!sIdx[siteId]||sIdx[siteId].reach==="local")continue;       // only remote clusters travel
    const dates=bySite[siteId].slice().sort();let run=null;
    dates.forEach(dt=>{if(run&&Math.round((pd(dt)-pd(run.to))/864e5)===1)run.to=dt;
      else {if(run)out.push(run);run={siteId,from:dt,to:dt};}});
    if(run)out.push(run);
  }
  return out;
}
// date → {kind:"depart"|"return", time, siteId} for every scheduled travel day
function travelBand(state,sIdx){
  const map={};
  scheduledClusters(state,sIdx).forEach(c=>{
    const site=sIdx[c.siteId],tv=site.travel||TRAVEL_DEFAULT[site.reach]||TRAVEL_DEFAULT.local;
    for(let i=(tv.beforeDays||0);i>=1;i--){const dt=ds(ad(pd(c.from),-i));if(!map[dt])map[dt]={kind:"depart",time:tv.departTime,siteId:c.siteId};}
    for(let i=1;i<=(tv.afterDays||0);i++){const dt=ds(ad(pd(c.to),i));if(!map[dt])map[dt]={kind:"return",time:tv.returnTime,siteId:c.siteId};}
  });
  return map;
}
// hours a travel day costs: coarse half/whole override, else exact (awake time after departure / before return)
function travelMissed(dateStr,info,state,edit){
  const aw=homeAwake(dateStr,state),full=aw.reduce((t,[a,b])=>t+(b-a),0);
  if(edit&&edit.coarse==="whole")return Math.round(full*10)/10;
  if(edit&&edit.coarse==="half")return Math.round(full*5)/10;
  const time=parseHM((edit&&edit.time)||info.time);
  let t=0;for(const [a,b] of aw)t+=info.kind==="depart"?ovl(a,b,time,24):ovl(a,b,0,time);
  return Math.round(t*10)/10;
}
const travelEditOf=(state,dt)=>(state.travelEdits||{})[dt];
// a month with a 2026 catch-up override is frozen: its days can't hold shifts
const monthLocked=(state,dateStr)=>Number.isFinite((state.monthOverrides||{})[mk(dateStr)]);

/* year + month aggregates for the banner */
function aggregate(state,sIdx,viewYM){
  const yr=String(YEAR);
  const pay=sh=>shiftPay(sIdx[sh.siteId],sh.type);
  // $ — worked uses month overrides where present, else summed past-scheduled pay
  const workedByMonth={};
  state.shifts.forEach(sh=>{if(isWorked(sh)){const m=mk(sh.date);workedByMonth[m]=(workedByMonth[m]||0)+payOf(sh,sIdx);}});
  const months=new Set([...Object.keys(workedByMonth),...Object.keys(state.monthOverrides||{})].filter(m=>m.startsWith(yr)));
  let worked$=0;months.forEach(m=>{const ov=(state.monthOverrides||{})[m];worked$+=(ov!=null?ov:(workedByMonth[m]||0));});
  let scheduled$=0,proposed$=0;
  state.shifts.forEach(sh=>{if(!sh.date.startsWith(yr))return;const b=bucketOf(sh);
    if(b==="scheduled")scheduled$+=pay(sh);else if(b==="proposed")proposed$+=pay(sh);});
  // hours missed — current viewed month only (never annualized)
  const hrs={worked:0,scheduled:0,proposed:0};
  state.shifts.forEach(sh=>{if(mk(sh.date)!==viewYM)return;hrs[bucketOf(sh)]+=missedOf(sh,state,sIdx);});
  // proposed windows: money is pinned (X×rate); hours contribute their low end (a floor) for the window's month
  (state.windows||[]).forEach(w=>{if(!w.from.startsWith(yr))return;const b=windowBand(w,state,sIdx);
    proposed$+=b.money;if(mk(w.from)===viewYM)hrs.proposed+=b.min;});
  // travel days (scheduled remote clusters) add their hours to worked/scheduled by date
  const tb=travelBand(state,sIdx);
  Object.keys(tb).forEach(dt=>{if(mk(dt)!==viewYM)return;
    hrs[dt<TODAY_S?"worked":"scheduled"]+=travelMissed(dt,tb[dt],state,travelEditOf(state,dt));});
  return {worked$,scheduled$,proposed$,hrs};
}

/* ════════ persistence + sanitize ════════
   Every load path normalises onto seed defaults and drops invalid
   records, so a partial or old-shape saved state can never crash render. */
const DATE_RE=/^\d{4}-\d{2}-\d{2}$/;
function sanitize(o){
  if(!o||typeof o!=="object")return seedState();
  const seed=seedState();
  let sites=(Array.isArray(o.sites)?o.sites:[]).filter(s=>s&&s.id&&Array.isArray(s.menu)&&s.menu.length&&s.menu.every(m=>m&&SHIFT_BY[m.shift]));
  if(!sites.length)sites=seed.sites;
  const ids=new Set(sites.map(s=>s.id));
  const arr=(v,fb)=>Array.isArray(v)?v:fb;
  const settings={...seed.settings,...(o.settings&&typeof o.settings==="object"?o.settings:{})};
  const obj=v=>(v&&typeof v==="object"&&!Array.isArray(v))?v:{};
  const shifts=arr(o.shifts,[]).filter(s=>s&&DATE_RE.test(s.date)&&ids.has(s.siteId)).map(s=>{
    const o2={id:String(s.id||("s"+Math.random().toString(36).slice(2))),date:s.date,siteId:s.siteId,
      type:s.type||"day",status:s.status==="scheduled"?"scheduled":"proposed",coLocated:!!s.coLocated};
    if(Number.isFinite(s.actualPay))o2.actualPay=s.actualPay;
    if(Number.isFinite(s.actualMissed))o2.actualMissed=s.actualMissed;return o2;});
  const windows=arr(o.windows,[]).filter(w=>w&&DATE_RE.test(w.from)&&DATE_RE.test(w.to)&&w.from<=w.to&&ids.has(w.siteId))
    .map(w=>({id:String(w.id||("w"+Math.random().toString(36).slice(2))),siteId:w.siteId,type:w.type||"day",from:w.from,to:w.to,x:clamp(Math.round(+w.x||1),1,99)}));
  return {sites,trips:arr(o.trips,seed.trips),calendars:arr(o.calendars,seed.calendars),
    settings,monthOverrides:obj(o.monthOverrides),travelEdits:obj(o.travelEdits),shifts,windows};
}
function load(){
  try{const s=localStorage.getItem("perDiemNext");if(s)return sanitize(JSON.parse(s));}catch(e){}

/* ════════ CALENDAR work surface ════════ */
function monthCells(y,m){
  const lead=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate(),cells=[];
  for(let i=0;i<lead;i++)cells.push(null);
  for(let d=1;d<=dim;d++)cells.push(ds(new Date(y,m,d)));
  while(cells.length%7)cells.push(null);
  return cells;
}
function tripOn(str,trips){return (trips||[]).find(t=>t.visible!==false&&str>=t.from&&str<=t.to);}

const siteCode=site=>(site?site.name:"?").replace(/ ED$/,"").split(/\s+/).map(w=>w[0]).join("").slice(0,3).toUpperCase();
function DayCell({str,shift,state,sIdx,selected,today,win,travel,locked,preview,onTap,onDown,onEnter}){
  if(!str)return <div style={{aspectRatio:"1"}}/>;
  const out=schoolOut(str,state),trip=tripOn(str,state.trips);
  let bg=C.panel;
  if(trip)bg=C.blockTrip;else if(out)bg=C.weekend;
  if(win&&win.kind==="span")bg=C.sel;
  if(preview)bg=C.sel;
  const cat=shift?shiftCat(sIdx[shift.siteId],shift.type):null;
  const status=shift?bucketOf(shift):null;
  const warn=shift?warnOf(shift,state):null;
  const showTravel=travel&&!shift;
  const tMissed=showTravel?travelMissed(str,travel,state,travelEditOf(state,str)):0;
  const day=+str.slice(8,10);
  const ringCol=selected?C.ink:warn?C.warn:win?C.ocean:showTravel?C.ocean:C.line2;
  const spanFirst=win&&win.kind==="span"&&win.w.from===str;
  return <div onClick={()=>onTap(str)}
    onPointerDown={onDown?e=>onDown(str,e):undefined} onPointerEnter={onEnter?()=>onEnter(str):undefined}
    style={{aspectRatio:"1",border:`${selected||warn||win||showTravel?2:1}px ${(win&&win.kind==="travel")?"dashed":"solid"} ${ringCol}`,
    borderRadius:8,background:bg,padding:"4px 5px",cursor:"pointer",position:"relative",opacity:locked?0.5:1,
    display:"flex",flexDirection:"column",overflow:"hidden",touchAction:onDown?"none":"auto"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:11,fontWeight:today?900:600,color:today?C.ink:C.gray}}>{day}</span>
      {locked?<span title="catch-up month — locked" style={{fontSize:9,color:C.mute}}>🔒</span>
        :warn?<span title={warn} style={{fontSize:10,color:C.warn}}>⚠</span>
        :(win&&win.kind==="travel")?<span title="provisional travel" style={{fontSize:9,color:C.ocean,opacity:0.6}}>✈</span>
        :today?<span style={{width:5,height:5,borderRadius:5,background:C.danger}}/>:null}
    </div>
    {shift?<ShiftPill site={sIdx[shift.siteId]} cat={cat} status={status} co={shift.coLocated}/>
      :showTravel?<div style={{marginTop:"auto",fontSize:9,fontWeight:800,color:C.ocean,display:"flex",alignItems:"center",gap:2,
        border:`1.5px solid ${C.ocean}`,borderRadius:5,padding:"1px 3px",whiteSpace:"nowrap",overflow:"hidden"}}>✈ {fmtH(tMissed)}</div>
      :spanFirst?<div style={{marginTop:"auto",fontSize:9,fontWeight:800,color:C.ocean,border:`1.5px dashed ${C.ocean}`,
        borderRadius:5,padding:"1px 3px",whiteSpace:"nowrap",overflow:"hidden"}}>{siteCode(sIdx[win.w.siteId])} ×{win.w.x}</div>
      :win&&win.kind==="span"?<div style={{marginTop:"auto",height:3,borderRadius:2,background:C.ocean,opacity:0.4}}/>:null}
  </div>;
}
function ShiftPill({site,cat,status,co}){
  const filled=status!=="proposed";

  return <div style={{marginTop:"auto",display:"flex",alignItems:"center",gap:3,
    fontSize:9.5,fontWeight:800,padding:"2px 4px",borderRadius:5,

// the month range the desktop scroll covers: June 2026 → December 2027
const CAL_MONTHS=Array.from({length:19},(_,i)=>{const m=5+i;return [2026+Math.floor(m/12),m%12];});

function CalendarSurface({state,sIdx,mobile,viewY,viewM,setView,tool,setTool,selected,onTap,onUndo,canUndo,winBy,travelBy,onCreateWindow}){
  const tools=[["select","⌖","Select"],["propose","✎","Propose"],["window","▭","Window"],["schedule","◆","Schedule"],["erase","⌫","Erase"]];
  const step=n=>{let m=viewM+n,y=viewY;if(m<0){m=11;y--;}if(m>11){m=0;y++;}setView(y,m);};
  const [drag,setDrag]=useState(null);
  const previewSet=useMemo(()=>{if(!drag)return null;const a=drag.anchor<drag.over?drag.anchor:drag.over,b=drag.anchor<drag.over?drag.over:drag.anchor;
    const set=new Set();for(let d=pd(a);d<=pd(b);d=ad(d,1))set.add(ds(d));return set;},[drag]);
  useEffect(()=>{if(!drag)return;const up=()=>{const a=drag.anchor<drag.over?drag.anchor:drag.over,b=drag.anchor<drag.over?drag.over:drag.anchor;onCreateWindow(a,b);setDrag(null);};
    window.addEventListener("pointerup",up);return ()=>window.removeEventListener("pointerup",up);},[drag,onCreateWindow]);
  const onDown=tool==="window"?(str)=>setDrag({anchor:str,over:str}):undefined;
  const onEnter=tool==="window"?(str)=>setDrag(d=>d?{...d,over:str}:d):undefined;

    {/* grid — desktop scrolls every month as a row; phone shows one month + arrows */}

}

/* ════════ READOUT — the per-day picker/editor ════════ */
function Readout({state,sIdx,selected,mutate}){
  if(!selected)return <div style={{padding:"16px 14px",color:C.mute,fontSize:12.5}}>
    Tap a day to read or edit it. <b>Propose</b> adds a shift; <b>Schedule</b> commits it (or draws a fresh one); <b>Erase</b> removes a proposed one.</div>;
  const shift=state.shifts.find(s=>s.date===selected);
  const out=schoolOut(selected,state),awake=dayAwakeHours(selected,state),trip=tripOn(selected,state.trips);
  const d=pd(selected);
  const dayLabel=`${DOW[d.getDay()]} ${MON[d.getMonth()]} ${d.getDate()}`;
  const setShift=patch=>mutate(s=>({...s,shifts:s.shifts.map(x=>x.id===shift.id?{...x,...patch}:x)}));
  const addShift=(siteId,type)=>mutate(s=>({...s,shifts:[...s.shifts.filter(x=>x.date!==selected),
    {id:"s"+Date.now(),date:selected,siteId,type,status:"proposed",coLocated:false}]}));
  const del=()=>mutate(s=>({...s,shifts:s.shifts.filter(x=>x.id!==shift.id)}));

  const head=<div style={{display:"flex",alignItems:"baseline",gap:10,flexWrap:"wrap",marginBottom:10}}>
    <span style={{fontSize:15,fontWeight:800}}>{dayLabel}</span>
    <span style={{fontSize:10.5,fontWeight:700,color:out?C.juniper:C.gray,border:`1px solid ${C.line}`,borderRadius:12,padding:"1px 8px"}}>
      {out?"kids home all day":"school day"}</span>
    <span style={{fontSize:11,color:C.gray}}>kids home & awake <b style={{color:C.ink}}>{fmtH(awake)}</b></span>
    {trip&&<span style={{fontSize:10.5,color:C.ocean}}>✈ {trip.name} ({trip.workFactor})</span>}
  </div>;

  // catch-up month → locked
  if(monthLocked(state,selected))return <div style={{padding:"14px"}}>{head}
    <div style={{fontSize:11.5,color:C.gray,display:"flex",alignItems:"center",gap:6}}>🔒 {MONL[d.getMonth()]} is a 2026 catch-up month
      ({fmt$(state.monthOverrides[mk(selected)])} earned). Its days are frozen — clear the override in <b>Trips&nbsp;&amp;&nbsp;Calendars</b> to edit shifts.</div>
  </div>;
  // travel day (scheduled remote cluster) → exact + coarse editor
  const tinfo=travelBand(state,sIdx)[selected];
  if(!shift&&tinfo)return <TravelReadout state={state} sIdx={sIdx} dateStr={selected} info={tinfo} head={head} awake={awake} mutate={mutate}/>;

  if(!shift)return <div style={{padding:"14px"}}>{head}
    <div style={{fontSize:11.5,color:C.gray,marginBottom:8}}>No shift here. Add one:</div>
    <SitePicker sites={state.sites} value={state.sites[0].id} onPick={(sid,ty)=>addShift(sid,ty)} pickType/>
  </div>;

  const site=sIdx[shift.siteId],cat=shiftCat(site,shift.type),plannedPay=shiftPay(site,shift.type),
    plannedMissed=shiftMissed(shift,state,sIdx),worked=isWorked(shift),remote=site.reach!=="local",warn=warnOf(shift,state);
  const status=bucketOf(shift);
  const showPay=worked?payOf(shift,sIdx):plannedPay,showMissed=worked?missedOf(shift,state,sIdx):plannedMissed;
  const edited=worked&&(Number.isFinite(shift.actualPay)||Number.isFinite(shift.actualMissed));
  return <div style={{padding:"14px"}}>{head}
    {warn&&<div style={{fontSize:11.5,fontWeight:700,color:C.warn,marginBottom:9,display:"flex",alignItems:"center",gap:5}}>⚠ {warn}</div>}
    <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
      <div style={{flex:"1 1 280px"}}>
        <Field label="Site"><select style={inp} value={shift.siteId} onChange={e=>setShift({siteId:e.target.value})}>
          {state.sites.map(s=><option key={s.id} value={s.id}>{s.name} · {REACH_LABEL[s.reach]}</option>)}</select></Field>
        <Field label="Shift"><div style={{display:"flex",gap:6}}>
          {["day","night"].map(t=><Btn key={t} on={cat===t} onClick={()=>setShift({type:t})}>{t==="day"?"Day":"Night"}</Btn>)}
          <span style={{alignSelf:"center",fontSize:11,color:C.mute}}>{SHIFT_BY[resolveEntry(site,shift.type).shift].label}</span>
        </div></Field>
        <Field label="Status"><div style={{display:"flex",gap:6,alignItems:"center"}}>
          <Btn on={status==="proposed"} onClick={()=>setShift({status:"proposed"})}>Proposed</Btn>
          <Btn on={status!=="proposed"} onClick={()=>setShift({status:"scheduled"})}>Scheduled</Btn>
          {worked&&<span style={{fontSize:10.5,fontWeight:800,color:C.gray}}>✓ worked (past)</span>}
        </div></Field>
        {remote&&<label style={{display:"flex",alignItems:"center",gap:7,fontSize:12,marginTop:2,cursor:"pointer"}}>
          <input type="checkbox" checked={!!shift.coLocated} onChange={e=>setShift({coLocated:e.target.checked})}/>
          Co-located — kids are here, no hours missed</label>}
        {worked&&<div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${C.line2}`}}>
          <div style={{fontSize:9.5,fontWeight:800,letterSpacing:"0.05em",textTransform:"uppercase",color:C.mute,marginBottom:6}}>Actuals — what really happened</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
            <label style={{fontSize:11}}>earned $<br/><input type="number" style={{...inp,width:96}} value={Math.round(showPay)}
              onChange={e=>setShift({actualPay:e.target.value===""?undefined:+e.target.value})}/></label>
            <label style={{fontSize:11}}>hours missed<br/><input type="number" step="0.5" style={{...inp,width:96}} value={showMissed}
              onChange={e=>setShift({actualMissed:e.target.value===""?undefined:+e.target.value})}/></label>
            {edited&&<Btn small onClick={()=>setShift({actualPay:undefined,actualMissed:undefined})}>reset to planned</Btn>}
          </div></div>}
      </div>
      <div style={{flex:"0 0 auto",display:"flex",flexDirection:"column",gap:12,alignItems:"flex-end"}}>
        <Stat label={worked?"Earned":"Earns"} value={fmt$(showPay)} sub={edited&&Number.isFinite(shift.actualPay)?"actual":null} accent={C.juniper}/>
        <Stat label="Hours missed" value={shift.coLocated?"0h":fmtH(showMissed)} sub={edited&&Number.isFinite(shift.actualMissed)?"actual":null} accent={showMissed>0&&!shift.coLocated?C.danger:C.gray}/>
        <Btn small onClick={del}>Delete</Btn>
      </div>
    </div>
  </div>;
}

          <span style={{fontSize:11,color:C.mute}}>days held</span></div></Field>
      </div>
      <div style={{flex:"0 0 auto",display:"flex",flexDirection:"column",gap:12,alignItems:"flex-end"}}>
        <Stat label="Earns" value={fmt$(band.money)} accent={C.juniper}/>
        <Stat label="Hours missed" value={`${fmtH(band.min)}–${fmtH(band.max)}`} sub={band.travel>0?`incl. ~${fmtH(band.travel)} travel`:"range over placement"} accent={C.ocean}/>
        <div style={{display:"flex",gap:6}}>
          <Btn small onClick={del}>Delete</Btn>
          <Btn small kind="prim" onClick={sched} title="materialize the X lowest-impact days as scheduled shifts">Schedule {band.X} →</Btn>
        </div>
      </div>
    </div>
    <div style={{fontSize:10.5,color:C.mute,marginTop:10}}>Scheduling places the {band.X} lowest-impact day{band.X>1?"s":""} and bookends travel; you can then adjust each shift. Drawing a shift over the window also replaces it.</div>
  </div>;
}

/* ════════ TRAVEL READOUT — a real travel day: exact time + coarse feel ════════ */
function TravelReadout({state,sIdx,dateStr,info,head,awake,mutate}){
  const edit=travelEditOf(state,dateStr)||{};
  const setEdit=patch=>mutate(s=>{const te={...(s.travelEdits||{})};const next={...(te[dateStr]||{}),...patch};
    Object.keys(next).forEach(k=>{if(next[k]==null)delete next[k];});
    if(Object.keys(next).length)te[dateStr]=next;else delete te[dateStr];return {...s,travelEdits:te};});
  const missed=travelMissed(dateStr,info,state,edit),site=sIdx[info.siteId];
  const feel=edit.coarse||"exact";
  const time=edit.time||info.time;
  return <div style={{padding:"14px"}}>{head}
    <div style={{fontSize:11.5,fontWeight:700,color:C.ocean,marginBottom:10}}>
      ✈ Travel day — {info.kind==="depart"?"leaving for":"home from"} {site?site.name:"a trip"}</div>
    <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
      <div style={{flex:"1 1 280px"}}>
        <Field label="How it feels"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <Btn on={feel==="exact"} onClick={()=>setEdit({coarse:undefined})}>Exact time</Btn>
          <Btn on={feel==="half"} onClick={()=>setEdit({coarse:"half"})}>½ a day</Btn>
          <Btn on={feel==="whole"} onClick={()=>setEdit({coarse:"whole"})}>Whole day</Btn>
        </div></Field>
        {feel==="exact"&&<Field label={info.kind==="depart"?"Depart time":"Return time"}>
          <input type="time" style={{...inp,maxWidth:150}} value={time} onChange={e=>setEdit({time:e.target.value})}/>
          <div style={{fontSize:10.5,color:C.mute,marginTop:3}}>
            {info.kind==="depart"?`you miss kid-awake time after ${time}`:`you miss kid-awake time until ${time}`}</div></Field>}
        {feel!=="exact"&&<div style={{fontSize:10.5,color:C.mute}}>Stored as ~{fmtH(missed)} of this day's {fmtH(awake)} kid-awake hours, so monthly totals stay one clean number.</div>}
      </div>
      <div style={{flex:"0 0 auto",display:"flex",flexDirection:"column",gap:12,alignItems:"flex-end"}}>
        <Stat label="Hours missed" value={fmtH(missed)} sub={feel==="exact"?"exact":feel==="half"?"½ day":"whole day"} accent={C.ocean}/>
      </div>
    </div>
  </div>;
}

/* ════════ DRAWER — calendars + trips visibility ════════ */
function DrawerStrip({state,mutate}){
  const [open,setOpen]=useState(false);
  const toggleCal=id=>mutate(s=>({...s,calendars:s.calendars.map(c=>c.id===id?{...c,visible:!c.visible}:c)}));
  const toggleTrip=id=>mutate(s=>({...s,trips:s.trips.map(t=>t.id===id?{...t,visible:t.visible===false}:t)}));
  return <div style={{borderBottom:`1px solid ${C.line2}`,background:C.panel2,flexShrink:0}}>
    <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 12px",cursor:"pointer"}}>
      <span style={{fontSize:9.5,fontWeight:800,letterSpacing:"0.05em",textTransform:"uppercase",color:C.mute}}>
        {open?"▾":"▸"} Calendars & trips</span>
      {!open&&<span style={{fontSize:10.5,color:C.gray}}>
        {(state.calendars||[]).filter(c=>c.visible!==false).length} cal · {(state.trips||[]).filter(t=>t.visible!==false).length} trips shown</span>}
    </div>
    {open&&<div style={{display:"flex",gap:6,flexWrap:"wrap",padding:"2px 12px 9px"}}>
      {state.calendars.map(c=><Chip key={c.id} on={c.visible!==false} dot={c.color} onClick={()=>toggleCal(c.id)}>{c.name}</Chip>)}
      {state.trips.map(t=><Chip key={t.id} on={t.visible!==false} dot={C.ocean} onClick={()=>toggleTrip(t.id)}>✈ {t.name}</Chip>)}
    </div>}
  </div>;
}

/* ════════ SETUP TABS ════════ */
function TripsCalsTab({state,mutate}){
  const s=state.settings;
  const setS=patch=>mutate(x=>({...x,settings:{...x.settings,...patch}}));
  const T=({label,k})=><Field label={label}><input type="time" style={inp} value={s[k]} onChange={e=>setS({[k]:e.target.value})}/></Field>;
  return <div style={{padding:"16px 16px 60px",overflow:"auto",maxWidth:720}}>
    <h3 style={{fontSize:13,fontWeight:800,marginBottom:10}}>Family day</h3>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:10}}>
      <T label="Wake up" k="wake"/><T label="School start" k="schoolStart"/><T label="School end" k="schoolEnd"/><T label="Bed time" k="bed"/>
    </div>
    <div style={{fontSize:11,color:C.gray,margin:"4px 0 18px"}}>
      Hours missed = a shift's overlap with the time kids are home and awake. On school days that's before {s.schoolStart} and after {s.schoolEnd}; on days off, the whole {s.wake}–{s.bed} window.</div>
    <h3 style={{fontSize:13,fontWeight:800,marginBottom:10}}>Earnings goal</h3>
    <Field label={`${YEAR} total money earned`}><input type="number" style={{...inp,maxWidth:200}} value={s.goal} onChange={e=>setS({goal:+e.target.value||0})}/></Field>
    <h3 style={{fontSize:13,fontWeight:800,margin:"18px 0 10px"}}>2026 catch-up</h3>
    <div style={{fontSize:11,color:C.gray,marginBottom:10}}>Enter what you already earned in a past month instead of re-entering every shift. A month with a value is <b>frozen</b> on the calendar (🔒) and its override is authoritative.</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8}}>
      {MON.map((mn,i)=>{const key=`2026-${String(i+1).padStart(2,"0")}`,v=(state.monthOverrides||{})[key];
        const setOv=val=>mutate(st=>{const o={...(st.monthOverrides||{})};if(val===""||val==null)delete o[key];else o[key]=+val;return {...st,monthOverrides:o};});
        return <label key={key} style={{fontSize:11}}>
          <span style={{color:Number.isFinite(v)?C.ink:C.mute,fontWeight:Number.isFinite(v)?800:600}}>{Number.isFinite(v)?"🔒 ":""}{mn}</span>
          <input type="number" placeholder="—" style={{...inp,padding:"4px 6px"}} value={Number.isFinite(v)?v:""} onChange={e=>setOv(e.target.value)}/>
        </label>;})}
    </div>
    <h3 style={{fontSize:13,fontWeight:800,margin:"18px 0 10px"}}>Calendars</h3>
    {state.calendars.map(c=><div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.line2}`}}>
      <span style={{width:9,height:9,borderRadius:9,background:c.color}}/>
      <b style={{fontSize:12.5}}>{c.name}</b><span style={{fontSize:10.5,color:C.mute}}>{c.kind} · {(c.ranges||[]).length} ranges</span>
      <span style={{marginLeft:"auto"}}><Chip on={c.visible!==false} onClick={()=>mutate(st=>({...st,calendars:st.calendars.map(x=>x.id===c.id?{...x,visible:!(x.visible!==false)}:x)}))}>{c.visible!==false?"shown":"hidden"}</Chip></span>
    </div>)}
    <h3 style={{fontSize:13,fontWeight:800,margin:"18px 0 10px"}}>Trips</h3>
    {state.trips.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:`1px solid ${C.line2}`}}>
      <b style={{fontSize:12.5}}>✈ {t.name}</b><span style={{fontSize:10.5,color:C.mute}}>{t.from} → {t.to} · {t.workFactor}</span>
      <span style={{marginLeft:"auto"}}><Chip on={t.visible!==false} onClick={()=>mutate(st=>({...st,trips:st.trips.map(x=>x.id===t.id?{...x,visible:!(x.visible!==false)}:x)}))}>{t.visible!==false?"shown":"hidden"}</Chip></span>
    </div>)}
  </div>;
}
function SitesTab({state,mutate}){
  const setRate=(sid,shift,rate)=>mutate(s=>({...s,sites:s.sites.map(x=>x.id!==sid?x:{...x,menu:x.menu.map(m=>m.shift===shift?{...m,rate}:m)})}));
  return <div style={{padding:"16px 16px 60px",overflow:"auto",maxWidth:720}}>
    <div style={{fontSize:11,color:C.gray,marginBottom:12}}>Site setup is mostly unchanged from today — rates shown here; full editor comes back later.</div>
    {state.sites.map(s=><div key={s.id} style={{padding:"10px 0",borderBottom:`1px solid ${C.line2}`}}>
      <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:6}}>
        <b style={{fontSize:13.5}}>{s.name}</b><span style={{fontSize:10.5,color:C.mute}}>{REACH_LABEL[s.reach]}</span></div>
      <div style={{display:"flex",gap:14,flexWrap:"wrap"}}>{s.menu.map(m=>{const sh=SHIFT_BY[m.shift];
        return <label key={m.shift} style={{fontSize:11.5}}>
          <span style={{color:C.gray}}>{sh.night?"Night":"Day"} ({sh.label}) $/hr </span>
          <input type="number" value={m.rate} onChange={e=>setRate(s.id,m.shift,+e.target.value||0)}
            style={{...inp,width:76,display:"inline-block",padding:"3px 6px"}}/>
          <span style={{color:C.mute}}> = {fmt$(m.rate*sh.hours)}/shift</span></label>;})}</div>
    </div>)}
  </div>;
}

/* ════════ APP ════════ */
function App(){
  const [state,setState]=useState(load);
  const past=useRef([]);
  const [canUndo,setCanUndo]=useState(false);
  const [tab,setTab]=useState("calendar");
  const [tool,setTool]=useState("select");
  const [selected,setSelected]=useState(TODAY_S);
  const [selWid,setSelWid]=useState(null);
  const [[viewY,viewM],setVY]=useState([2026,5]);
  const [lastSite,setLastSite]=useState("boston");
  const [theme,setTheme]=useState(()=>{try{return localStorage.getItem("perDiemTheme")||"system";}catch(e){return "system";}});
  const [mobile,setMobile]=useState(()=>typeof window!=="undefined"&&window.matchMedia&&window.matchMedia("(max-width:760px)").matches);

  useEffect(()=>{try{localStorage.setItem("perDiemNext",JSON.stringify(state));}catch(e){}},[state]);
  useEffect(()=>{const m=window.matchMedia&&window.matchMedia("(max-width:760px)");if(!m)return;
    const h=()=>setMobile(m.matches);m.addEventListener&&m.addEventListener("change",h);return ()=>m.removeEventListener&&m.removeEventListener("change",h);},[]);
  useEffect(()=>{const mq=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)");
    const apply=()=>{const eff=theme==="system"?((mq&&mq.matches)?"dark":"light"):theme;document.documentElement.setAttribute("data-theme",eff);};
    apply();try{localStorage.setItem("perDiemTheme",theme);}catch(e){}
    if(theme==="system"&&mq&&mq.addEventListener){mq.addEventListener("change",apply);return ()=>mq.removeEventListener("change",apply);}},[theme]);

  const mutate=updater=>setState(s=>{past.current.push(s);if(past.current.length>50)past.current.shift();setCanUndo(true);return updater(s);});
  const undo=()=>{if(!past.current.length)return;const prev=past.current.pop();setCanUndo(past.current.length>0);setState(prev);};
  const setView=(y,m)=>setVY([y,m]);

  const sIdx=useMemo(()=>siteIndex(state.sites),[state.sites]);
  const winBy=useMemo(()=>winBand(state.windows,sIdx),[state.windows,sIdx]);
  const travelBy=useMemo(()=>travelBand(state,sIdx),[state.shifts,sIdx]);
  const viewYM=`${viewY}-${String(viewM+1).padStart(2,"0")}`;
  const agg=useMemo(()=>aggregate(state,sIdx,viewYM),[state,sIdx,viewYM]);

  // drawing a shift over a window replaces the window (no proposed/scheduled mixing)
  const dropWinAt=(s,str)=>s.windows.filter(w=>!(str>=w.from&&str<=w.to));
  const onTap=str=>{
    if(tool==="window")return;   // window tool builds via drag, not tap
    if(monthLocked(state,str)){setSelected(str);setSelWid(null);const d0=pd(str);setVY([d0.getFullYear(),d0.getMonth()]);return;}   // frozen month
    const ex=state.shifts.find(s=>s.date===str);
    if(tool==="propose"){
      if(!ex)mutate(s=>({...s,windows:dropWinAt(s,str),shifts:[...s.shifts,{id:"s"+Date.now(),date:str,siteId:lastSite,type:"day",status:"proposed",coLocated:false}]}));
    }else if(tool==="schedule"){
      // draw-to-schedule: replaces a proposed shift in place, or drops a fresh scheduled one
      if(ex)mutate(s=>({...s,shifts:s.shifts.map(x=>x.id===ex.id?{...x,status:"scheduled"}:x)}));
      else mutate(s=>({...s,windows:dropWinAt(s,str),shifts:[...s.shifts,{id:"s"+Date.now(),date:str,siteId:lastSite,type:"day",status:"scheduled",coLocated:false}]}));
    }else if(tool==="erase"){
      if(ex&&ex.status==="proposed")mutate(s=>({...s,shifts:s.shifts.filter(x=>x.id!==ex.id)}));   // erase = proposed-only
    }
    setSelected(str);
    setSelWid(winBy[str]?winBy[str].w.id:null);
    const d=pd(str);setVY([d.getFullYear(),d.getMonth()]);   // focus the banner's month on the tapped day
  };
  const onCreateWindow=React.useCallback((from,to)=>{
    const id="w"+Date.now(),span=Math.round((pd(to)-pd(from))/864e5)+1;
    mutate(s=>({...s,windows:[...(s.windows||[]),{id,siteId:lastSite,type:"day",from,to,x:clamp(Math.round(span/2),1,span)}]}));
    setSelWid(id);setSelected(from);const d=pd(from);setVY([d.getFullYear(),d.getMonth()]);
  },[lastSite]);
  // keep lastSite synced to the selected day's shift / window, so new draws inherit context
  useEffect(()=>{const w=selWid&&(state.windows||[]).find(x=>x.id===selWid);
    const sh=state.shifts.find(s=>s.date===selected);
    if(w)setLastSite(w.siteId);else if(sh)setLastSite(sh.siteId);},[selected,selWid,state.shifts,state.windows]);

  const TABS=[["calendar","Calendar"],["setup","Trips & Calendars"],["sites","Sites"]];
  const themeIcon={system:"◐",light:"☀",dark:"☾"}[theme];
  const cycle=()=>setTheme(t=>t==="system"?"light":t==="light"?"dark":"system");

  return <div style={{fontFamily:MONO,color:C.ink,height:"100%",display:"flex",flexDirection:"column",background:C.bg}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 14px",borderBottom:`1px solid ${C.line}`,background:C.panel,flexShrink:0,gap:8,flexWrap:"wrap"}}>
      <span style={{fontSize:15.5,fontWeight:900,letterSpacing:"-0.03em"}}>PER DIEM <span style={{fontSize:10,color:C.mute,fontWeight:700}}>next · stage 1</span></span>
      <div style={{display:"flex",gap:5,alignItems:"center"}}>
        <Btn small onClick={cycle}>{themeIcon} {theme}</Btn>
        <Btn small onClick={()=>{if(confirm("Reset to seed data?")){past.current=[];setCanUndo(false);setState(seedState());}}}>reset</Btn>
      </div>
    </div>
    <DrawerStrip state={state} mutate={mutate}/>
    {/* tabs */}
    <div style={{display:"flex",borderBottom:`1px solid ${C.line}`,background:C.panel,flexShrink:0}}>
      {TABS.map(([id,label])=><button key={id} onClick={()=>setTab(id)}
        style={{fontFamily:MONO,fontSize:12.5,fontWeight:800,padding:"9px 14px",border:"none",cursor:"pointer",background:"transparent",
          color:tab===id?C.ink:C.mute,borderBottom:tab===id?`2px solid ${C.ink}`:"2px solid transparent",marginBottom:-1}}>{label}</button>)}
      <span style={{marginLeft:"auto",alignSelf:"center",fontSize:9.5,color:C.mute,padding:"0 14px"}}>today {TODAY_S}</span>
    </div>
    {tab==="calendar"&&<Banner agg={agg} goal={state.settings.goal} viewYM={viewYM} mobile={mobile}/>}
    <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {tab==="calendar"&&<div style={{flex:1,minHeight:0,display:"flex",flexDirection:mobile?"column":"row",overflow:"hidden"}}>
        {/* phone: calendar over readout. tablet/desktop: calendar left, readout as a tall right panel. */}
        <div style={{flex:mobile?"1 1 60%":"1 1 0",minWidth:0,minHeight:0,overflow:"auto"}}>
          <CalendarSurface state={state} sIdx={sIdx} mobile={mobile} viewY={viewY} viewM={viewM} setView={setView}
            tool={tool} setTool={setTool} selected={selected} onTap={onTap} onUndo={undo} canUndo={canUndo}
            winBy={winBy} travelBy={travelBy} onCreateWindow={onCreateWindow}/>
        </div>
        <div style={mobile
          ?{flex:"0 0 auto",maxHeight:"42%",overflow:"auto",borderTop:`1px solid ${C.line}`,background:C.panel}
          :{flex:"0 0 380px",overflow:"auto",borderLeft:`1px solid ${C.line}`,background:C.panel}}>
          {selWid&&state.windows.find(w=>w.id===selWid)
            ? <WindowReadout state={state} sIdx={sIdx} wid={selWid} mutate={mutate} onScheduled={()=>setSelWid(null)}/>
            : <Readout state={state} sIdx={sIdx} selected={selected} mutate={mutate}/>}
        </div>
      </div>}
      {tab==="setup"&&<TripsCalsTab state={state} mutate={mutate}/>}
      {tab==="sites"&&<SitesTab state={state} mutate={mutate}/>}
    </div>
  </div>;
}
class Boundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return {err};}
  componentDidCatch(e,i){console.error("crash",e,i);}
  render(){if(!this.state.err)return this.props.children;
    return <div style={{fontFamily:MONO,maxWidth:440,margin:"12vh auto",padding:"0 20px",textAlign:"center",color:C.ink}}>
      <div style={{fontSize:16,fontWeight:800,marginBottom:8}}>Something went sideways.</div>
      <button onClick={()=>{try{localStorage.removeItem("perDiemNext");}catch(_){}location.reload();}}
        style={{fontFamily:MONO,fontSize:12,fontWeight:700,padding:"6px 12px",borderRadius:4,cursor:"pointer",border:`1px solid ${C.ink}`,background:C.ink,color:C.bg}}>Reset & reload</button>
    </div>;}
}
ReactDOM.createRoot(document.getElementById("root")).render(<Boundary><App/></Boundary>);
</script>
</body>
</html>
